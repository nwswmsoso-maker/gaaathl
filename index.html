<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة فورية - شغالة</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 15px; padding: 20px; }
        .messages { height: 400px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin: 10px 0; background: #f9f9f9; }
        .my-msg { text-align: right; color: blue; margin: 5px; }
        .other-msg { text-align: left; color: green; margin: 5px; }
        input, button { padding: 10px; margin: 5px; width: calc(100% - 22px); }
        .online { background: #e0e0e0; padding: 8px; border-radius: 10px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">💬 دردشة فورية</h2>
    
    <div id="loginDiv">
        <input type="text" id="username" placeholder="اسمك">
        <button onclick="login()">دخول</button>
        <p id="status" style="font-size:12px;color:gray;"></p>
    </div>
    
    <div id="chatDiv" style="display:none;">
        <div class="online" id="onlineUsers">🟢 جاري التحميل...</div>
        <div class="messages" id="messages"></div>
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">إرسال</button>
        <button onclick="logout()" style="background:red;color:white;">خروج</button>
    </div>
</div>

<script>
    // 🔑 مفتاحك الجديد
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, channel, currentUser;
    
    function login() {
        currentUser = document.getElementById('username').value.trim();
        if (!currentUser) {
            document.getElementById('status').innerHTML = '❌ اكتب اسمك';
            return;
        }
        
        document.getElementById('status').innerHTML = '🔄 جاري الاتصال...';
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            document.getElementById('status').innerHTML = '✅ متصل!';
            
            channel = ably.channels.get('room1');
            
            // استلام الرسائل
            channel.subscribe('chat', (msg) => {
                showMessage(msg.data);
            });
            
            // اعلان الدخول
            channel.presence.enter({ name: currentUser });
            channel.presence.subscribe(() => updateUsers());
            updateUsers();
            
            // رسالة ترحيب
            channel.publish('chat', {
                sender: 'system',
                text: `✨ ${currentUser} دخل الدردشة`,
                time: getTime()
            });
            
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('chatDiv').style.display = 'block';
        });
        
        ably.connection.on('failed', (err) => {
            document.getElementById('status').innerHTML = '❌ فشل: ' + (err.message || 'خطأ في الاتصال');
        });
    }
    
    function updateUsers() {
        channel.presence.get((err, members) => {
            if (err) return;
            let users = members.map(m => m.data.name);
            document.getElementById('onlineUsers').innerHTML = '👥 المتصلون: ' + (users.length ? users.join('، ') : 'لا أحد');
        });
    }
    
    function sendMsg() {
        let text = document.getElementById('msgInput').value.trim();
        if (!text) return;
        
        let msg = {
            sender: currentUser,
            text: text,
            time: getTime()
        };
        
        channel.publish('chat', msg);
        showMessage(msg, true);
        document.getElementById('msgInput').value = '';
    }
    
    function showMessage(msg, isMe = false) {
        let div = document.createElement('div');
        if (msg.sender === 'system') {
            div.style.textAlign = 'center';
            div.style.background = '#ffc107';
            div.style.padding = '5px';
            div.style.margin = '5px';
            div.style.borderRadius = '10px';
            div.innerHTML = msg.text;
        } else {
            div.className = (msg.sender === currentUser) ? 'my-msg' : 'other-msg';
            div.innerHTML = `<strong>${msg.sender === currentUser ? 'أنا' : msg.sender}</strong><br>${msg.text}<br><small>${msg.time}</small>`;
        }
        document.getElementById('messages').appendChild(div);
        div.scrollIntoView();
    }
    
    function logout() {
        if (channel) {
            channel.publish('chat', {
                sender: 'system',
                text: `🔴 ${currentUser} غادر`,
                time: getTime()
            });
            channel.presence.leave();
            ably.close();
        }
        location.reload();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString();
    }
</script>

</body>
</html>
