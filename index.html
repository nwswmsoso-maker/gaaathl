<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>تواصل</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Cairo',sans-serif; background:#0a1a0f; overflow:hidden; position:fixed; width:100%; height:100%; }
        
        .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(145deg,#0a1a0f,#1a3a1a); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .login-container { width:100%; max-width:380px; padding:20px; }
        .login-card { background:rgba(255,255,255,0.98); border-radius:35px; padding:45px 30px; box-shadow:0 30px 60px rgba(0,0,0,0.4); }
        .login-icon { text-align:center; margin-bottom:25px; }
        .login-icon i { font-size:4.5rem; color:#2ecc71; background:#e8f8e8; padding:25px; border-radius:50%; }
        .login-title { text-align:center; font-size:2rem; font-weight:800; color:#1a3a1a; margin-bottom:30px; }
        .input-wrapper { margin-bottom:20px; position:relative; }
        .input-wrapper i { position:absolute; right:18px; top:18px; color:#2ecc71; font-size:1.2rem; }
        .input-wrapper input { width:100%; padding:16px 50px 16px 20px; border:2px solid #e0e0e0; border-radius:20px; font-family:'Cairo',sans-serif; font-size:16px; background:#fafafa; }
        .input-wrapper input:focus { outline:none; border-color:#2ecc71; background:white; }
        .login-btn { width:100%; padding:16px; background:#2ecc71; color:white; border:none; border-radius:20px; font-size:1.2rem; font-weight:700; cursor:pointer; box-shadow:0 8px 0 #1a7a3a; }
        .login-btn:active { transform:translateY(4px); box-shadow:0 4px 0 #1a7a3a; }
        .login-switch { text-align:center; margin-top:20px; }
        .login-switch a { color:#2ecc71; text-decoration:none; font-weight:700; cursor:pointer; }
        
        .app { position:fixed; top:0; left:0; width:100%; height:100%; background:#f5f7fa; display:flex; flex-direction:column; }
        .app-header { background:linear-gradient(135deg,#1a3a1a,#0d2610); padding:18px 20px; display:flex; align-items:center; justify-content:space-between; }
        .user-section { display:flex; align-items:center; gap:12px; }
        .avatar { width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1.2rem; border:2px solid #FFD700; }
        .user-name { color:white; font-weight:700; }
        .header-actions i { color:white; font-size:1.3rem; cursor:pointer; margin:0 5px; }
        
        .tabs-container { background:#1a3a1a; padding:0 15px; display:flex; }
        .tab-item { flex:1; padding:15px 5px; text-align:center; color:rgba(255,255,255,0.7); cursor:pointer; font-weight:600; border-bottom:3px solid transparent; position:relative; }
        .tab-item i { margin-left:5px; }
        .tab-item.active { color:white; border-bottom-color:#FFD700; }
        .tab-badge { background:#e74c3c; color:white; border-radius:15px; padding:2px 8px; font-size:0.7rem; position:absolute; top:8px; right:15px; min-width:20px; }
        
        .content-area { flex:1; overflow-y:auto; background:#f0f4f0; }
        
        .chat-view { height:100%; display:flex; flex-direction:column; }
        .messages-list { flex:1; overflow-y:auto; padding:20px; background:linear-gradient(180deg,#e8f0e8,#f5f7fa); }
        .msg-row { display:flex; gap:12px; margin-bottom:18px; }
        .msg-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; flex-shrink:0; }
        .msg-body { max-width:75%; }
        .msg-top { display:flex; align-items:center; gap:8px; margin-bottom:5px; flex-wrap:wrap; }
        .msg-sender { font-weight:700; color:#1a3a1a; }
        .admin-tag { background:#FFD700; color:#1a3a1a; padding:2px 10px; border-radius:12px; font-size:0.7rem; }
        .add-friend-tag { background:#3498db; color:white; border:none; padding:3px 12px; border-radius:15px; font-size:0.7rem; cursor:pointer; }
        .msg-bubble { background:white; padding:12px 18px; border-radius:18px 18px 18px 5px; word-break:break-word; box-shadow:0 2px 5px rgba(0,0,0,0.03); }
        .msg-time { font-size:0.7rem; color:#888; margin-top:5px; }
        .msg-row.own { flex-direction:row-reverse; }
        .msg-row.own .msg-bubble { background:#dcf8c6; border-radius:18px 18px 5px 18px; }
        
        .chat-footer { padding:18px; background:white; display:flex; gap:12px; border-top:1px solid #e0e0e0; }
        .chat-footer input { flex:1; padding:14px 18px; border:2px solid #e0e0e0; border-radius:30px; font-family:'Cairo',sans-serif; background:#f8f8f8; }
        .send-btn { width:55px; height:55px; background:#2ecc71; border:none; border-radius:50%; color:white; font-size:1.3rem; cursor:pointer; }
        
        .posts-view { padding:20px; }
        .new-post-btn { background:#2ecc71; color:white; padding:18px; border-radius:20px; text-align:center; margin-bottom:25px; cursor:pointer; font-weight:700; }
        .post-card { background:white; border-radius:25px; padding:20px; margin-bottom:18px; }
        .post-top { display:flex; align-items:center; gap:12px; margin-bottom:15px; }
        .post-author { font-weight:700; color:#1a3a1a; }
        .post-content { margin-bottom:18px; line-height:1.6; }
        .post-bottom { display:flex; gap:25px; color:#666; border-top:1px solid #eee; padding-top:15px; }
        
        .friends-view { padding:20px; }
        .add-friend-box { display:flex; gap:12px; margin-bottom:25px; }
        .add-friend-box input { flex:1; padding:16px; border:2px solid #e0e0e0; border-radius:20px; font-family:'Cairo',sans-serif; }
        .add-friend-box button { padding:16px 25px; background:#2ecc71; color:white; border:none; border-radius:20px; font-weight:700; cursor:pointer; }
        .section-header { font-weight:800; color:#1a3a1a; margin:25px 0 15px; font-size:1.2rem; }
        .friend-card { display:flex; align-items:center; justify-content:space-between; padding:18px; background:white; border-radius:20px; margin-bottom:12px; }
        .friend-left { display:flex; align-items:center; gap:15px; }
        .friend-avatar { width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1.3rem; }
        .friend-name { font-weight:700; }
        .friend-online { font-size:0.75rem; color:#2ecc71; }
        .friend-actions { display:flex; gap:8px; }
        .icon-btn { width:45px; height:45px; border-radius:50%; border:none; cursor:pointer; font-size:1.1rem; color:white; }
        .call-icon { background:#2ecc71; }
        .chat-icon { background:#3498db; }
        .accept-icon { background:#2ecc71; color:white; padding:10px 22px; border-radius:25px; border:none; cursor:pointer; }
        .reject-icon { background:#e74c3c; color:white; padding:10px 22px; border-radius:25px; border:none; cursor:pointer; }
        
        .active-view { padding:20px; }
        .active-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
        .refresh-active { background:#2ecc71; color:white; border:none; padding:12px 25px; border-radius:25px; font-weight:600; cursor:pointer; }
        .active-member { display:flex; align-items:center; gap:15px; padding:18px; background:white; border-radius:20px; margin-bottom:12px; }
        .active-avatar { width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
        .active-info { flex:1; }
        .active-name { font-weight:700; }
        .dot-online { width:12px; height:12px; background:#2ecc71; border-radius:50%; }
        .add-active { background:#3498db; color:white; border:none; padding:10px 20px; border-radius:25px; cursor:pointer; }
        
        .private-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; display:flex; flex-direction:column; }
        .private-top { background:#1a3a1a; color:white; padding:18px; display:flex; align-items:center; gap:15px; }
        .private-top i { font-size:1.5rem; cursor:pointer; }
        .private-top span { font-size:1.3rem; font-weight:600; flex:1; }
        .private-messages { flex:1; overflow-y:auto; padding:20px; background:#e8f0e8; }
        .private-bottom { padding:18px; background:white; display:flex; gap:12px; }
        .private-bottom input { flex:1; padding:14px; border:2px solid #e0e0e0; border-radius:30px; font-family:'Cairo',sans-serif; }
        .private-bottom button { width:55px; height:55px; background:#2ecc71; border:none; border-radius:50%; color:white; font-size:1.3rem; cursor:pointer; }
        
        .incoming-call-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(15px); }
        .incoming-card { background:white; border-radius:40px; padding:45px 35px; text-align:center; max-width:350px; width:90%; }
        .incoming-avatar { width:120px; height:120px; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; color:white; border:4px solid #FFD700; }
        .incoming-name { font-size:1.8rem; font-weight:800; color:#1a3a1a; margin-bottom:8px; }
        .incoming-status { color:#2ecc71; font-weight:600; margin-bottom:35px; font-size:1.1rem; }
        .incoming-actions { display:flex; gap:20px; justify-content:center; }
        .incoming-accept { width:75px; height:75px; background:#2ecc71; border:none; border-radius:50%; color:white; font-size:2rem; cursor:pointer; box-shadow:0 6px 0 #1a7a3a; }
        .incoming-reject { width:75px; height:75px; background:#e74c3c; border:none; border-radius:50%; color:white; font-size:2rem; cursor:pointer; box-shadow:0 6px 0 #b71c1c; }
        
        .toast-notification { position:fixed; top:20px; left:20px; right:20px; background:#1a3a1a; color:white; padding:18px 22px; border-radius:20px; display:flex; align-items:center; gap:15px; z-index:5000; box-shadow:0 15px 40px rgba(0,0,0,0.3); transform:translateY(-120%); transition:0.3s; max-width:400px; margin:0 auto; }
        .toast-notification.show { transform:translateY(0); }
        .toast-icon { width:45px; height:45px; background:#2ecc71; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
        .toast-content { flex:1; }
        .toast-title { font-weight:700; }
        .toast-text { opacity:0.9; font-size:0.9rem; }
        .toast-close { cursor:pointer; opacity:0.7; font-size:1.2rem; }
        
        .call-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(145deg,#1a3a1a,#0a1a0f); z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .call-avatar-large { width:160px; height:160px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:4.5rem; color:white; border:5px solid #FFD700; margin-bottom:25px; }
        .call-name-large { font-size:2.2rem; color:white; font-weight:700; margin-bottom:10px; }
        .call-duration { color:#FFD700; font-size:1.8rem; margin-bottom:60px; font-family:monospace; font-weight:700; }
        .call-controls { display:flex; gap:35px; }
        .ctrl-btn { width:75px; height:75px; border-radius:50%; border:none; font-size:2rem; cursor:pointer; }
        .ctrl-mute { background:rgba(255,255,255,0.15); color:white; }
        .ctrl-mute.active { background:#e74c3c; }
        .ctrl-end { background:#e74c3c; color:white; }
        .enable-audio-btn { background:#FFD700; color:#1a3a1a; border:none; padding:15px 30px; border-radius:30px; font-weight:700; margin-top:20px; cursor:pointer; }
        
        .hidden { display:none !important; }
        
        .bg1 { background:#e74c3c; } .bg2 { background:#3498db; } .bg3 { background:#2ecc71; }
        .bg4 { background:#f39c12; } .bg5 { background:#9b59b6; } .bg6 { background:#1abc9c; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon"><i class="fas fa-comment-dots"></i></div>
            <div class="login-title">مرحباً بك</div>
            <div id="loginForm">
                <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="اسم المستخدم"></div>
                <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
                <button class="login-btn" onclick="login()">تسجيل الدخول</button>
                <div class="login-switch"><a onclick="showRegister()">إنشاء حساب جديد</a></div>
            </div>
            <div id="registerForm" class="hidden">
                <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="regUsername" placeholder="اسم المستخدم"></div>
                <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="كلمة المرور"></div>
                <button class="login-btn" onclick="register()">إنشاء حساب</button>
                <div class="login-switch"><a onclick="showLogin()">لدي حساب بالفعل</a></div>
            </div>
        </div>
    </div>
</div>

<div id="app" class="app hidden">
    <div class="app-header">
        <div class="user-section">
            <div class="avatar" id="myAvatar"></div>
            <span class="user-name" id="myName"></span>
        </div>
        <div class="header-actions"><i class="fas fa-sign-out-alt" onclick="logout()"></i></div>
    </div>
    
    <div class="tabs-container">
        <div class="tab-item active" onclick="switchTab('chat')"><i class="fas fa-comments"></i> الدردشة</div>
        <div class="tab-item" onclick="switchTab('posts')"><i class="fas fa-newspaper"></i> المنشورات</div>
        <div class="tab-item" onclick="switchTab('friends')"><i class="fas fa-users"></i> الأصدقاء<span class="tab-badge hidden" id="requestsBadge">0</span></div>
        <div class="tab-item" onclick="switchTab('active')"><i class="fas fa-circle"></i> نشط</div>
    </div>
    
    <div class="content-area">
        <div id="chatTab" class="chat-view">
            <div class="messages-list" id="messages"></div>
            <div class="chat-footer"><input type="text" id="chatInput" placeholder="اكتب رسالتك..."><button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
        </div>
        <div id="postsTab" class="posts-view hidden"><div class="new-post-btn" onclick="createPost()"><i class="fas fa-plus-circle"></i> إنشاء منشور جديد</div><div id="postsList"></div></div>
        <div id="friendsTab" class="friends-view hidden">
            <div class="add-friend-box"><input type="text" id="friendNameInput" placeholder="اسم الصديق"><button onclick="addFriend()"><i class="fas fa-user-plus"></i> إضافة</button></div>
            <div class="section-header"><i class="fas fa-user-friends"></i> أصدقائي</div><div id="friendsList"></div>
            <div class="section-header"><i class="fas fa-bell"></i> طلبات الصداقة <span id="requestsCount"></span></div><div id="requestsList"></div>
        </div>
        <div id="activeTab" class="active-view hidden">
            <div class="active-top"><h3><i class="fas fa-circle" style="color:#2ecc71;"></i> متصلون الآن</h3><button class="refresh-active" onclick="refreshActive()"><i class="fas fa-sync-alt"></i> تحديث</button></div>
            <div id="activeList"></div>
        </div>
    </div>
</div>

<div id="privateChat" class="private-overlay hidden">
    <div class="private-top"><i class="fas fa-arrow-right" onclick="closePrivateChat()"></i><span id="privateChatName"></span><i class="fas fa-phone" onclick="startCallFromChat()"></i></div>
    <div class="private-messages" id="privateMessages"></div>
    <div class="private-bottom"><input type="text" id="privateInput" placeholder="اكتب رسالة..."><button onclick="sendPrivateMessage()"><i class="fas fa-paper-plane"></i></button></div>
</div>

<div id="incomingCall" class="incoming-call-overlay hidden">
    <div class="incoming-card">
        <div class="incoming-avatar" id="incomingAvatar"></div>
        <div class="incoming-name" id="incomingName"></div>
        <div class="incoming-status"><i class="fas fa-phone-alt"></i> يتصل بك...</div>
        <div class="incoming-actions">
            <button class="incoming-reject" onclick="rejectIncomingCall()"><i class="fas fa-times"></i></button>
            <button class="incoming-accept" onclick="acceptIncomingCall()"><i class="fas fa-check"></i></button>
        </div>
    </div>
</div>

<div id="toast" class="toast-notification">
    <div class="toast-icon"><i class="fas fa-comment"></i></div>
    <div class="toast-content"><div class="toast-title" id="toastTitle">رسالة جديدة</div><div class="toast-text" id="toastText"></div></div>
    <div class="toast-close" onclick="hideToast()"><i class="fas fa-times"></i></div>
</div>

<div id="callScreen" class="call-screen hidden">
    <div class="call-avatar-large" id="callAvatar"></div>
    <div class="call-name-large" id="callName"></div>
    <div class="call-duration" id="callDuration">00:00</div>
    <button class="enable-audio-btn hidden" id="enableAudioBtn" onclick="enableAudio()"><i class="fas fa-volume-up"></i> تشغيل الصوت</button>
    <div class="call-controls">
        <button class="ctrl-btn ctrl-mute" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
        <button class="ctrl-btn ctrl-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
const ADMIN_USER = '3tx';
const ADMIN_PASS = '11';

let currentUser = null, isAdmin = false, ably = null, pubChannel = null, privChannel = null;
let currentChat = null, localStream = null, currentPeer = null, muted = false;
let incomingCallFrom = null;
let callTimer = null, callSeconds = 0;
let ringtone = null;
let remoteAudio = null;

let users = JSON.parse(localStorage.getItem('chat_users')) || {};
let posts = JSON.parse(localStorage.getItem('chat_posts')) || [];
let friends = JSON.parse(localStorage.getItem('chat_friends')) || {};
let requests = JSON.parse(localStorage.getItem('chat_requests')) || {};
let privateMessages = JSON.parse(localStorage.getItem('private_msgs')) || {};

const lastUser = localStorage.getItem('chat_lastUser');
if(lastUser) document.getElementById('loginUsername').value = lastUser;

// ================ عداد الوقت ================
function startCallTimer() {
    callSeconds = 0;
    updateTimerDisplay();
    if(callTimer) clearInterval(callTimer);
    callTimer = setInterval(() => {
        callSeconds++;
        updateTimerDisplay();
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(callSeconds / 60);
    const secs = callSeconds % 60;
    document.getElementById('callDuration').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

function stopCallTimer() {
    if(callTimer) {
        clearInterval(callTimer);
        callTimer = null;
    }
    callSeconds = 0;
    document.getElementById('callDuration').textContent = '00:00';
}

// ================ تفعيل الصوت ================
function enableAudio() {
    if(remoteAudio) {
        remoteAudio.play().then(() => {
            document.getElementById('enableAudioBtn').classList.add('hidden');
            showToast('تم','تم تشغيل الصوت');
        }).catch(e => {
            showToast('خطأ','اضغط على الزر مرة أخرى');
        });
    }
}

// ================ Toast ================
function showToast(title, text) { 
    document.getElementById('toastTitle').textContent=title; 
    document.getElementById('toastText').textContent=text; 
    document.getElementById('toast').classList.add('show'); 
    setTimeout(hideToast,4000); 
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

function getColor(n) { return ['bg1','bg2','bg3','bg4','bg5','bg6'][(n||'a').charCodeAt(0)%6]; }

// ================ تسجيل ================
function showRegister() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
function showLogin() { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }
function register() {
    const u = document.getElementById('regUsername').value.trim(), p = document.getElementById('regPassword').value;
    if(!u||!p) { showToast('خطأ','الرجاء ملء جميع الحقول'); return; }
    if(users[u]) { showToast('خطأ','اسم المستخدم موجود مسبقاً'); return; }
    users[u]=p; localStorage.setItem('chat_users',JSON.stringify(users));
    showToast('تم','تم إنشاء الحساب بنجاح'); showLogin(); document.getElementById('loginUsername').value=u;
}
async function login() {
    const u = document.getElementById('loginUsername').value.trim(), p = document.getElementById('loginPassword').value;
    if(u===ADMIN_USER && p===ADMIN_PASS) { isAdmin=true; if(!users[u]) users[u]=p; }
    else if(!users[u]||users[u]!==p) { showToast('خطأ','بيانات الدخول غير صحيحة'); return; }
    else isAdmin=false;
    currentUser=u; localStorage.setItem('chat_lastUser',u);
    
    try { localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false}); } 
    catch(e) { showToast('تنبيه','لم يتم الوصول للميكروفون'); }
    
    ably = new Ably.Realtime({key:ABLY_KEY, clientId:u});
    ably.connection.on('connected',()=>{
        pubChannel=ably.channels.get('public');
        pubChannel.subscribe('msg',m=>handlePublicMessage(m.data));
        pubChannel.subscribe('post',m=>{posts.unshift(m.data); savePosts();});
        pubChannel.presence.enter({username:u,admin:isAdmin});
        pubChannel.presence.subscribe('enter',updateActive);
        pubChannel.presence.subscribe('leave',updateActive);
        
        privChannel=ably.channels.get(`priv-${u}`);
        privChannel.subscribe('msg',m=>handlePrivateMessage(m.data));
        privChannel.subscribe('call',handleCall);
        privChannel.subscribe('call-signal',handleCallSignal);
        privChannel.subscribe('call-end',handleCallEnd);
        privChannel.subscribe('friend-req',handleFriendReq);
        privChannel.subscribe('friend-acc',handleFriendAcc);
    });
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('myName').textContent=u;
    document.getElementById('myAvatar').textContent=u[0].toUpperCase();
    document.getElementById('myAvatar').className=`avatar ${getColor(u)}`;
    loadFriends(); loadPosts(); updateActive(); updateRequestsCount();
}
function logout() { if(ably) ably.close(); localStorage.removeItem('chat_lastUser'); location.reload(); }

function switchTab(t) {
    document.querySelectorAll('.tab-item').forEach(x=>x.classList.remove('active'));
    event.target.classList.add('active');
    ['chatTab','postsTab','friendsTab','activeTab'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    document.getElementById(t+'Tab').classList.remove('hidden');
    if(t==='posts') renderPosts();
    else if(t==='friends') renderFriends();
    else if(t==='active') renderActive();
}

function sendMessage() { 
    const inp=document.getElementById('chatInput'), text=inp.value.trim(); 
    if(!text) return; 
    const msg={sender:currentUser,text,admin:isAdmin,time:new Date().toLocaleTimeString()}; 
    pubChannel.publish('msg',msg); addMessage(msg,true); inp.value=''; 
}
function handlePublicMessage(m) { if(m.sender!==currentUser) { addMessage(m,false); showToast('رسالة جديدة',`${m.sender}: ${m.text.substring(0,30)}...`); } }
function addMessage(m,own) { 
    const div=document.getElementById('messages'), isMe=own||m.sender===currentUser; 
    const isFriend=(friends[currentUser]||[]).includes(m.sender); 
    div.innerHTML+=`<div class="msg-row ${isMe?'own':''}"><div class="msg-avatar ${getColor(m.sender)}">${m.sender[0]}</div><div class="msg-body"><div class="msg-top"><span class="msg-sender">${m.sender}</span>${m.admin?'<span class="admin-tag">👑 مشرف</span>':''}${!isMe&&!isFriend?`<button class="add-friend-tag" onclick="sendFriendRequestTo('${m.sender}')"><i class="fas fa-user-plus"></i> إضافة</button>`:''}</div><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time}</div></div></div>`; 
    div.scrollTop=div.scrollHeight; 
}
function sendFriendRequestTo(u) { if(u===currentUser) return; ably.channels.get(`priv-${u}`).publish('friend-req',{from:currentUser}); showToast('تم','تم إرسال طلب الصداقة'); }

function createPost() { const t=prompt('اكتب منشورك:'); if(!t) return; const p={id:Date.now(),author:currentUser,text:t,likes:0,time:new Date().toLocaleString()}; posts.unshift(p); savePosts(); pubChannel.publish('post',p); renderPosts(); }
function renderPosts() { document.getElementById('postsList').innerHTML=posts.map(p=>`<div class="post-card"><div class="post-top"><div class="avatar ${getColor(p.author)}">${p.author[0]}</div><div><div class="post-author">${p.author}</div><div style="font-size:0.7rem;">${p.time}</div></div></div><div class="post-content">${p.text}</div><div class="post-bottom"><span onclick="likePost('${p.id}')"><i class="far fa-heart"></i> ${p.likes}</span></div></div>`).join(''); }
function likePost(id) { const p=posts.find(x=>x.id==id); if(p) { p.likes++; savePosts(); renderPosts(); } }
function savePosts() { localStorage.setItem('chat_posts',JSON.stringify(posts)); }
function loadPosts() { renderPosts(); }

function addFriend() { const n=document.getElementById('friendNameInput').value.trim(); if(n&&n!==currentUser) { sendFriendRequestTo(n); document.getElementById('friendNameInput').value=''; } }
function handleFriendReq(m) { if(!requests[currentUser]) requests[currentUser]=[]; if(!requests[currentUser].find(r=>r.from===m.data.from)) { requests[currentUser].push({from:m.data.from}); localStorage.setItem('chat_requests',JSON.stringify(requests)); updateRequestsCount(); renderFriends(); showToast('طلب صداقة',`${m.data.from} يريد إضافتك`); } }
function acceptFriend(f) { if(!friends[currentUser]) friends[currentUser]=[]; if(!friends[f]) friends[f]=[]; friends[currentUser].push(f); friends[f].push(currentUser); requests[currentUser]=(requests[currentUser]||[]).filter(r=>r.from!==f); localStorage.setItem('chat_friends',JSON.stringify(friends)); localStorage.setItem('chat_requests',JSON.stringify(requests)); ably.channels.get(`priv-${f}`).publish('friend-acc',{from:currentUser}); updateRequestsCount(); renderFriends(); showToast('تم','تم قبول الصداقة'); }
function rejectFriend(f) { requests[currentUser]=(requests[currentUser]||[]).filter(r=>r.from!==f); localStorage.setItem('chat_requests',JSON.stringify(requests)); updateRequestsCount(); renderFriends(); }
function handleFriendAcc(m) { if(!friends[currentUser]) friends[currentUser]=[]; friends[currentUser].push(m.data.from); localStorage.setItem('chat_friends',JSON.stringify(friends)); renderFriends(); showToast('تم',`${m.data.from} قبل طلب الصداقة`); }
function updateRequestsCount() { const c=(requests[currentUser]||[]).length; document.getElementById('requestsBadge').classList.toggle('hidden',c===0); document.getElementById('requestsBadge').textContent=c>9?'9+':c; document.getElementById('requestsCount').textContent=c?`(${c})`:''; }
function renderFriends() { const mf=friends[currentUser]||[], mr=requests[currentUser]||[]; document.getElementById('friendsList').innerHTML=mf.map(f=>`<div class="friend-card"><div class="friend-left"><div class="friend-avatar ${getColor(f)}">${f[0]}</div><div><div class="friend-name">${f}</div><div class="friend-online"><i class="fas fa-circle"></i> متصل</div></div></div><div class="friend-actions"><button class="icon-btn call-icon" onclick="startCall('${f}')"><i class="fas fa-phone"></i></button><button class="icon-btn chat-icon" onclick="openPrivateChat('${f}')"><i class="fas fa-comment"></i></button></div></div>`).join('')||'<p>لا يوجد أصدقاء</p>'; document.getElementById('requestsList').innerHTML=mr.map(r=>`<div class="friend-card"><div class="friend-left"><div class="friend-avatar ${getColor(r.from)}">${r.from[0]}</div><div class="friend-name">${r.from}</div></div><div style="display:flex;gap:5px;"><button class="accept-icon" onclick="acceptFriend('${r.from}')">قبول</button><button class="reject-icon" onclick="rejectFriend('${r.from}')">رفض</button></div></div>`).join('')||'<p>لا توجد طلبات</p>'; }
function loadFriends() { renderFriends(); updateRequestsCount(); }

function refreshActive() { updateActive(); }
function updateActive() { pubChannel.presence.get((e,m)=>{ window.activeMembers=m||[]; renderActive(); }); }
function renderActive() { const m=window.activeMembers||[], mf=friends[currentUser]||[]; document.getElementById('activeList').innerHTML=m.filter(x=>x.clientId!==currentUser).map(x=>`<div class="active-member"><div class="active-avatar ${getColor(x.clientId)}">${x.clientId[0]}</div><div class="active-info"><div class="active-name">${x.clientId} ${x.data?.admin?'👑':''}</div></div>${!mf.includes(x.clientId)?`<button class="add-active" onclick="sendFriendRequestTo('${x.clientId}')"><i class="fas fa-user-plus"></i> إضافة</button>`:''}<div class="dot-online"></div></div>`).join('')||'<p>لا يوجد نشط</p>'; }

function openPrivateChat(u) { currentChat=u; document.getElementById('privateChatName').textContent=u; document.getElementById('privateChat').classList.remove('hidden'); loadPrivateMessages(u); }
function closePrivateChat() { document.getElementById('privateChat').classList.add('hidden'); currentChat=null; }
function sendPrivateMessage() { const inp=document.getElementById('privateInput'), text=inp.value.trim(); if(!text||!currentChat) return; const msg={from:currentUser,to:currentChat,text,time:new Date().toLocaleTimeString()}; const k=[currentUser,currentChat].sort().join('-'); if(!privateMessages[k]) privateMessages[k]=[]; privateMessages[k].push(msg); localStorage.setItem('private_msgs',JSON.stringify(privateMessages)); ably.channels.get(`priv-${currentChat}`).publish('msg',msg); addPrivateMsg(msg,true); inp.value=''; }
function handlePrivateMessage(m) { if(m.from!==currentUser) { const k=[currentUser,m.from].sort().join('-'); if(!privateMessages[k]) privateMessages[k]=[]; privateMessages[k].push(m); localStorage.setItem('private_msgs',JSON.stringify(privateMessages)); if(currentChat===m.from) addPrivateMsg(m,false); else showToast('رسالة خاصة',`${m.from}: ${m.text.substring(0,30)}...`); } }
function addPrivateMsg(m,own) { const div=document.getElementById('privateMessages'), isMe=own||m.from===currentUser; div.innerHTML+=`<div class="msg-row ${isMe?'own':''}"><div class="msg-avatar ${getColor(m.from)}">${m.from[0]}</div><div class="msg-body"><div class="msg-bubble">${m.text}</div><div class="msg-time">${m.time}</div></div></div>`; div.scrollTop=div.scrollHeight; }
function loadPrivateMessages(u) { const k=[currentUser,u].sort().join('-'), ms=privateMessages[k]||[]; document.getElementById('privateMessages').innerHTML=ms.map(m=>`<div class="msg-row ${m.from===currentUser?'own':''}"><div class="msg-avatar ${getColor(m.from)}">${m.from[0]}</div><div class="msg-body"><div class="msg-bubble">${m.text}</div></div></div>`).join(''); }

// ================ مكالمات ================
async function startCall(u) {
    currentChat = u;
    document.getElementById('callScreen').classList.remove('hidden');
    document.getElementById('callName').textContent = u;
    document.getElementById('callAvatar').textContent = u[0];
    document.getElementById('callAvatar').className = `call-avatar-large ${getColor(u)}`;
    document.getElementById('enableAudioBtn').classList.add('hidden');
    stopCallTimer();
    document.getElementById('callDuration').textContent = '00:00';
    
    const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: true });
    
    peer.on('signal', signal => {
        ably.channels.get(`priv-${u}`).publish('call-signal', { signal: signal, from: currentUser });
    });
    
    peer.on('stream', remoteStream => {
        remoteAudio = new Audio();
        remoteAudio.srcObject = remoteStream;
        remoteAudio.autoplay = true;
        remoteAudio.play().then(() => {
            startCallTimer();
        }).catch(e => {
            document.getElementById('enableAudioBtn').classList.remove('hidden');
            startCallTimer();
        });
    });
    
    peer.on('connect', () => {
        console.log('✅ اتصال ناجح');
    });
    
    peer.on('close', () => {
        stopCallTimer();
        document.getElementById('callScreen').classList.add('hidden');
        remoteAudio = null;
    });
    
    peer.on('error', err => {
        console.error('خطأ:', err);
        stopCallTimer();
        document.getElementById('callScreen').classList.add('hidden');
    });
    
    currentPeer = peer;
    ably.channels.get(`priv-${u}`).publish('call', { from: currentUser });
}

function startCallFromChat() { if(currentChat) startCall(currentChat); }

function handleCall(m) {
    incomingCallFrom = m.data.from;
    document.getElementById('incomingCall').classList.remove('hidden');
    document.getElementById('incomingName').textContent = incomingCallFrom;
    document.getElementById('incomingAvatar').textContent = incomingCallFrom[0];
    document.getElementById('incomingAvatar').className = `incoming-avatar ${getColor(incomingCallFrom)}`;
    
    try {
        ringtone = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f38=');
        ringtone.loop = true;
        ringtone.play().catch(e=>{});
    } catch(e) {}
}

function acceptIncomingCall() {
    if(ringtone) { ringtone.pause(); ringtone = null; }
    document.getElementById('incomingCall').classList.add('hidden');
    currentChat = incomingCallFrom;
    
    document.getElementById('callScreen').classList.remove('hidden');
    document.getElementById('callName').textContent = incomingCallFrom;
    document.getElementById('callAvatar').textContent = incomingCallFrom[0];
    document.getElementById('callAvatar').className = `call-avatar-large ${getColor(incomingCallFrom)}`;
    document.getElementById('enableAudioBtn').classList.add('hidden');
    stopCallTimer();
    document.getElementById('callDuration').textContent = '00:00';
    
    const peer = new SimplePeer({ initiator: false, stream: localStream, trickle: true });
    
    peer.on('signal', signal => {
        ably.channels.get(`priv-${incomingCallFrom}`).publish('call-signal', { signal: signal, from: currentUser });
    });
    
    peer.on('stream', remoteStream => {
        remoteAudio = new Audio();
        remoteAudio.srcObject = remoteStream;
        remoteAudio.autoplay = true;
        remoteAudio.play().then(() => {
            startCallTimer();
        }).catch(e => {
            document.getElementById('enableAudioBtn').classList.remove('hidden');
            startCallTimer();
        });
    });
    
    peer.on('connect', () => {
        console.log('✅ اتصال ناجح');
    });
    
    peer.on('close', () => {
        stopCallTimer();
        document.getElementById('callScreen').classList.add('hidden');
        remoteAudio = null;
    });
    
    peer.on('error', err => {
        console.error('خطأ:', err);
        stopCallTimer();
        document.getElementById('callScreen').classList.add('hidden');
    });
    
    currentPeer = peer;
}

function rejectIncomingCall() {
    if(ringtone) { ringtone.pause(); ringtone = null; }
    document.getElementById('incomingCall').classList.add('hidden');
    if(incomingCallFrom) {
        ably.channels.get(`priv-${incomingCallFrom}`).publish('call-end', { from: currentUser });
    }
    incomingCallFrom = null;
}

function handleCallSignal(m) {
    if(m.data.from === currentUser) return;
    if(currentPeer) {
        currentPeer.signal(m.data.signal);
    }
}

function handleCallEnd(m) {
    showToast('تنبيه', `${m.data.from} أنهى المكالمة`);
    if(ringtone) { ringtone.pause(); ringtone = null; }
    stopCallTimer();
    document.getElementById('callScreen').classList.add('hidden');
    document.getElementById('incomingCall').classList.add('hidden');
    if(currentPeer) {
        currentPeer.destroy();
        currentPeer = null;
    }
    remoteAudio = null;
}

function toggleMute() {
    if(localStream) {
        muted = !muted;
        localStream.getAudioTracks()[0].enabled = !muted;
        document.getElementById('muteBtn').classList.toggle('active', muted);
    }
}

function endCall() {
    if(ringtone) { ringtone.pause(); ringtone = null; }
    stopCallTimer();
    document.getElementById('callScreen').classList.add('hidden');
    document.getElementById('incomingCall').classList.add('hidden');
    if(currentPeer) {
        currentPeer.destroy();
        currentPeer = null;
    }
    if(currentChat) {
        ably.channels.get(`priv-${currentChat}`).publish('call-end', { from: currentUser });
    }
    remoteAudio = null;
}

window.showRegister=showRegister; window.showLogin=showLogin; window.register=register; window.login=login; window.logout=logout;
window.switchTab=switchTab; window.sendMessage=sendMessage; window.sendFriendRequestTo=sendFriendRequestTo;
window.createPost=createPost; window.likePost=likePost; window.addFriend=addFriend; window.acceptFriend=acceptFriend;
window.rejectFriend=rejectFriend; window.openPrivateChat=openPrivateChat; window.closePrivateChat=closePrivateChat;
window.sendPrivateMessage=sendPrivateMessage; window.startCall=startCall; window.startCallFromChat=startCallFromChat;
window.toggleMute=toggleMute; window.endCall=endCall; window.refreshActive=refreshActive;
window.acceptIncomingCall=acceptIncomingCall; window.rejectIncomingCall=rejectIncomingCall; window.hideToast=hideToast;
window.enableAudio=enableAudio;
</script>
