<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غرف صوتية - مكالمات جماعية</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0B0C10; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { background: #1F2833; border-radius: 25px; width: 100%; max-width: 600px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .header { background: #45A29E; color: white; padding: 18px; text-align: center; }
        .header h2 { font-size: 1.3rem; }
        .login-box, .chat-box { padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 25px; font-size: 16px; }
        button { background: #45A29E; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .hidden { display: none; }
        
        /* تنسيق الغرف */
        .rooms-list { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .room-btn { background: #2C3E50; padding: 10px; border-radius: 15px; text-align: center; cursor: pointer; flex: 1; }
        .room-btn.active { background: #45A29E; }
        .room-btn span { font-size: 20px; display: block; }
        
        /* المشاركين */
        .participants { background: #2C3E50; border-radius: 15px; padding: 10px; margin-bottom: 15px; }
        .participant { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #3a4a5a; }
        .participant:last-child { border-bottom: none; }
        .participant-name { color: white; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .speaking { color: #4CAF50; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .mic-btn { background: #45A29E; border: none; padding: 5px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 12px; }
        .mic-btn.muted { background: #f44336; }
        .hand-btn { background: #ff9800; border: none; padding: 5px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 12px; margin-left: 5px; }
        
        /* الدردشة النصية */
        .messages { height: 250px; overflow-y: auto; background: #0B0C10; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .msg { padding: 6px 10px; margin: 4px; border-radius: 12px; max-width: 80%; word-wrap: break-word; font-size: 13px; }
        .my-msg { background: #45A29E; color: white; margin-left: auto; text-align: right; }
        .other-msg { background: #2C3E50; color: white; margin-right: auto; }
        .system-msg { background: #FFC107; color: #333; text-align: center; margin: 5px auto; font-size: 10px; width: fit-content; }
        .sender { font-size: 10px; font-weight: bold; margin-bottom: 2px; }
        .time { font-size: 8px; opacity: 0.6; margin-top: 2px; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; margin: 0; background: #2C3E50; color: white; font-size: 14px; }
        .input-area button { width: auto; padding: 12px 20px; }
        .logout-btn { background: #f44336; margin-top: 10px; }
        
        .call-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .call-controls button { flex: 1; background: #2C3E50; }
        .leave-room { background: #f44336 !important; }
        
        .online-count { font-size: 12px; color: #888; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🎙️ غرف صوتية جماعية</h2>
        <p>تكلم مع 10 أشخاص بنفس الوقت</p>
    </div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <button onclick="login()">دخول</button>
        <div id="loginStatus" style="font-size:12px; text-align:center; margin-top:10px; color:#888;"></div>
    </div>

    <!-- شاشة الدردشة -->
    <div id="chatScreen" class="chat-box hidden">
        <!-- الغرف المتاحة -->
        <div class="rooms-list">
            <div class="room-btn" onclick="joinRoom('عامة')">
                <span>🎙️</span>
                <small>عامة</small>
            </div>
            <div class="room-btn" onclick="joinRoom('ألعاب')">
                <span>🎮</span>
                <small>ألعاب</small>
            </div>
            <div class="room-btn" onclick="joinRoom('رياضة')">
                <span>⚽</span>
                <small>رياضة</small>
            </div>
            <div class="room-btn" onclick="joinRoom('تكنولوجيا')">
                <span>💻</span>
                <small>تقنية</small>
            </div>
        </div>
        
        <div class="online-count" id="onlineCount">🟢 0 متصل</div>
        
        <!-- المشاركين -->
        <div class="participants" id="participantsList">
            <div style="color:#888; text-align:center;">اختر غرفة للانضمام</div>
        </div>
        
        <!-- أزرار التحكم بالمكالمة -->
        <div class="call-controls" id="callControls" style="display:none;">
            <button id="muteBtn" onclick="toggleMute()">🔊 كتم المايك</button>
            <button id="handBtn" onclick="raiseHand()">✋ ارفع يد</button>
            <button class="leave-room" onclick="leaveRoom()">🚪 مغادرة الغرفة</button>
        </div>
        
        <!-- الدردشة النصية -->
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="رسالة نصية..." onkeypress="if(event.key==='Enter') sendChatMsg()">
            <button onclick="sendChatMsg()">📤</button>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 خروج من التطبيق</button>
    </div>
</div>

<script>
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, mainChannel, currentUser;
    let localStream = null;
    let peers = new Map(); // تخزين اتصالات المشاركين
    let currentRoom = null;
    let isMuted = false;
    let processedMessages = new Set(); // منع تكرار الرسائل
    let hands = []; // قائمة رفع اليد
    
    async function login() {
        currentUser = document.getElementById('username').value.trim();
        if (!currentUser) {
            document.getElementById('loginStatus').innerHTML = '❌ اكتب اسمك';
            return;
        }
        
        document.getElementById('loginStatus').innerHTML = '🔄 جاري الاتصال...';
        
        // طلب الميكروفون
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('🎤 ميكروفون جاهز');
        } catch (err) {
            document.getElementById('loginStatus').innerHTML = '⚠️ لا يمكن الوصول للميكروفون';
        }
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            document.getElementById('loginStatus').innerHTML = '✅ متصل! اختر غرفة';
            
            mainChannel = ably.channels.get('main_signals');
            
            // استقبال إشارات WebRTC
            mainChannel.subscribe('webrtc', (signal) => {
                handleSignal(signal.data);
            });
            
            // استقبال رسائل الدردشة النصية
            mainChannel.subscribe('chat', (msg) => {
                const msgId = `${msg.data.sender}_${msg.data.text}_${msg.data.time}`;
                if (!processedMessages.has(msgId)) {
                    processedMessages.add(msgId);
                    displayChatMessage(msg.data);
                }
            });
            
            // استقبال رفع اليد
            mainChannel.subscribe('hand', (hand) => {
                if (hand.data.room === currentRoom && hand.data.user !== currentUser) {
                    if (hand.data.action === 'raise') {
                        if (!hands.includes(hand.data.user)) hands.push(hand.data.user);
                    } else {
                        hands = hands.filter(h => h !== hand.data.user);
                    }
                    updateParticipantsList();
                }
            });
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        });
        
        ably.connection.on('failed', () => {
            document.getElementById('loginStatus').innerHTML = '❌ فشل الاتصال';
        });
    }
    
    async function joinRoom(roomName) {
        if (currentRoom) {
            leaveRoom();
        }
        
        currentRoom = roomName;
        
        // تحديث واجهة الغرف
        document.querySelectorAll('.room-btn').forEach(btn => btn.classList.remove('active'));
        event.target.closest('.room-btn').classList.add('active');
        
        document.getElementById('callControls').style.display = 'flex';
        
        // الإعلان عن الدخول للغرفة
        mainChannel.publish('chat', {
            sender: 'system',
            text: `🎉 ${currentUser} دخل غرفة ${roomName}`,
            time: getTime(),
            isSystem: true,
            room: currentRoom
        });
        
        // تحديث قائمة المشاركين
        updateParticipantsList();
        
        // بدء الاتصال بجميع المشاركين
        connectToAllParticipants();
    }
    
    function connectToAllParticipants() {
        // طلب قائمة المشاركين من Ably Presence
        const roomChannel = ably.channels.get(`room_${currentRoom}`);
        
        roomChannel.presence.enter({ name: currentUser, room: currentRoom });
        
        roomChannel.presence.subscribe('enter', (member) => {
            if (member.data.name !== currentUser && !peers.has(member.data.name)) {
                createPeerConnection(member.data.name, true);
            }
            updateParticipantsList();
        });
        
        roomChannel.presence.subscribe('leave', (member) => {
            if (peers.has(member.data.name)) {
                peers.get(member.data.name).destroy();
                peers.delete(member.data.name);
            }
            updateParticipantsList();
        });
        
        // جلب المشاركين الحاليين
        roomChannel.presence.get((err, members) => {
            if (!err && members) {
                members.forEach(member => {
                    if (member.data.name !== currentUser && !peers.has(member.data.name)) {
                        createPeerConnection(member.data.name, true);
                    }
                });
            }
        });
        
        setInterval(() => updateParticipantsList(), 3000);
    }
    
    function createPeerConnection(remoteUser, initiator = true) {
        const peer = new SimplePeer({
            initiator: initiator,
            stream: localStream,
            trickle: false
        });
        
        peer.on('signal', signalData => {
            mainChannel.publish('webrtc', {
                to: remoteUser,
                from: currentUser,
                signal: signalData,
                type: 'signal',
                room: currentRoom
            });
        });
        
        peer.on('stream', stream => {
            // تشغيل صوت المتحدث (ارتفاع الصوت تلقائي حسب قوة الصوت)
            const audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
            
            // إضافة مؤشر أن هذا الشخص يتكلم
            const audioContext = new AudioContext();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            const checkVolume = setInterval(() => {
                analyser.getByteTimeDomainData(dataArray);
                let max = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = Math.abs(dataArray[i] - 128) / 128;
                    if (v > max) max = v;
                }
                if (max > 0.1) {
                    document.querySelector(`.participant[data-user="${remoteUser}"]`)?.classList.add('speaking');
                } else {
                    document.querySelector(`.participant[data-user="${remoteUser}"]`)?.classList.remove('speaking');
                }
            }, 100);
            
            peer.on('close', () => clearInterval(checkVolume));
        });
        
        peer.on('error', err => console.error('Peer error:', err));
        
        peers.set(remoteUser, peer);
        return peer;
    }
    
    function handleSignal(data) {
        if (data.room !== currentRoom) return;
        if (data.to !== currentUser) return;
        
        if (peers.has(data.from)) {
            peers.get(data.from).signal(data.signal);
        } else {
            const peer = createPeerConnection(data.from, false);
            peer.signal(data.signal);
        }
    }
    
    function toggleMute() {
        if (localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            isMuted = !audioTrack.enabled;
            document.getElementById('muteBtn').innerHTML = isMuted ? '🔇 فتح المايك' : '🔊 كتم المايك';
            document.getElementById('muteBtn').style.background = isMuted ? '#f44336' : '#45A29E';
        }
    }
    
    function raiseHand() {
        mainChannel.publish('hand', {
            user: currentUser,
            room: currentRoom,
            action: 'raise'
        });
        
        document.getElementById('handBtn').innerHTML = '✋ يد مرفوعة ✓';
        document.getElementById('handBtn').style.background = '#4CAF50';
        
        setTimeout(() => {
            document.getElementById('handBtn').innerHTML = '✋ ارفع يد';
            document.getElementById('handBtn').style.background = '#ff9800';
        }, 3000);
    }
    
    function updateParticipantsList() {
        const roomChannel = ably.channels.get(`room_${currentRoom}`);
        
        roomChannel.presence.get((err, members) => {
            if (err || !members) return;
            
            const users = members.map(m => m.data.name);
            const uniqueUsers = [...new Set(users)];
            
            document.getElementById('onlineCount').innerHTML = `🟢 ${uniqueUsers.length} متصل`;
            
            const container = document.getElementById('participantsList');
            container.innerHTML = '<div style="color:#888; margin-bottom:5px;">👥 المشاركين:</div>';
            
            uniqueUsers.forEach(user => {
                const isMe = (user === currentUser);
                const hasHand = hands.includes(user);
                
                const div = document.createElement('div');
                div.className = 'participant';
                div.setAttribute('data-user', user);
                div.innerHTML = `
                    <div class="participant-name">
                        ${isMe ? '👤' : '👥'} ${escapeHtml(user)}
                        ${hasHand ? '<span style="background:#ff9800; padding:2px 6px; border-radius:10px; font-size:10px;">✋ يد مرفوعة</span>' : ''}
                        ${!isMe ? '<span style="font-size:10px; color:#4CAF50;">🎙️</span>' : ''}
                    </div>
                    ${isMe ? `<button class="mic-btn ${isMuted ? 'muted' : ''}" onclick="toggleMute()">${isMuted ? '🔇 كتم' : '🔊 فتح'}</button>` : ''}
                `;
                container.appendChild(div);
            });
        });
    }
    
    function sendChatMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !currentRoom) return;
        
        const msg = {
            sender: currentUser,
            text: text,
            time: getTime(),
            isSystem: false,
            room: currentRoom,
            id: Date.now()
        };
        
        mainChannel.publish('chat', msg);
        displayChatMessage(msg, true);
        input.value = '';
    }
    
    function displayChatMessage(msg, isMe = false) {
        if (msg.room && msg.room !== currentRoom) return;
        
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        
        if (msg.isSystem || msg.sender === 'system') {
            div.className = 'msg system-msg';
            div.innerHTML = msg.text;
        } else {
            const isCurrent = (msg.sender === currentUser);
            div.className = `msg ${isCurrent ? 'my-msg' : 'other-msg'}`;
            div.innerHTML = `
                ${!isCurrent ? `<div class="sender">${escapeHtml(msg.sender)}</div>` : ''}
                <div>${escapeHtml(msg.text)}</div>
                <div class="time">${msg.time}</div>
            `;
        }
        
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
        
        // حذف الرسائل القديمة
        if (container.children.length > 100) {
            container.removeChild(container.children[0]);
        }
    }
    
    function leaveRoom() {
        if (currentRoom) {
            // إغلاق جميع الاتصالات
            peers.forEach((peer, userId) => {
                peer.destroy();
            });
            peers.clear();
            
            mainChannel.publish('chat', {
                sender: 'system',
                text: `🔴 ${currentUser} غادر غرفة ${currentRoom}`,
                time: getTime(),
                isSystem: true,
                room: currentRoom
            });
            
            const roomChannel = ably.channels.get(`room_${currentRoom}`);
            roomChannel.presence.leave();
            
            currentRoom = null;
            document.getElementById('callControls').style.display = 'none';
            document.getElementById('participantsList').innerHTML = '<div style="color:#888; text-align:center;">اختر غرفة للانضمام</div>';
            document.getElementById('onlineCount').innerHTML = '🟢 0 متصل';
            document.getElementById('messages').innerHTML = '';
        }
    }
    
    function logout() {
        leaveRoom();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (ably) ably.close();
        location.reload();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
