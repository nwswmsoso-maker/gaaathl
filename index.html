<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غرفة لودو - اتصال صوتي</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0a3d2f; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        /* نفس التصميم الأصلي */
        .game-room { max-width: 450px; width: 100%; background: #f5e6ca; border-radius: 30px; overflow: hidden; border: 5px solid #ffd700; }
        .room-header { background: #ffd700; padding: 15px; text-align: center; color: #8B0000; }
        .login-box, .chat-box { padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 25px; font-size: 16px; }
        button { background: #8B0000; color: white; cursor: pointer; }
        .hidden { display: none; }
        
        .online-users { background: #e8d5a8; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 15px; margin: 5px 0; border-radius: 25px; }
        .call-btn { background: #4CAF50; padding: 8px 20px; border-radius: 25px; font-size: 13px; width: auto; margin: 0; }
        .call-btn.in-call { background: #f44336; }
        
        .messages { height: 250px; overflow-y: auto; background: #e8d5a8; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; margin: 5px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .my-msg { background: #8B0000; color: white; margin-left: auto; text-align: right; }
        .other-msg { background: white; margin-right: auto; }
        .system-msg { background: #ffd700; text-align: center; margin: 5px auto; font-size: 11px; width: fit-content; }
        
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; margin: 0; background: white; }
        .input-area button { width: auto; padding: 12px 20px; }
        .mic-control { display: flex; gap: 10px; margin-top: 10px; }
        .mic-control button { background: #666; }
        
        /* لوحة الاتصال المنفصلة - حترافية */
        .call-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .call-panel.show {
            visibility: visible;
            opacity: 1;
        }
        .call-card {
            background: #f5e6ca;
            border-radius: 60px;
            padding: 40px;
            text-align: center;
            width: 300px;
            border: 5px solid #ffd700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .call-avatar {
            font-size: 90px;
            margin-bottom: 15px;
        }
        .call-name {
            font-size: 28px;
            font-weight: bold;
            color: #8B0000;
            margin-bottom: 10px;
        }
        .call-status {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        .call-actions {
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        .call-actions button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 28px;
            margin: 0;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .call-actions button:active {
            transform: scale(0.95);
        }
        .accept-call {
            background: #4CAF50;
            color: white;
        }
        .reject-call {
            background: #f44336;
            color: white;
        }
        .end-call {
            background: #f44336;
            color: white;
            width: 120px !important;
            border-radius: 40px !important;
        }
        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(-5px); }
            75% { transform: translate(5px); }
            100% { transform: translate(0); }
        }
        .ringing {
            animation: vibrate 0.3s infinite;
        }
    </style>
</head>
<body>

<div class="game-room">
    <div class="room-header">
        <h2>🎙️ اتصال صوتي</h2>
        <p>اتصل مع الأصدقاء</p>
    </div>

    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <button onclick="login()">دخول</button>
        <div id="loginStatus" style="font-size:12px; text-align:center; margin-top:10px;"></div>
    </div>

    <div id="chatScreen" class="chat-box hidden">
        <div class="online-users" id="onlineUsers">🟢 جاري التحميل...</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">إرسال</button>
        </div>
        <div class="mic-control">
            <button id="muteBtn" onclick="toggleMute()">🔇 كتم مايكي</button>
            <button onclick="logout()" style="background:#666;">🚪 خروج</button>
        </div>
    </div>
</div>

<!-- لوحة الاتصال المنفصلة -->
<div id="callPanel" class="call-panel">
    <div class="call-card" id="callCard">
        <div class="call-avatar" id="callAvatar">🎤</div>
        <div class="call-name" id="callName">...</div>
        <div class="call-status" id="callStatusText">...</div>
        <div class="call-actions" id="callActions"></div>
    </div>
</div>

<script>
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, channel, currentUser;
    let localStream = null;
    let currentCall = null;
    let callWithUser = null;
    let isMuted = false;
    let processedMessages = new Set();
    let pendingCaller = null;
    let ringInterval = null;

    function playRingtone() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 440;
            gain.gain.value = 0.2;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1);
            setTimeout(() => {
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.frequency.value = 880;
                gain2.gain.value = 0.2;
                osc2.start();
                gain2.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1);
            }, 1000);
        } catch(e) {}
    }
    
    function startRing() {
        playRingtone();
        ringInterval = setInterval(() => playRingtone(), 3000);
        if (navigator.vibrate) navigator.vibrate([500, 300, 500]);
        document.getElementById('callCard').classList.add('ringing');
    }
    
    function stopRing() {
        if (ringInterval) clearInterval(ringInterval);
        if (navigator.vibrate) navigator.vibrate(0);
        document.getElementById('callCard').classList.remove('ringing');
    }

    async function login() {
        currentUser = document.getElementById('username').value.trim();
        if (!currentUser) { alert('اكتب اسمك'); return; }
        
        document.getElementById('loginStatus').innerHTML = '🎤 جاري طلب الميكروفون...';
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('loginStatus').innerHTML = '✅ جاهز';
        } catch(err) {
            document.getElementById('loginStatus').innerHTML = '⚠️ ميكروفون غير متاح';
        }
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            channel = ably.channels.get('lodo_call');
            
            channel.subscribe('msg', (m) => {
                let id = `${m.data.sender}_${m.data.text}_${m.data.time}`;
                if (!processedMessages.has(id)) {
                    processedMessages.add(id);
                    showMsg(m.data);
                }
            });
            
            channel.subscribe('signal', (s) => handleSignal(s.data));
            channel.subscribe('call', (c) => handleCall(c.data));
            
            channel.presence.enter({ name: currentUser });
            channel.presence.subscribe(() => updateUsers());
            updateUsers();
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        });
    }
    
    function updateUsers() {
        channel.presence.get((err, members) => {
            if (err) return;
            let users = [...new Set(members.map(m => m.data.name))];
            let others = users.filter(u => u !== currentUser);
            let container = document.getElementById('onlineUsers');
            if (others.length === 0) {
                container.innerHTML = '👥 لا يوجد متصلين';
                return;
            }
            container.innerHTML = '<div style="margin-bottom:8px;">👥 المتصلون:</div>';
            others.forEach(user => {
                let div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <span>${user}</span>
                    <button class="call-btn" onclick="startCall('${user}')">🎤 اتصل</button>
                `;
                container.appendChild(div);
            });
        });
    }
    
    function startCall(target) {
        if (!localStream) { alert('الميكروفون غير متاح'); return; }
        if (currentCall) { endCall(); }
        
        callWithUser = target;
        
        document.getElementById('callPanel').classList.add('show');
        document.getElementById('callName').innerHTML = target;
        document.getElementById('callStatusText').innerHTML = 'جاري الاتصال...';
        document.getElementById('callAvatar').innerHTML = '📞';
        document.getElementById('callActions').innerHTML = '<button class="end-call" onclick="endCall()">🔴 إنهاء</button>';
        
        channel.publish('call', { type: 'ring', from: currentUser, to: target });
        
        createPeer(target, true);
    }
    
    function handleCall(data) {
        if (data.to !== currentUser) return;
        
        if (data.type === 'ring' && !currentCall && !pendingCaller) {
            pendingCaller = data.from;
            
            document.getElementById('callPanel').classList.add('show');
            document.getElementById('callName').innerHTML = data.from;
            document.getElementById('callStatusText').innerHTML = 'يتصل بك...';
            document.getElementById('callAvatar').innerHTML = '🎤';
            document.getElementById('callActions').innerHTML = `
                <button class="accept-call" onclick="acceptCall()">✅</button>
                <button class="reject-call" onclick="rejectCall()">❌</button>
            `;
            
            startRing();
        }
    }
    
    function acceptCall() {
        stopRing();
        callWithUser = pendingCaller;
        document.getElementById('callStatusText').innerHTML = 'جاري الرد...';
        document.getElementById('callActions').innerHTML = '<button class="end-call" onclick="endCall()">🔴 إنهاء</button>';
        createPeer(pendingCaller, false);
        pendingCaller = null;
    }
    
    function rejectCall() {
        stopRing();
        document.getElementById('callPanel').classList.remove('show');
        channel.publish('signal', { to: pendingCaller, from: currentUser, type: 'reject' });
        pendingCaller = null;
    }
    
    function createPeer(remote, init) {
        let peer = new SimplePeer({
            initiator: init,
            stream: localStream,
            trickle: false,
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        
        peer.on('signal', sig => {
            channel.publish('signal', { to: remote, from: currentUser, signal: sig });
        });
        
        peer.on('stream', stream => {
            let audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
            document.getElementById('callStatusText').innerHTML = 'متصل';
            document.getElementById('callAvatar').innerHTML = '🎙️';
        });
        
        peer.on('error', () => endCall());
        peer.on('close', () => endCall());
        
        currentCall = peer;
    }
    
    function handleSignal(data) {
        if (data.to !== currentUser) return;
        if (data.type === 'reject') {
            endCall();
            showMsg({ sender: 'system', text: `📞 ${data.from} رفض المكالمة`, time: getTime() });
            return;
        }
        if (data.signal && currentCall) {
            currentCall.signal(data.signal);
        }
    }
    
    function endCall() {
        stopRing();
        if (currentCall) { currentCall.destroy(); currentCall = null; }
        document.getElementById('callPanel').classList.remove('show');
        callWithUser = null;
        pendingCaller = null;
        updateUsers();
    }
    
    function toggleMute() {
        if (localStream) {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('muteBtn').innerHTML = isMuted ? '🔊 فتح المايك' : '🔇 كتم مايكي';
        }
    }
    
    function sendMsg() {
        let txt = document.getElementById('msgInput').value.trim();
        if (!txt) return;
        channel.publish('msg', { sender: currentUser, text: txt, time: getTime() });
        showMsg({ sender: currentUser, text: txt, time: getTime() }, true);
        document.getElementById('msgInput').value = '';
    }
    
    function showMsg(msg, isMe = false) {
        let container = document.getElementById('messages');
        let div = document.createElement('div');
        if (msg.sender === 'system') {
            div.className = 'msg system-msg';
            div.innerHTML = msg.text;
        } else {
            div.className = `msg ${msg.sender === currentUser ? 'my-msg' : 'other-msg'}`;
            div.innerHTML = `${msg.sender !== currentUser ? `<strong>${msg.sender}</strong><br>` : ''}${msg.text}<div style="font-size:9px;">${msg.time}</div>`;
        }
        container.appendChild(div);
        div.scrollIntoView();
    }
    
    function logout() {
        if (currentCall) endCall();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (channel) { channel.presence.leave(); ably.close(); }
        location.reload();
    }
    
    function getTime() { return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }); }
</script>

</body>
</html>
