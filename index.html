<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الصوت - غرفة واحدة</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a3d2f; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: #f5e6ca; border-radius: 30px; overflow: hidden; border: 5px solid #ffd700; }
        .header { background: #ffd700; padding: 15px; text-align: center; color: #8B0000; }
        .login-box, .chat-box { padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 25px; font-size: 16px; }
        button { background: #8B0000; color: white; cursor: pointer; }
        .hidden { display: none; }
        .messages { height: 300px; overflow-y: auto; background: #e8d5a8; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; margin: 5px; border-radius: 15px; max-width: 80%; }
        .my-msg { background: #8B0000; color: white; margin-left: auto; text-align: right; }
        .other-msg { background: white; margin-right: auto; }
        .system-msg { background: #ffd700; text-align: center; margin: 5px auto; font-size: 12px; width: fit-content; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; margin: 0; }
        .input-area button { width: auto; padding: 12px 20px; }
        .mic-status { background: #e8d5a8; padding: 10px; border-radius: 15px; margin-bottom: 10px; text-align: center; }
        .mic-on { color: green; }
        .mic-off { color: red; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🎙️ غرفة الصوت</h2>
        <p>تحدث مع الجميع</p>
    </div>

    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <button onclick="login()">دخول</button>
        <div id="loginStatus" style="font-size:12px; text-align:center; margin-top:10px;"></div>
    </div>

    <div id="chatScreen" class="chat-box hidden">
        <div class="mic-status" id="micStatus">
            🔴 الميكروفون: غير متاح
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">إرسال</button>
        </div>
        <button onclick="logout()" style="background:#666; margin-top:10px;">🚪 خروج</button>
    </div>
</div>

<script>
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, channel, currentUser;
    let localStream = null;
    let isMicWorking = false;

    async function login() {
        currentUser = document.getElementById('username').value.trim();
        if (!currentUser) {
            document.getElementById('loginStatus').innerHTML = '❌ اكتب اسمك';
            return;
        }
        
        document.getElementById('loginStatus').innerHTML = '🎤 جاري طلب الميكروفون...';
        
        // طلب الميكروفون
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            isMicWorking = true;
            document.getElementById('loginStatus').innerHTML = '✅ ميكروفون شغال! جاري الاتصال...';
            document.getElementById('micStatus').innerHTML = '🟢 الميكروفون: شغال ✅';
            document.getElementById('micStatus').style.color = 'green';
        } catch(err) {
            isMicWorking = false;
            document.getElementById('loginStatus').innerHTML = '⚠️ الميكروفون غير متاح - دردشة نصية فقط';
            document.getElementById('micStatus').innerHTML = '🔴 الميكروفون: غير متاح ⚠️';
        }
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            channel = ably.channels.get('voice_chat');
            
            // استقبال الرسائل
            channel.subscribe('message', (msg) => {
                displayMsg(msg.data);
            });
            
            // استقبال الصوت
            if (isMicWorking) {
                setupVoice();
            }
            
            // الحضور
            channel.presence.enter({ name: currentUser });
            
            // رسالة ترحيب
            channel.publish('message', {
                sender: 'system',
                text: `🎉 ${currentUser} دخل الغرفة`,
                time: getTime()
            });
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        });
    }
    
    function setupVoice() {
        // قناة الصوت المنفصلة
        const voiceChannel = ably.channels.get('voice_stream');
        
        // إرسال الصوت
        const sendInterval = setInterval(() => {
            if (localStream && isMicWorking) {
                // نرسل إشارة أن المستخدم يتكلم
                voiceChannel.publish('voice_active', {
                    user: currentUser,
                    active: true
                });
            }
        }, 100);
        
        // استقبال الصوت - تشغيل صوت المستخدمين الآخرين
        voiceChannel.subscribe('voice_active', (data) => {
            if (data.data.user !== currentUser) {
                // تشغيل صوت تنبيه أن المستخدم يتكلم
                playBeep();
            }
        });
    }
    
    function playBeep() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
        } catch(e) { console.log('Beep error:', e); }
    }
    
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;
        
        channel.publish('message', {
            sender: currentUser,
            text: text,
            time: getTime()
        });
        
        displayMsg({ sender: currentUser, text: text, time: getTime() }, true);
        input.value = '';
    }
    
    function displayMsg(msg, isMe = false) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        
        if (msg.sender === 'system') {
            div.className = 'msg system-msg';
            div.innerHTML = msg.text;
        } else {
            div.className = `msg ${msg.sender === currentUser ? 'my-msg' : 'other-msg'}`;
            div.innerHTML = `
                ${msg.sender !== currentUser ? `<strong>${msg.sender}</strong><br>` : ''}
                ${msg.text}
                <div style="font-size:9px; margin-top:3px;">${msg.time}</div>
            `;
        }
        
        container.appendChild(div);
        div.scrollIntoView();
    }
    
    function logout() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (ably) ably.close();
        location.reload();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
</script>

</body>
</html>
