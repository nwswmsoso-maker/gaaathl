<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 تواصل اجتماعي</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Cairo',sans-serif; background:#1a5c2a; overflow:hidden; position:fixed; width:100%; height:100%; }
        
        /* ============ تسجيل الدخول ============ */
        .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(145deg,#0d3318,#1a5c2a); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .login-box { background:white; border-radius:40px; padding:40px 30px; max-width:380px; width:90%; box-shadow:0 30px 50px rgba(0,0,0,0.3); }
        .login-logo { text-align:center; margin-bottom:30px; }
        .login-logo i { font-size:4rem; color:#075E54; background:#e8f5e9; padding:20px; border-radius:50%; }
        .login-logo h1 { font-size:1.8rem; color:#075E54; margin-top:15px; }
        .input-group { margin-bottom:20px; position:relative; }
        .input-group i { position:absolute; right:15px; top:18px; color:#999; }
        .input-group input { width:100%; padding:15px 45px 15px 15px; border:2px solid #eee; border-radius:15px; font-family:'Cairo',sans-serif; font-size:16px; }
        .input-group input:focus { outline:none; border-color:#075E54; }
        .login-btn { width:100%; padding:15px; background:#075E54; color:white; border:none; border-radius:15px; font-size:1.2rem; font-weight:700; cursor:pointer; }
        .login-footer { text-align:center; margin-top:20px; }
        .login-footer a { color:#075E54; text-decoration:none; font-weight:600; cursor:pointer; }
        
        /* ============ التطبيق الرئيسي ============ */
        .app { position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f2f5; display:flex; flex-direction:column; }
        .app-header { background:#075E54; color:white; padding:15px; display:flex; align-items:center; justify-content:space-between; }
        .app-header h2 { font-size:1.3rem; }
        .app-header i { font-size:1.3rem; cursor:pointer; margin:0 5px; }
        .user-info { display:flex; align-items:center; gap:10px; }
        .user-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
        
        /* شارات الإشعارات */
        .badge { background:#f44336; color:white; border-radius:50%; padding:2px 6px; font-size:0.7rem; position:absolute; top:-5px; right:-5px; min-width:18px; text-align:center; }
        .tab { position:relative; }
        
        /* التبويبات */
        .tabs { display:flex; background:#075E54; padding:0 10px; }
        .tab { flex:1; padding:15px; text-align:center; color:rgba(255,255,255,0.7); cursor:pointer; font-weight:600; border-bottom:3px solid transparent; position:relative; }
        .tab i { margin-left:5px; }
        .tab.active { color:white; border-bottom-color:#FFD700; }
        
        .content { flex:1; overflow-y:auto; background:white; }
        
        /* ============ الدردشة العامة ============ */
        .chat-container { height:100%; display:flex; flex-direction:column; }
        .messages { flex:1; overflow-y:auto; padding:15px; background:#e5ddd5; }
        .message { display:flex; gap:10px; margin-bottom:15px; }
        .msg-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; flex-shrink:0; }
        .msg-content { max-width:70%; }
        .msg-header { display:flex; align-items:center; gap:5px; margin-bottom:3px; flex-wrap:wrap; }
        .msg-name { font-weight:700; color:#075E54; }
        .msg-bubble { background:white; padding:10px 15px; border-radius:10px; word-break:break-word; }
        .msg-time { font-size:0.7rem; color:#999; margin-top:3px; }
        .message.own { flex-direction:row-reverse; }
        .message.own .msg-bubble { background:#dcf8c6; }
        .admin-badge { background:#FFD700; color:#333; padding:2px 8px; border-radius:10px; font-size:0.7rem; }
        .add-friend-btn { background:#2196F3; color:white; border:none; padding:3px 10px; border-radius:15px; font-size:0.7rem; cursor:pointer; margin-right:5px; }
        
        .chat-input-area { padding:15px; background:#f0f2f5; display:flex; gap:10px; }
        .chat-input { flex:1; padding:12px 15px; border:none; border-radius:25px; font-family:'Cairo',sans-serif; }
        .send-btn { width:50px; height:50px; background:#075E54; border:none; border-radius:50%; color:white; font-size:1.2rem; cursor:pointer; }
        
        /* ============ المنشورات ============ */
        .posts-container { padding:15px; }
        .post-card { background:white; border-radius:15px; padding:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .post-author { font-weight:700; }
        .post-text { margin-bottom:15px; line-height:1.5; }
        .post-actions { display:flex; gap:20px; color:#666; border-top:1px solid #eee; padding-top:10px; }
        .post-actions span { cursor:pointer; }
        .create-post-btn { background:#075E54; color:white; padding:15px; border-radius:15px; text-align:center; margin-bottom:15px; cursor:pointer; }
        
        /* ============ الأصدقاء ============ */
        .friends-container { padding:15px; }
        .add-friend { display:flex; gap:10px; margin-bottom:20px; }
        .add-friend input { flex:1; padding:12px; border:1px solid #ddd; border-radius:25px; font-family:'Cairo',sans-serif; }
        .add-friend button { padding:12px 20px; background:#075E54; color:white; border:none; border-radius:25px; cursor:pointer; }
        .section-title { font-weight:700; margin:20px 0 10px; color:#075E54; display:flex; align-items:center; gap:10px; }
        .friend-card { display:flex; align-items:center; justify-content:space-between; padding:15px; background:#f8f9fa; border-radius:15px; margin-bottom:10px; }
        .friend-info { display:flex; align-items:center; gap:12px; }
        .friend-avatar { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
        .friend-name { font-weight:700; }
        .friend-status { font-size:0.8rem; }
        .online { color:#4CAF50; }
        .offline { color:#999; }
        .friend-actions { display:flex; gap:5px; }
        .action-btn { width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; font-size:1rem; }
        .call-btn { background:#4CAF50; color:white; }
        .chat-btn { background:#2196F3; color:white; }
        .accept-btn { background:#4CAF50; color:white; padding:8px 20px; border-radius:20px; border:none; cursor:pointer; }
        .reject-btn { background:#f44336; color:white; padding:8px 20px; border-radius:20px; border:none; cursor:pointer; }
        
        /* ============ نشط الآن ============ */
        .active-container { padding:15px; }
        .active-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:15px; }
        .refresh-btn { background:#075E54; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; }
        .active-card { display:flex; align-items:center; gap:15px; padding:15px; border-bottom:1px solid #eee; }
        .active-avatar { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
        .active-info { flex:1; }
        .active-name { font-weight:700; }
        .online-dot { width:12px; height:12px; background:#4CAF50; border-radius:50%; }
        .add-active-btn { background:#2196F3; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer; font-size:0.9rem; }
        
        /* ============ محادثة خاصة ============ */
        .private-chat { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; display:flex; flex-direction:column; }
        .private-header { background:#075E54; color:white; padding:15px; display:flex; align-items:center; gap:15px; }
        .private-header i { font-size:1.3rem; cursor:pointer; }
        .private-header span { font-size:1.2rem; font-weight:600; flex:1; }
        .private-messages { flex:1; overflow-y:auto; padding:15px; background:#e5ddd5; }
        .private-input-area { padding:15px; background:#f0f2f5; display:flex; gap:10px; }
        .private-input { flex:1; padding:12px; border:none; border-radius:25px; }
        
        /* ============ شاشة المكالمة ============ */
        .call-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(145deg,#1a5c2a,#0d3318); z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .call-avatar { width:150px; height:150px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:4rem; color:white; border:4px solid #FFD700; margin-bottom:20px; }
        .call-name { font-size:2rem; color:white; margin-bottom:10px; }
        .call-status { color:#FFD700; font-size:1.2rem; margin-bottom:50px; }
        .call-actions { display:flex; gap:30px; }
        .call-btn { width:70px; height:70px; border-radius:50%; border:none; font-size:1.8rem; cursor:pointer; }
        .call-end { background:#f44336; color:white; }
        .call-mute { background:rgba(255,255,255,0.2); color:white; }
        .call-mute.muted { background:#f44336; }
        
        /* ============ ألوان ============ */
        .bg-red { background:#e74c3c; }
        .bg-blue { background:#3498db; }
        .bg-green { background:#2ecc71; }
        .bg-orange { background:#f39c12; }
        .bg-purple { background:#9b59b6; }
        .bg-teal { background:#1abc9c; }
        
        .hidden { display:none !important; }
    </style>
</head>
<body>

<!-- ============ شاشة تسجيل الدخول ============ -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <i class="fas fa-comments"></i>
            <h1>تواصل اجتماعي</h1>
        </div>
        <div id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
            </div>
            <button class="login-btn" onclick="login()">دخول</button>
            <div class="login-footer">
                <a onclick="showRegister()">إنشاء حساب جديد</a>
            </div>
        </div>
        <div id="registerForm" class="hidden">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regUsername" placeholder="اسم المستخدم">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="كلمة المرور">
            </div>
            <button class="login-btn" onclick="register()">تسجيل</button>
            <div class="login-footer">
                <a onclick="showLogin()">لدي حساب</a>
            </div>
        </div>
    </div>
</div>

<!-- ============ التطبيق الرئيسي ============ -->
<div id="app" class="app hidden">
    <div class="app-header">
        <div class="user-info">
            <div class="user-avatar" id="myAvatar"></div>
            <span id="myName"></span>
        </div>
        <div>
            <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('chat')" id="chatTabBtn">
            <i class="fas fa-comments"></i> الدردشة
            <span class="badge hidden" id="chatBadge">0</span>
        </div>
        <div class="tab" onclick="switchTab('posts')" id="postsTabBtn">
            <i class="fas fa-newspaper"></i> المنشورات
        </div>
        <div class="tab" onclick="switchTab('friends')" id="friendsTabBtn">
            <i class="fas fa-users"></i> الأصدقاء
            <span class="badge hidden" id="requestsBadge">0</span>
        </div>
        <div class="tab" onclick="switchTab('active')" id="activeTabBtn">
            <i class="fas fa-circle"></i> نشط
        </div>
    </div>
    
    <div class="content">
        <!-- الدردشة العامة -->
        <div id="chatTab" class="chat-container">
            <div class="messages" id="messages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة...">
                <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        
        <!-- المنشورات -->
        <div id="postsTab" class="posts-container hidden">
            <div class="create-post-btn" onclick="createPost()">
                <i class="fas fa-plus-circle"></i> إنشاء منشور
            </div>
            <div id="postsList"></div>
        </div>
        
        <!-- الأصدقاء -->
        <div id="friendsTab" class="friends-container hidden">
            <div class="add-friend">
                <input type="text" id="friendNameInput" placeholder="اسم الصديق">
                <button onclick="addFriend()"><i class="fas fa-user-plus"></i> إضافة</button>
            </div>
            <div class="section-title">👥 أصدقائي</div>
            <div id="friendsList"></div>
            <div class="section-title">📨 طلبات الصداقة <span id="requestsCount"></span></div>
            <div id="requestsList"></div>
        </div>
        
        <!-- نشط الآن -->
        <div id="activeTab" class="active-container hidden">
            <div class="active-header">
                <h3><i class="fas fa-circle" style="color:#4CAF50;"></i> أعضاء نشطون</h3>
                <button class="refresh-btn" onclick="refreshActive()"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
            <div id="activeList"></div>
        </div>
    </div>
</div>

<!-- ============ محادثة خاصة ============ -->
<div id="privateChat" class="private-chat hidden">
    <div class="private-header">
        <i class="fas fa-arrow-right" onclick="closePrivateChat()"></i>
        <span id="privateChatName"></span>
        <i class="fas fa-phone" onclick="startCallFromChat()"></i>
    </div>
    <div class="private-messages" id="privateMessages"></div>
    <div class="private-input-area">
        <input type="text" class="private-input" id="privateInput" placeholder="اكتب رسالة...">
        <button class="send-btn" onclick="sendPrivateMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- ============ شاشة المكالمة ============ -->
<div id="callScreen" class="call-screen hidden">
    <div class="call-avatar" id="callAvatar"></div>
    <div class="call-name" id="callName"></div>
    <div class="call-status" id="callStatus">📞 جاري الاتصال...</div>
    <div class="call-actions">
        <button class="call-btn call-mute" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
        <button class="call-btn call-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<!-- صوت الإشعارات -->
<audio id="notificationSound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<script>
// ================ المتغيرات ================
const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
const ADMIN_USER = '3tx';
const ADMIN_PASS = '11';

let currentUser = null;
let isAdmin = false;
let ably = null;
let pubChannel = null;
let privChannel = null;
let currentChat = null;
let localStream = null;
let currentPeer = null;
let muted = false;

// الإشعارات
let unreadMessages = 0;
let pendingRequests = 0;
let notificationSound = document.getElementById('notificationSound');

// البيانات المحلية
let users = JSON.parse(localStorage.getItem('chat_users')) || {};
let posts = JSON.parse(localStorage.getItem('chat_posts')) || [];
let friends = JSON.parse(localStorage.getItem('chat_friends')) || {};
let requests = JSON.parse(localStorage.getItem('chat_requests')) || {};
let privateMessages = JSON.parse(localStorage.getItem('private_msgs')) || {};

// حفظ آخر مستخدم
const lastUser = localStorage.getItem('chat_lastUser');
if(lastUser) document.getElementById('loginUsername').value = lastUser;

// ================ تشغيل صوت الإشعار ================
function playNotification() {
    notificationSound.currentTime = 0;
    notificationSound.play().catch(e => console.log('الصوت ما اشتغل'));
}

// تحديث الشارات
function updateBadges() {
    // شارة الدردشة
    const chatBadge = document.getElementById('chatBadge');
    if(unreadMessages > 0) {
        chatBadge.textContent = unreadMessages > 9 ? '9+' : unreadMessages;
        chatBadge.classList.remove('hidden');
    } else {
        chatBadge.classList.add('hidden');
    }
    
    // شارة الطلبات
    const reqBadge = document.getElementById('requestsBadge');
    if(pendingRequests > 0) {
        reqBadge.textContent = pendingRequests > 9 ? '9+' : pendingRequests;
        reqBadge.classList.remove('hidden');
    } else {
        reqBadge.classList.add('hidden');
    }
}

// ================ الألوان ================
function getColor(name) {
    const colors = ['bg-red','bg-blue','bg-green','bg-orange','bg-purple','bg-teal'];
    return colors[(name || 'a').charCodeAt(0) % colors.length];
}

// ================ تسجيل الدخول ================
function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
}

function showLogin() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
}

function register() {
    const u = document.getElementById('regUsername').value.trim();
    const p = document.getElementById('regPassword').value;
    if(!u||!p) { alert('املأ الحقول'); return; }
    if(users[u]) { alert('الاسم موجود'); return; }
    users[u] = p;
    localStorage.setItem('chat_users', JSON.stringify(users));
    alert('✅ تم التسجيل');
    showLogin();
    document.getElementById('loginUsername').value = u;
}

async function login() {
    const u = document.getElementById('loginUsername').value.trim();
    const p = document.getElementById('loginPassword').value;
    
    if(u === ADMIN_USER && p === ADMIN_PASS) {
        isAdmin = true;
        if(!users[u]) users[u] = p;
    } else if(!users[u] || users[u] !== p) {
        alert('❌ بيانات خاطئة');
        return;
    } else {
        isAdmin = false;
    }
    
    currentUser = u;
    localStorage.setItem('chat_lastUser', u);
    
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) {}
    
    ably = new Ably.Realtime({ key: ABLY_KEY, clientId: u });
    ably.connection.on('connected', () => {
        pubChannel = ably.channels.get('public');
        pubChannel.subscribe('msg', (m) => handlePublicMessage(m.data));
        pubChannel.subscribe('post', (m) => { posts.unshift(m.data); savePosts(); });
        pubChannel.presence.enter({ username: u, admin: isAdmin });
        pubChannel.presence.subscribe('enter', updateActive);
        pubChannel.presence.subscribe('leave', updateActive);
        
        privChannel = ably.channels.get(`priv-${u}`);
        privChannel.subscribe('msg', (m) => handlePrivateMessage(m.data));
        privChannel.subscribe('call', handleCall);
        privChannel.subscribe('signal', handleSignal);
        privChannel.subscribe('friend-req', handleFriendReq);
        privChannel.subscribe('friend-acc', handleFriendAcc);
    });
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('myName').textContent = u;
    document.getElementById('myAvatar').textContent = u[0].toUpperCase();
    document.getElementById('myAvatar').className = `user-avatar ${getColor(u)}`;
    
    loadFriends();
    loadPosts();
    loadMessages();
    updateActive();
    updateRequestsCount();
}

function logout() {
    if(ably) ably.close();
    localStorage.removeItem('chat_lastUser');
    location.reload();
}

// ================ التبويبات ================
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('chatTab').classList.add('hidden');
    document.getElementById('postsTab').classList.add('hidden');
    document.getElementById('friendsTab').classList.add('hidden');
    document.getElementById('activeTab').classList.add('hidden');
    
    if(tab === 'chat') { 
        document.getElementById('chatTab').classList.remove('hidden');
        unreadMessages = 0;
        updateBadges();
    }
    else if(tab === 'posts') { document.getElementById('postsTab').classList.remove('hidden'); renderPosts(); }
    else if(tab === 'friends') { document.getElementById('friendsTab').classList.remove('hidden'); renderFriends(); }
    else if(tab === 'active') { document.getElementById('activeTab').classList.remove('hidden'); renderActive(); }
}

// ================ الدردشة العامة ================
function sendMessage() {
    const inp = document.getElementById('chatInput');
    const text = inp.value.trim();
    if(!text) return;
    
    const msg = { sender: currentUser, text, admin: isAdmin, time: new Date().toLocaleTimeString() };
    pubChannel.publish('msg', msg);
    addMessage(msg, true);
    inp.value = '';
}

function handlePublicMessage(m) {
    if(m.sender !== currentUser) {
        addMessage(m, false);
        if(document.getElementById('chatTab').classList.contains('hidden')) {
            unreadMessages++;
            updateBadges();
            playNotification();
        }
    }
}

function addMessage(m, isOwn) {
    const div = document.getElementById('messages');
    const isMe = isOwn || m.sender === currentUser;
    const isFriend = (friends[currentUser] || []).includes(m.sender);
    
    div.innerHTML += `
        <div class="message ${isMe ? 'own' : ''}">
            <div class="msg-avatar ${getColor(m.sender)}">${m.sender[0]}</div>
            <div class="msg-content">
                <div class="msg-header">
                    <span class="msg-name">${m.sender}</span>
                    ${m.admin ? '<span class="admin-badge">👑 مشرف</span>' : ''}
                    ${!isMe && !isFriend ? `<button class="add-friend-btn" onclick="sendFriendRequestTo('${m.sender}')"><i class="fas fa-user-plus"></i> إضافة</button>` : ''}
                </div>
                <div class="msg-bubble">${m.text}</div>
                <div class="msg-time">${m.time}</div>
            </div>
        </div>
    `;
    div.scrollTop = div.scrollHeight;
}

function sendFriendRequestTo(user) {
    if(user === currentUser) return;
    const ch = ably.channels.get(`priv-${user}`);
    ch.publish('friend-req', { from: currentUser });
    alert(`✅ تم إرسال طلب صداقة إلى ${user}`);
}

function loadMessages() {
    document.getElementById('messages').innerHTML = '';
}

// ================ المنشورات ================
function createPost() {
    const text = prompt('اكتب منشورك:');
    if(!text) return;
    const post = { id: Date.now(), author: currentUser, text, likes: 0, time: new Date().toLocaleString() };
    posts.unshift(post);
    savePosts();
    pubChannel.publish('post', post);
    renderPosts();
}

function renderPosts() {
    const div = document.getElementById('postsList');
    div.innerHTML = posts.map(p => `
        <div class="post-card">
            <div class="post-header">
                <div class="user-avatar ${getColor(p.author)}">${p.author[0]}</div>
                <div>
                    <div class="post-author">${p.author}</div>
                    <div style="font-size:0.7rem;color:#999;">${p.time}</div>
                </div>
            </div>
            <div class="post-text">${p.text}</div>
            <div class="post-actions">
                <span onclick="likePost('${p.id}')"><i class="far fa-heart"></i> ${p.likes}</span>
            </div>
        </div>
    `).join('');
}

function likePost(id) {
    const p = posts.find(x => x.id == id);
    if(p) { p.likes++; savePosts(); renderPosts(); }
}

function savePosts() { localStorage.setItem('chat_posts', JSON.stringify(posts)); }
function loadPosts() { renderPosts(); }

// ================ الأصدقاء ================
function addFriend() {
    const name = document.getElementById('friendNameInput').value.trim();
    if(!name || name === currentUser) return;
    sendFriendRequestTo(name);
    document.getElementById('friendNameInput').value = '';
}

function handleFriendReq(m) {
    if(!requests[currentUser]) requests[currentUser] = [];
    if(!requests[currentUser].find(r => r.from === m.data.from)) {
        requests[currentUser].push({ from: m.data.from });
        localStorage.setItem('chat_requests', JSON.stringify(requests));
        pendingRequests++;
        updateBadges();
        updateRequestsCount();
        playNotification();
        renderFriends();
    }
}

function acceptFriend(from) {
    if(!friends[currentUser]) friends[currentUser] = [];
    if(!friends[from]) friends[from] = [];
    friends[currentUser].push(from);
    friends[from].push(currentUser);
    requests[currentUser] = (requests[currentUser]||[]).filter(r => r.from !== from);
    localStorage.setItem('chat_friends', JSON.stringify(friends));
    localStorage.setItem('chat_requests', JSON.stringify(requests));
    
    const ch = ably.channels.get(`priv-${from}`);
    ch.publish('friend-acc', { from: currentUser });
    
    pendingRequests = (requests[currentUser] || []).length;
    updateBadges();
    updateRequestsCount();
    renderFriends();
}

function rejectFriend(from) {
    requests[currentUser] = (requests[currentUser]||[]).filter(r => r.from !== from);
    localStorage.setItem('chat_requests', JSON.stringify(requests));
    pendingRequests = (requests[currentUser] || []).length;
    updateBadges();
    updateRequestsCount();
    renderFriends();
}

function handleFriendAcc(m) {
    if(!friends[currentUser]) friends[currentUser] = [];
    friends[currentUser].push(m.data.from);
    localStorage.setItem('chat_friends', JSON.stringify(friends));
    playNotification();
    renderFriends();
}

function updateRequestsCount() {
    pendingRequests = (requests[currentUser] || []).length;
    updateBadges();
    document.getElementById('requestsCount').textContent = pendingRequests > 0 ? `(${pendingRequests})` : '';
}

function renderFriends() {
    const myFriends = friends[currentUser] || [];
    const myRequests = requests[currentUser] || [];
    
    document.getElementById('friendsList').innerHTML = myFriends.map(f => `
        <div class="friend-card">
            <div class="friend-info">
                <div class="friend-avatar ${getColor(f)}">${f[0]}</div>
                <div>
                    <div class="friend-name">${f}</div>
                    <div class="friend-status online"><i class="fas fa-circle"></i> متصل</div>
                </div>
            </div>
            <div class="friend-actions">
                <button class="action-btn call-btn" onclick="startCall('${f}')"><i class="fas fa-phone"></i></button>
                <button class="action-btn chat-btn" onclick="openPrivateChat('${f}')"><i class="fas fa-comment"></i></button>
            </div>
        </div>
    `).join('') || '<p style="text-align:center;padding:20px;">لا يوجد أصدقاء</p>';
    
    document.getElementById('requestsList').innerHTML = myRequests.map(r => `
        <div class="friend-card">
            <div class="friend-info">
                <div class="friend-avatar ${getColor(r.from)}">${r.from[0]}</div>
                <div class="friend-name">${r.from}</div>
            </div>
            <div style="display:flex;gap:5px;">
                <button class="accept-btn" onclick="acceptFriend('${r.from}')">قبول</button>
                <button class="reject-btn" onclick="rejectFriend('${r.from}')">رفض</button>
            </div>
        </div>
    `).join('') || '<p style="text-align:center;padding:20px;">لا توجد طلبات</p>';
}

function loadFriends() { 
    renderFriends(); 
    updateRequestsCount();
}

// ================ نشط الآن ================
function refreshActive() {
    updateActive();
}

function updateActive() {
    pubChannel.presence.get((err, members) => {
        window.activeMembers = members || [];
        renderActive();
    });
}

function renderActive() {
    const members = window.activeMembers || [];
    const myFriends = friends[currentUser] || [];
    const div = document.getElementById('activeList');
    
    div.innerHTML = members.filter(m => m.clientId !== currentUser).map(m => {
        const isFriend = myFriends.includes(m.clientId);
        return `
            <div class="active-card">
                <div class="active-avatar ${getColor(m.clientId)}">${m.clientId[0]}</div>
                <div class="active-info">
                    <div class="active-name">${m.clientId} ${m.data?.admin ? '👑' : ''}</div>
                </div>
                ${!isFriend ? `<button class="add-active-btn" onclick="sendFriendRequestTo('${m.clientId}')"><i class="fas fa-user-plus"></i> إضافة</button>` : ''}
                <div class="online-dot"></div>
            </div>
        `;
    }).join('') || '<p style="text-align:center;padding:20px;">لا يوجد نشط الآن</p>';
}

// ================ محادثة خاصة ================
function openPrivateChat(user) {
    currentChat = user;
    document.getElementById('privateChatName').textContent = user;
    document.getElementById('privateChat').classList.remove('hidden');
    loadPrivateMessages(user);
}

function closePrivateChat() {
    document.getElementById('privateChat').classList.add('hidden');
    currentChat = null;
}

function sendPrivateMessage() {
    const inp = document.getElementById('privateInput');
    const text = inp.value.trim();
    if(!text || !currentChat) return;
    
    const msg = { from: currentUser, to: currentChat, text, time: new Date().toLocaleTimeString() };
    
    // حفظ محلي
    const key = [currentUser, currentChat].sort().join('-');
    if(!privateMessages[key]) privateMessages[key] = [];
    privateMessages[key].push(msg);
    localStorage.setItem('private_msgs', JSON.stringify(privateMessages));
    
    const ch = ably.channels.get(`priv-${currentChat}`);
    ch.publish('msg', msg);
    addPrivateMsg(msg, true);
    inp.value = '';
}

function handlePrivateMessage(m) {
    if(m.from !== currentUser) {
        // حفظ محلي
        const key = [currentUser, m.from].sort().join('-');
        if(!privateMessages[key]) privateMessages[key] = [];
        privateMessages[key].push(m);
        localStorage.setItem('private_msgs', JSON.stringify(privateMessages));
        
        playNotification();
        
        if(currentChat === m.from) {
            addPrivateMsg(m, false);
        } else {
            alert(`📨 رسالة جديدة من ${m.from}`);
        }
    }
}

function addPrivateMsg(m, isOwn) {
    const div = document.getElementById('privateMessages');
    const isMe = isOwn || m.from === currentUser;
    div.innerHTML += `
        <div class="message ${isMe ? 'own' : ''}">
            <div class="msg-avatar ${getColor(m.from)}">${m.from[0]}</div>
            <div class="msg-content">
                <div class="msg-bubble">${m.text}</div>
                <div class="msg-time">${m.time || ''}</div>
            </div>
        </div>
    `;
    div.scrollTop = div.scrollHeight;
}

function loadPrivateMessages(user) {
    const key = [currentUser, user].sort().join('-');
    const msgs = privateMessages[key] || [];
    const div = document.getElementById('privateMessages');
    div.innerHTML = msgs.map(m => `
        <div class="message ${m.from === currentUser ? 'own' : ''}">
            <div class="msg-avatar ${getColor(m.from)}">${m.from[0]}</div>
            <div class="msg-content">
                <div class="msg-bubble">${m.text}</div>
                <div class="msg-time">${m.time || ''}</div>
            </div>
        </div>
    `).join('');
    div.scrollTop = div.scrollHeight;
}

// ================ المكالمات ================
function startCall(user) {
    currentChat = user;
    document.getElementById('callScreen').classList.remove('hidden');
    document.getElementById('callName').textContent = user;
    document.getElementById('callAvatar').textContent = user[0];
    document.getElementById('callAvatar').className = `call-avatar ${getColor(user)}`;
    document.getElementById('callStatus').textContent = '📞 جاري الاتصال...';
    
    const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: false });
    setupPeer(peer, user);
    
    const ch = ably.channels.get(`priv-${user}`);
    ch.publish('call', { from: currentUser });
}

function startCallFromChat() {
    if(currentChat) startCall(currentChat);
}

function handleCall(m) {
    if(confirm(`${m.data.from} يتصل بك! هل تريد الرد؟`)) {
        currentChat = m.data.from;
        document.getElementById('callScreen').classList.remove('hidden');
        document.getElementById('callName').textContent = m.data.from;
        document.getElementById('callAvatar').textContent = m.data.from[0];
        document.getElementById('callAvatar').className = `call-avatar ${getColor(m.data.from)}`;
        document.getElementById('callStatus').textContent = '📞 متصل';
        
        const peer = new SimplePeer({ initiator: false, stream: localStream, trickle: false });
        setupPeer(peer, m.data.from);
    }
}

function setupPeer(peer, user) {
    peer.on('signal', signal => {
        const ch = ably.channels.get(`priv-${user}`);
        ch.publish('signal', { signal, from: currentUser });
    });
    
    peer.on('stream', stream => {
        const audio = new Audio();
        audio.srcObject = stream;
        audio.autoplay = true;
        document.getElementById('callStatus').textContent = '📞 متصل';
    });
    
    peer.on('connect', () => {
        document.getElementById('callStatus').textContent = '📞 متصل';
    });
    
    peer.on('close', () => {
        document.getElementById('callScreen').classList.add('hidden');
    });
    
    currentPeer = peer;
}

function handleSignal(m) {
    if(currentPeer && m.data.from !== currentUser) {
        currentPeer.signal(m.data.signal);
    }
}

function toggleMute() {
    if(localStream) {
        muted = !muted;
        localStream.getAudioTracks()[0].enabled = !muted;
        document.getElementById('muteBtn').classList.toggle('muted', muted);
    }
}

function endCall() {
    document.getElementById('callScreen').classList.add('hidden');
    if(currentPeer) {
        currentPeer.destroy();
        currentPeer = null;
    }
}

// ================ تصدير ================
window.showRegister = showRegister;
window.showLogin = showLogin;
window.register = register;
window.login = login;
window.logout = logout;
window.switchTab = switchTab;
window.sendMessage = sendMessage;
window.sendFriendRequestTo = sendFriendRequestTo;
window.createPost = createPost;
window.likePost = likePost;
window.addFriend = addFriend;
window.acceptFriend = acceptFriend;
window.rejectFriend = rejectFriend;
window.openPrivateChat = openPrivateChat;
window.closePrivateChat = closePrivateChat;
window.sendPrivateMessage = sendPrivateMessage;
window.startCall = startCall;
window.startCallFromChat = startCallFromChat;
window.toggleMute = toggleMute;
window.endCall = endCall;
window.refreshActive = refreshActive;
</script>
