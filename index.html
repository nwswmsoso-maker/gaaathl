<script>
// ==================== المتغيرات ====================
const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';

let currentUser = null;
let userCoins = 10000;
let ably = null;
let channel = null;
let gameChannel = null;
let chatChannel = null;
let localStream = null;
let currentPeer = null;
let micEnabled = true;

// المسار - 52 خانة
const PATH = [
    {r:6,c:1},{r:6,c:2},{r:6,c:3},{r:6,c:4},{r:6,c:5},
    {r:5,c:6},{r:4,c:6},{r:3,c:6},{r:2,c:6},{r:1,c:6},{r:0,c:6},
    {r:0,c:7},{r:0,c:8},{r:1,c:8},{r:2,c:8},{r:3,c:8},{r:4,c:8},{r:5,c:8},
    {r:6,c:9},{r:6,c:10},{r:6,c:11},{r:6,c:12},{r:6,c:13},{r:6,c:14},
    {r:7,c:14},{r:8,c:14},{r:8,c:13},{r:8,c:12},{r:8,c:11},{r:8,c:10},{r:8,c:9},
    {r:9,c:8},{r:10,c:8},{r:11,c:8},{r:12,c:8},{r:13,c:8},{r:14,c:8},
    {r:14,c:7},{r:14,c:6},{r:13,c:6},{r:12,c:6},{r:11,c:6},{r:10,c:6},{r:9,c:6},
    {r:8,c:5},{r:8,c:4},{r:8,c:3},{r:8,c:2},{r:8,c:1},{r:8,c:0},
    {r:7,c:0},{r:6,c:0}
];
const STARTS = { green:0, yellow:12 };
const SAFE = [0,12,8,17,30,43];
const HOME = {
    green: [{r:7,c:1},{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5}],
    yellow: [{r:1,c:7},{r:2,c:7},{r:3,c:7},{r:4,c:7},{r:5,c:7}]
};

let gameState = {
    myColor: null, opponentColor: null, lastDice: 0, myTurn: false,
    pieces: {
        green: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
        yellow: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}]
    },
    opponent: null
};

let users = JSON.parse(localStorage.getItem('ludo_users')) || {};
let userStats = JSON.parse(localStorage.getItem('ludo_stats')) || {};
let friends = JSON.parse(localStorage.getItem('ludo_friends')) || {};
let friendRequests = JSON.parse(localStorage.getItem('ludo_requests')) || {};

// حفظ تلقائي لآخر مستخدم
const savedUser = localStorage.getItem('ludo_lastUser');
if(savedUser) {
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loginUsername').value = savedUser;
    });
}

// ==================== تسجيل الدخول التلقائي ====================
async function autoLogin() {
    const lastUser = localStorage.getItem('ludo_lastUser');
    const lastPass = localStorage.getItem('ludo_lastPass');
    if(lastUser && lastPass && users[lastUser] === lastPass) {
        currentUser = lastUser;
        userCoins = userStats[currentUser]?.coins || 10000;
        await connectAbly();
        showMainMenu();
        document.getElementById('loginScreen').classList.add('hidden');
    }
}

// ==================== الاتصال ====================
async function connectAbly() {
    return new Promise((resolve, reject) => {
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        ably.connection.on('connected', () => {
            channel = ably.channels.get('ludo-1v1');
            channel.subscribe('match-found', handleMatchFound);
            channel.subscribe('friend-request', handleFriendRequest);
            channel.subscribe('friend-accept', handleFriendAccept);
            channel.presence.enter({ username: currentUser });
            resolve();
        });
        ably.connection.on('failed', reject);
    });
}

// ==================== تسجيل الدخول ====================
async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if(!username || !password) {
        document.getElementById('loginMessage').textContent = '❌ املأ جميع الحقول';
        return;
    }
    
    if(!users[username]) {
        users[username] = password;
        userStats[username] = { coins: 10000, wins: 0, losses: 0 };
        localStorage.setItem('ludo_users', JSON.stringify(users));
        localStorage.setItem('ludo_stats', JSON.stringify(userStats));
    }
    
    if(users[username] !== password) {
        document.getElementById('loginMessage').textContent = '❌ كلمة مرور خاطئة';
        return;
    }
    
    currentUser = username;
    userCoins = userStats[currentUser]?.coins || 10000;
    
    // حفظ تلقائي
    localStorage.setItem('ludo_lastUser', username);
    localStorage.setItem('ludo_lastPass', password);
    
    try {
        await connectAbly();
        
        // طلب المايك
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch(e) {}
        
        showMainMenu();
    } catch(e) {
        document.getElementById('loginMessage').textContent = '❌ فشل الاتصال';
    }
}

function showMainMenu() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    document.getElementById('menuUsername').textContent = currentUser;
    document.getElementById('userCoins').textContent = userCoins;
}

function logout() {
    localStorage.removeItem('ludo_lastUser');
    localStorage.removeItem('ludo_lastPass');
    if(ably) ably.close();
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
}

// ==================== الأصدقاء ====================
function showFriends() {
    document.getElementById('friendsScreen').classList.remove('hidden');
    renderFriendsList();
}

function renderFriendsList() {
    const myFriends = friends[currentUser] || [];
    const myRequests = friendRequests[currentUser] || [];
    
    const friendsDiv = document.getElementById('friendsList');
    friendsDiv.innerHTML = myFriends.map(f => `
        <div class="friend-item">
            <span class="friend-name">${f}</span>
            <span>🟢 متصل</span>
        </div>
    `).join('') || '<p>لا يوجد أصدقاء</p>';
    
    const requestsDiv = document.getElementById('requestsList');
    requestsDiv.innerHTML = myRequests.map(r => `
        <div class="friend-item">
            <span class="friend-name">${r.from}</span>
            <div class="friend-actions">
                <button class="btn-small btn-accept" onclick="acceptFriend('${r.from}')">قبول</button>
                <button class="btn-small btn-reject" onclick="rejectFriend('${r.from}')">رفض</button>
            </div>
        </div>
    `).join('') || '<p>لا توجد طلبات</p>';
}

function addFriend() {
    const friendName = document.getElementById('friendUsername').value.trim();
    if(!friendName || friendName === currentUser) return;
    
    channel.publish('friend-request', { from: currentUser, to: friendName });
    alert('✅ تم إرسال طلب الصداقة');
}

function handleFriendRequest(msg) {
    const { from, to } = msg.data;
    if(to !== currentUser) return;
    
    if(!friendRequests[currentUser]) friendRequests[currentUser] = [];
    if(!friendRequests[currentUser].find(r => r.from === from)) {
        friendRequests[currentUser].push({ from });
        localStorage.setItem('ludo_requests', JSON.stringify(friendRequests));
    }
}

function acceptFriend(from) {
    if(!friends[currentUser]) friends[currentUser] = [];
    if(!friends[from]) friends[from] = [];
    
    friends[currentUser].push(from);
    friends[from].push(currentUser);
    
    friendRequests[currentUser] = friendRequests[currentUser].filter(r => r.from !== from);
    
    localStorage.setItem('ludo_friends', JSON.stringify(friends));
    localStorage.setItem('ludo_requests', JSON.stringify(friendRequests));
    
    channel.publish('friend-accept', { from: currentUser, to: from });
    renderFriendsList();
}

function rejectFriend(from) {
    friendRequests[currentUser] = friendRequests[currentUser].filter(r => r.from !== from);
    localStorage.setItem('ludo_requests', JSON.stringify(friendRequests));
    renderFriendsList();
}

function handleFriendAccept(msg) {
    const { from, to } = msg.data;
    if(to !== currentUser) return;
    
    if(!friends[currentUser]) friends[currentUser] = [];
    friends[currentUser].push(from);
    localStorage.setItem('ludo_friends', JSON.stringify(friends));
}

// ==================== اللعبة ====================
function startSearching() {
    document.getElementById('searchingScreen').classList.remove('hidden');
    channel.subscribe('search-1v1', (msg) => {
        const d = msg.data;
        if(d.username === currentUser) return;
        
        const matchId = 'm_'+Date.now();
        channel.publish('match-found', {
            player1: currentUser,
            player2: d.username,
            matchId
        });
    });
    channel.publish('search-1v1', { username: currentUser });
}

function handleMatchFound(msg) {
    const d = msg.data;
    if(d.player1 !== currentUser && d.player2 !== currentUser) return;
    
    channel.unsubscribe('search-1v1');
    document.getElementById('searchingScreen').classList.add('hidden');
    
    if(d.player1 === currentUser) {
        gameState.myColor = 'green';
        gameState.opponentColor = 'yellow';
        gameState.opponent = d.player2;
        gameState.myTurn = true;
    } else {
        gameState.myColor = 'yellow';
        gameState.opponentColor = 'green';
        gameState.opponent = d.player1;
        gameState.myTurn = false;
    }
    
    gameChannel = ably.channels.get('game-'+d.matchId);
    gameChannel.subscribe('dice', handleOpponentDice);
    gameChannel.subscribe('move', handleOpponentMove);
    
    // قناة الدردشة
    chatChannel = ably.channels.get('chat-'+d.matchId);
    chatChannel.subscribe('chat', (msg) => {
        addChatMessage(msg.data.sender, msg.data.text);
    });
    
    startVoiceCall();
    startGame();
}

function startGame() {
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('myPlayerName').textContent = currentUser;
    document.getElementById('opponentName').textContent = gameState.opponent;
    
    initBoard();
    updateStatus();
}

function initBoard() {
    const board = document.getElementById('gameBoard');
    board.innerHTML = '';
    
    for(let r=0; r<15; r++) {
        for(let c=0; c<15; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            
            // فقط أخضر وأصفر
            if(r<6 && c<6) {
                cell.classList.add('base-green');
                if((r===1&&c===1)||(r===1&&c===4)||(r===4&&c===1)||(r===4&&c===4)) cell.dataset.base='green';
            }
            if(r<6 && c>=9) {
                cell.classList.add('base-yellow');
                if((r===1&&c===10)||(r===1&&c===13)||(r===4&&c===10)||(r===4&&c===13)) cell.dataset.base='yellow';
            }
            
            const pathIdx = PATH.findIndex(p=>p.r===r&&p.c===c);
            if(pathIdx>=0) { cell.classList.add('path-cell'); cell.dataset.path=pathIdx; }
            
            if(r===6&&c===1) cell.classList.add('start-green');
            if(r===1&&c===8) cell.classList.add('start-yellow');
            
            if(r===7&&c===7) { cell.classList.add('center-cell'); cell.innerHTML='🏆'; }
            
            board.appendChild(cell);
        }
    }
    renderPieces();
}

function renderPieces() {
    document.querySelectorAll('.piece').forEach(p=>p.remove());
    
    ['green','yellow'].forEach(color => {
        gameState.pieces[color].forEach((p, idx) => {
            if(p.done) return;
            let target = null;
            if(p.pos === -1) {
                const bases = document.querySelectorAll(`[data-base="${color}"]`);
                if(bases[idx]) target = bases[idx];
            } else if(p.pos >= 0 && p.pos < 52) {
                target = document.querySelector(`.cell[data-path="${p.pos}"]`);
            }
            if(target) {
                const piece = document.createElement('div');
                piece.className = `piece piece-${color}`;
                piece.dataset.color = color;
                piece.dataset.idx = idx;
                piece.textContent = idx+1;
                piece.onclick = () => selectPiece(color, idx);
                target.appendChild(piece);
            }
        });
    });
}

function rollDice() {
    if(!gameState.myTurn) { updateStatus('⏳ ليس دورك!'); return; }
    
    const btn = document.getElementById('rollDiceBtn');
    const dice = document.getElementById('diceDisplay');
    btn.disabled = true;
    dice.classList.add('rolling');
    
    let count = 0;
    const int = setInterval(() => {
        dice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
        if(++count >= 10) {
            clearInterval(int);
            const val = Math.floor(Math.random()*6)+1;
            gameState.lastDice = val;
            dice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][val-1];
            dice.classList.remove('rolling');
            
            gameChannel.publish('dice', { dice: val });
            
            if(!checkHasMove()) {
                updateStatus('😕 لا توجد حركة');
                gameState.myTurn = false;
                gameChannel.publish('move', { type: 'pass' });
                btn.disabled = false;
                return;
            }
            
            highlightMovable();
            updateStatus(`🎲 رميت ${val}`);
            btn.disabled = false;
        }
    }, 80);
}

function checkHasMove() {
    const color = gameState.myColor;
    const dice = gameState.lastDice;
    if(dice === 6 && gameState.pieces[color].some(p=>p.pos===-1)) return true;
    return gameState.pieces[color].some(p=>{
        if(p.pos>=0 && p.pos<52) {
            const np = p.pos + dice;
            return np < 52;
        }
        return false;
    });
}

function highlightMovable() {
    document.querySelectorAll('.piece').forEach(el=>{
        el.classList.remove('can-move');
        if(el.dataset.color !== gameState.myColor) return;
        const idx = parseInt(el.dataset.idx);
        const p = gameState.pieces[gameState.myColor][idx];
        if(p.pos===-1 && gameState.lastDice===6) el.classList.add('can-move');
        else if(p.pos>=0 && p.pos<52) {
            const np = p.pos + gameState.lastDice;
            if(np < 52) el.classList.add('can-move');
        }
    });
}

function selectPiece(color, idx) {
    if(!gameState.myTurn || color !== gameState.myColor || gameState.lastDice === 0) return;
    
    const p = gameState.pieces[color][idx];
    
    if(p.pos === -1 && gameState.lastDice === 6) {
        p.pos = STARTS[color];
        gameChannel.publish('move', { type: 'exit', color, idx, pos: p.pos });
    } else if(p.pos >= 0 && p.pos < 52) {
        const np = p.pos + gameState.lastDice;
        if(np < 52) {
            // أكل
            const opp = gameState.opponentColor;
            gameState.pieces[opp].forEach(oppP => {
                if(oppP.pos === np && !SAFE.includes(np)) {
                    oppP.pos = -1;
                }
            });
            p.pos = np;
            gameChannel.publish('move', { type: 'move', color, idx, pos: np });
        }
    } else { return; }
    
    renderPieces();
    
    if(gameState.lastDice !== 6) {
        gameState.myTurn = false;
    }
    
    gameState.lastDice = 0;
    document.querySelectorAll('.can-move').forEach(e=>e.classList.remove('can-move'));
    updateStatus();
}

function handleOpponentDice(msg) {
    updateStatus(`🎲 الخصم رمى ${msg.data.dice}`);
}

function handleOpponentMove(msg) {
    const d = msg.data;
    if(d.type === 'pass') {
        gameState.myTurn = true;
        updateStatus();
        return;
    }
    
    const p = gameState.pieces[d.color][d.idx];
    if(d.type === 'exit') p.pos = d.pos;
    else if(d.type === 'move') {
        // أكل قطعتي
        gameState.pieces[gameState.myColor].forEach(myP => {
            if(myP.pos === d.pos && !SAFE.includes(d.pos)) {
                myP.pos = -1;
            }
        });
        p.pos = d.pos;
    }
    
    renderPieces();
    gameState.myTurn = true;
    updateStatus();
}

function updateStatus(msg) {
    const el = document.getElementById('gameStatus');
    el.textContent = msg || (gameState.myTurn ? '🎮 دورك!' : '⏳ دور الخصم');
}

// ==================== دردشة ومايك ====================
function addChatMessage(sender, text) {
    const div = document.getElementById('chatMessages');
    div.innerHTML += `<div class="chat-message"><span class="chat-sender">${sender}:</span> ${text}</div>`;
    div.scrollTop = div.scrollHeight;
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    
    chatChannel.publish('chat', { sender: currentUser, text });
    addChatMessage(currentUser, text);
    input.value = '';
}

function startVoiceCall() {
    if(!localStream) return;
    if(gameState.myColor === 'green') {
        const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: false });
        setupPeer(peer);
    }
}

function setupPeer(peer) {
    peer.on('signal', signal => {
        gameChannel.publish('signal', { signal });
    });
    peer.on('stream', remoteStream => {
        const audio = new Audio();
        audio.srcObject = remoteStream;
        audio.autoplay = true;
    });
    currentPeer = peer;
}

function toggleMic() {
    if(!localStream) return;
    micEnabled = !micEnabled;
    localStream.getAudioTracks()[0].enabled = micEnabled;
    document.getElementById('micBtn').classList.toggle('muted', !micEnabled);
    document.getElementById('micBtn').textContent = micEnabled ? '🎤' : '🔇';
}

    document.getElementById('loginBtn').onclick = login;

        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');

    document.getElementById('showLoginBtn').onclick = () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    };

        localStorage.setItem('ludo_stats', JSON.stringify(userStats));
        alert('✅ تم التسجيل');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('loginUsername').value = u;
    };
    
    document.getElementById('playBtn').onclick = startSearching;
    document.getElementById('friendsBtn').onclick = showFriends;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('closeFriendsBtn').onclick = () => document.getElementById('friendsScreen').classList.add('hidden');
    document.getElementById('addFriendBtn').onclick = addFriend;
    document.getElementById('cancelSearchBtn').onclick = () => {
        channel.unsubscribe('search-1v1');
        document.getElementById('searchingScreen').classList.add('hidden');
    };
    document.getElementById('rollDiceBtn').onclick = rollDice;
    document.getElementById('sendChatBtn').onclick = sendChat;
    document.getElementById('chatInput').onkeypress = (e) => { if(e.key==='Enter') sendChat(); };
    document.getElementById('micBtn').onclick = toggleMic;
    
    // محاولة تسجيل تلقائي
    autoLogin();
});

window.acceptFriend = acceptFriend;
window.rejectFriend = rejectFriend;
