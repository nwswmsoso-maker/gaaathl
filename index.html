<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دردشة صوتية ونصية - Ably + WebRTC</title>
    <!-- مكتبات Ably و WebRTC -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* شاشة تسجيل الدخول */
        .login-container, .chat-container {
            background: #0f3460;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }

        .chat-container {
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h1 { font-size: 1.3rem; }

        .form-group { padding: 20px; }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background: #1a1a2e;
            color: white;
        }

        input::placeholder { color: #888; }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        .error {
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }

        /* شاشة الدردشة */
        .online-users {
            background: #1a1a2e;
            padding: 10px 15px;
            color: #eee;
            font-size: 0.85rem;
            border-bottom: 1px solid #533483;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .user-tag {
            background: #533483;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .call-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            cursor: pointer;
            width: auto;
            margin: 0;
        }

        .call-btn.in-call { background: #ffc107; color: #333; }
        .call-btn.ringing { background: #ff6b6b; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #16213e;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }

        .message-bubble {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .sent .message-bubble {
            background: #e94560;
            color: white;
        }

        .received .message-bubble {
            background: #1a1a2e;
            color: white;
        }

        .message-time {
            font-size: 0.65rem;
            color: #888;
            margin-top: 3px;
        }

        .chat-input-area {
            padding: 15px;
            background: #0f3460;
            display: flex;
            gap: 10px;
            border-top: 1px solid #533483;
        }

        .chat-input-area input {
            flex: 1;
            margin: 0;
        }

        .chat-input-area button {
            width: auto;
            padding: 12px 20px;
        }

        .call-status {
            background: #1a1a2e;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            color: #ffc107;
            border-bottom: 1px solid #533483;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            width: auto;
            padding: 5px 12px;
            font-size: 0.8rem;
            position: absolute;
            left: 15px;
            top: 12px;
        }

        .relative { position: relative; }

        @media (max-width: 600px) {
            .chat-container { height: 95vh; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="login-container">
        <div class="header">
            <h1>🎙️ دردشة صوتية ونصية</h1>
            <p>تحدث مع أصدقائك مباشرة</p>
        </div>
        <div class="form-group">
            <input type="text" id="username" placeholder="اسم المستخدم">
            <button onclick="login()">دخول / تسجيل جديد</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <!-- شاشة الدردشة -->
    <div id="chatScreen" class="chat-container" style="display: none;">
        <div class="header relative">
            <button class="logout-btn" onclick="logout()">🚪 خروج</button>
            <h1>💬 غرفة الدردشة</h1>
            <p id="currentUserDisplay"></p>
        </div>
        <div class="call-status" id="callStatus"></div>
        <div class="online-users" id="onlineUsers"></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">📤 إرسال</button>
        </div>
    </div>
</div>

<script>
    // مفتاح Ably
    const ABLY_KEY = 'VH9zDw.qYk7ig:W8vGNSDMN2l4f0_fWpURvbtwk06vV7wDwsaro-YAfKI';
    let ably, channel;
    
    let currentUser = null;
    let onlineUsers = [];
    let messages = [];
    let currentCall = null; // Peer connection active
    let localStream = null;
    let remoteStream = null;
    let callWithUser = null;
    
    // تسجيل الدخول
    async function login() {
        const username = document.getElementById('username').value.trim();
        if (!username) {
            document.getElementById('loginError').textContent = '❌ الرجاء إدخال اسم المستخدم';
            return;
        }
        
        currentUser = username;
        localStorage.setItem('chat_user', currentUser);
        
        // الاتصال بـ Ably
        ably = new Ably.Realtime({ key: ABLY_KEY });
        
        ably.connection.on('connected', () => {
            console.log('✅ متصل بـ Ably');
            
            // الانضمام إلى قناة الدردشة
            channel = ably.channels.get('chat-room');
            
            // استقبال الرسائل النصية
            channel.subscribe('message', (msg) => {
                if (msg.data.sender !== currentUser) {
                    messages.push(msg.data);
                    saveMessages();
                    displayMessages();
                }
            });
            
            // استقبال إشارات WebRTC (مكالمات)
            channel.subscribe('webrtc', (signal) => {
                handleWebRTCSignal(signal.data);
            });
            
            // إعلان المستخدم الجديد
            announceUserJoin();
            
            // بدء طلب الميكروفون
            initMicrophone();
            
            showChatScreen();
        });
        
        ably.connection.on('failed', (err) => {
            document.getElementById('loginError').textContent = '❌ فشل الاتصال بالخادم';
        });
    }
    
    // طلب صلاحية الميكروفون
    async function initMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            console.log('🎤 ميكروفون جاهز');
        } catch (err) {
            console.error('❌ لا يمكن الوصول للميكروفون', err);
            document.getElementById('callStatus').innerHTML = '⚠️ لا يمكن الوصول للميكروفون - المكالمات الصوتية غير متاحة';
        }
    }
    
    // إعلان دخول المستخدم
    function announceUserJoin() {
        // نشر قائمة المستخدمين
        updateOnlineUsersList();
        
        // إرسال رسالة ترحيب
        const welcomeMsg = {
            id: Date.now(),
            sender: 'system',
            text: `🎉 ${currentUser} انضم إلى الدردشة`,
            time: new Date().toLocaleTimeString('ar-EG')
        };
        messages.push(welcomeMsg);
        saveMessages();
        displayMessages();
        
        // تحديث قائمة المتصلين كل 5 ثواني
        setInterval(() => {
            if (currentUser) updateOnlineUsersList();
        }, 5000);
    }
    
    // تحديث قائمة المتصلين
    function updateOnlineUsersList() {
        channel.publish('presence', { user: currentUser, action: 'join' });
        
        // طلب قائمة المستخدمين الحاليين
        channel.presence.get((err, members) => {
            if (!err && members) {
                onlineUsers = members.map(m => m.data.user).filter((v,i,a) => a.indexOf(v) === i);
                if (!onlineUsers.includes(currentUser)) onlineUsers.push(currentUser);
                renderOnlineUsers();
            }
        });
    }
    
    // عرض المستخدمين المتصلين
    function renderOnlineUsers() {
        const container = document.getElementById('onlineUsers');
        const otherUsers = onlineUsers.filter(u => u !== currentUser);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '👥 لا يوجد مستخدمون آخرون متصلون';
        } else {
            let html = '👥 المتصلون: ';
            otherUsers.forEach(user => {
                const isInCall = (callWithUser === user);
                html += `<span class="user-tag">
                            ${user} 
                            <button class="call-btn ${isInCall ? 'in-call' : ''}" 
                                    onclick="startCall('${user}')">
                                ${isInCall ? '🔴 في مكالمة' : '🎤 اتصل'}
                            </button>
                         </span>`;
            });
            container.innerHTML = html;
        }
    }
    
    // بدء مكالمة
    async function startCall(targetUser) {
        if (!localStream) {
            document.getElementById('callStatus').innerHTML = '❌ لا يمكن بدء المكالمة - الميكروفون غير متاح';
            return;
        }
        
        if (currentCall) {
            endCall();
        }
        
        callWithUser = targetUser;
        document.getElementById('callStatus').innerHTML = `📞 جاري الاتصال بـ ${targetUser}...`;
        
        // إنشاء Peer connection
        const peer = new SimplePeer({
            initiator: true,
            stream: localStream,
            trickle: false
        });
        
        peer.on('signal', signalData => {
            // إرسال إشارة WebRTC عبر Ably
            channel.publish('webrtc', {
                to: targetUser,
                from: currentUser,
                signal: signalData,
                type: 'offer'
            });
        });
        
        peer.on('stream', stream => {
            remoteStream = stream;
            playRemoteAudio(stream);
            document.getElementById('callStatus').innerHTML = `🎙️ في مكالمة مع ${targetUser} - اضغط إنهاء لقطع المكالمة`;
            renderOnlineUsers(); // تحديث الزر
        });
        
        peer.on('error', err => {
            console.error(err);
            endCall();
        });
        
        peer.on('close', () => {
            endCall();
        });
        
        currentCall = peer;
    }
    
    // استقبال إشارات WebRTC
    function handleWebRTCSignal(data) {
        if (data.to !== currentUser) return;
        
        if (data.type === 'offer') {
            // استقبال مكالمة
            if (confirm(`${data.from} يتصل بك. هل تريد الرد؟`)) {
                answerCall(data.from, data.signal);
            } else {
                channel.publish('webrtc', {
                    to: data.from,
                    from: currentUser,
                    type: 'reject'
                });
            }
        } 
        else if (data.type === 'answer' && currentCall) {
            currentCall.signal(data.signal);
            document.getElementById('callStatus').innerHTML = `🎙️ في مكالمة مع ${callWithUser}`;
        }
        else if (data.type === 'reject') {
            document.getElementById('callStatus').innerHTML = `❌ ${data.from} رفض المكالمة`;
            setTimeout(() => {
                if (document.getElementById('callStatus').innerHTML.includes('رفض')) {
                    document.getElementById('callStatus').innerHTML = '';
                }
            }, 3000);
            endCall();
        }
    }
    
    // الرد على مكالمة
    async function answerCall(caller, signalData) {
        if (!localStream) {
            await initMicrophone();
        }
        
        callWithUser = caller;
        
        const peer = new SimplePeer({
            initiator: false,
            stream: localStream,
            trickle: false
        });
        
        peer.on('signal', signal => {
            channel.publish('webrtc', {
                to: caller,
                from: currentUser,
                signal: signal,
                type: 'answer'
            });
        });
        
        peer.on('stream', stream => {
            remoteStream = stream;
            playRemoteAudio(stream);
            document.getElementById('callStatus').innerHTML = `🎙️ في مكالمة مع ${caller}`;
            renderOnlineUsers();
        });
        
        peer.on('error', () => endCall());
        peer.on('close', () => endCall());
        
        peer.signal(signalData);
        currentCall = peer;
    }
    
    // تشغيل صوت الطرف الآخر
    function playRemoteAudio(stream) {
        const audio = new Audio();
        audio.srcObject = stream;
        audio.autoplay = true;
    }
    
    // إنهاء المكالمة
    function endCall() {
        if (currentCall) {
            currentCall.destroy();
            currentCall = null;
        }
        if (remoteStream) {
            remoteStream.getTracks().forEach(track => track.stop());
            remoteStream = null;
        }
        callWithUser = null;
        document.getElementById('callStatus').innerHTML = '';
        renderOnlineUsers();
    }
    
    // إرسال رسالة نصية
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        const msg = {
            id: Date.now(),
            sender: currentUser,
            text: text,
            time: new Date().toLocaleTimeString('ar-EG')
        };
        
        messages.push(msg);
        saveMessages();
        displayMessages();
        
        // إرسال عبر Ably
        channel.publish('message', msg);
        
        input.value = '';
    }
    
    // عرض الرسائل
    function displayMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        
        container.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            if (msg.sender === 'system') {
                div.style.textAlign = 'center';
                div.style.margin = '5px 0';
                div.innerHTML = `<span style="background:#533483; padding:3px 12px; border-radius:15px; font-size:0.7rem;">${msg.text}</span>`;
            } else if (msg.sender === currentUser) {
                div.className = 'message sent';
                div.innerHTML = `<div class="message-bubble">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
            } else {
                div.className = 'message received';
                div.innerHTML = `<div class="message-bubble"><strong>${escapeHtml(msg.sender)}</strong><br>${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
            }
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function saveMessages() {
        localStorage.setItem('chat_messages_' + currentUser, JSON.stringify(messages));
    }
    
    function loadMessages() {
        const saved = localStorage.getItem('chat_messages_' + currentUser);
        if (saved) messages = JSON.parse(saved);
        else messages = [];
    }
    
    function showChatScreen() {
        loadMessages();
        displayMessages();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatScreen').style.display = 'flex';
        document.getElementById('currentUserDisplay').innerHTML = `👋 مرحباً ${currentUser}`;
        renderOnlineUsers();
    }
    
    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function logout() {
        if (currentCall) endCall();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (ably) ably.close();
        currentUser = null;
        localStorage.removeItem('chat_user');
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('username').value = '';
    }
    
    // استعادة الجلسة
    const savedUser = localStorage.getItem('chat_user');
    if (savedUser) {
        document.getElementById('username').value = savedUser;
        login();
    }
</script>
</body>
</html>
