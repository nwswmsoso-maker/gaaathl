<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تواصل</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#0a1a0f; overflow:hidden; position:fixed; width:100%; height:100%; }
        
        .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(145deg,#0a1a0f,#1a3a1a); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .login-card { background:white; border-radius:35px; padding:45px 30px; max-width:380px; width:90%; }
        .login-icon { text-align:center; margin-bottom:25px; font-size:4rem; color:#2ecc71; }
        .login-title { text-align:center; font-size:2rem; font-weight:800; color:#1a3a1a; margin-bottom:30px; }
        .input-wrapper { margin-bottom:20px; }
        .input-wrapper input { width:100%; padding:16px; border:2px solid #e0e0e0; border-radius:20px; font-family:'Cairo',sans-serif; }
        .login-btn { width:100%; padding:16px; background:#2ecc71; color:white; border:none; border-radius:20px; font-size:1.2rem; font-weight:700; cursor:pointer; }
        .login-switch { text-align:center; margin-top:20px; }
        .login-switch a { color:#2ecc71; cursor:pointer; }
        
        .app { position:fixed; top:0; left:0; width:100%; height:100%; background:#f5f7fa; display:flex; flex-direction:column; }
        .app-header { background:#1a3a1a; padding:18px; display:flex; align-items:center; justify-content:space-between; color:white; }
        .user-section { display:flex; align-items:center; gap:12px; }
        .avatar { width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; border:2px solid #FFD700; }
        
        .tabs-container { background:#1a3a1a; padding:0 15px; display:flex; }
        .tab-item { flex:1; padding:15px; text-align:center; color:rgba(255,255,255,0.7); cursor:pointer; border-bottom:3px solid transparent; }
        .tab-item.active { color:white; border-bottom-color:#FFD700; }
        .tab-item i { margin-left:5px; }
        
        .content-area { flex:1; overflow-y:auto; background:#f0f4f0; }
        
        .chat-view { height:100%; display:flex; flex-direction:column; }
        .messages-list { flex:1; overflow-y:auto; padding:20px; }
        .msg-row { display:flex; gap:12px; margin-bottom:18px; }
        .msg-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; }
        .msg-bubble { background:white; padding:12px 18px; border-radius:18px; max-width:70%; }
        .msg-row.own { flex-direction:row-reverse; }
        .msg-row.own .msg-bubble { background:#dcf8c6; }
        
        .chat-footer { padding:18px; background:white; display:flex; gap:12px; }
        .chat-footer input { flex:1; padding:14px; border:2px solid #e0e0e0; border-radius:30px; }
        .send-btn { width:55px; height:55px; background:#2ecc71; border:none; border-radius:50%; color:white; font-size:1.3rem; cursor:pointer; }
        
        .friends-view { padding:20px; }
        .friend-card { display:flex; align-items:center; justify-content:space-between; padding:18px; background:white; border-radius:20px; margin-bottom:12px; }
        .friend-left { display:flex; align-items:center; gap:15px; }
        .friend-avatar { width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:1.3rem; }
        .friend-actions { display:flex; gap:8px; }
        .icon-btn { width:45px; height:45px; border-radius:50%; border:none; cursor:pointer; color:white; }
        .call-icon { background:#2ecc71; }
        .chat-icon { background:#3498db; }
        
        .private-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; display:flex; flex-direction:column; }
        .private-top { background:#1a3a1a; color:white; padding:18px; display:flex; align-items:center; gap:15px; }
        .private-top i { font-size:1.5rem; cursor:pointer; }
        .private-messages { flex:1; overflow-y:auto; padding:20px; }
        .private-bottom { padding:18px; background:white; display:flex; gap:12px; }
        .private-bottom input { flex:1; padding:14px; border:2px solid #e0e0e0; border-radius:30px; }
        
        .call-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(145deg,#1a3a1a,#0a1a0f); z-index:3000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .call-avatar-large { width:160px; height:160px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:4.5rem; color:white; border:5px solid #FFD700; margin-bottom:25px; }
        .call-name-large { font-size:2.2rem; color:white; margin-bottom:10px; }
        .call-duration { color:#FFD700; font-size:1.8rem; margin-bottom:60px; font-family:monospace; }
        .call-controls { display:flex; gap:35px; }
        .ctrl-btn { width:75px; height:75px; border-radius:50%; border:none; font-size:2rem; cursor:pointer; }
        .ctrl-mute { background:rgba(255,255,255,0.15); color:white; }
        .ctrl-mute.active { background:#e74c3c; }
        .ctrl-end { background:#e74c3c; color:white; }
        
        .incoming-call-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:4000; display:flex; align-items:center; justify-content:center; }
        .incoming-card { background:white; border-radius:40px; padding:45px; text-align:center; }
        .incoming-avatar { width:120px; height:120px; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; color:white; border:4px solid #FFD700; }
        .incoming-name { font-size:1.8rem; font-weight:800; margin-bottom:35px; }
        .incoming-actions { display:flex; gap:20px; justify-content:center; }
        .incoming-accept { width:75px; height:75px; background:#2ecc71; border:none; border-radius:50%; color:white; font-size:2rem; cursor:pointer; }
        .incoming-reject { width:75px; height:75px; background:#e74c3c; border:none; border-radius:50%; color:white; font-size:2rem; cursor:pointer; }
        
        .toast-notification { position:fixed; top:20px; left:20px; right:20px; background:#1a3a1a; color:white; padding:18px; border-radius:20px; z-index:5000; transform:translateY(-120%); transition:0.3s; max-width:400px; margin:0 auto; }
        .toast-notification.show { transform:translateY(0); }
        
        .hidden { display:none !important; }
        .bg1 { background:#e74c3c; } .bg2 { background:#3498db; } .bg3 { background:#2ecc71; }
        .bg4 { background:#f39c12; } .bg5 { background:#9b59b6; } .bg6 { background:#1abc9c; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-icon"><i class="fas fa-comment-dots"></i></div>
        <div class="login-title">مرحباً بك</div>
        <div id="loginForm">
            <div class="input-wrapper"><input type="text" id="loginUsername" placeholder="اسم المستخدم"></div>
            <div class="input-wrapper"><input type="password" id="loginPassword" placeholder="كلمة المرور"></div>
            <button class="login-btn" onclick="login()">تسجيل الدخول</button>
            <div class="login-switch"><a onclick="showRegister()">إنشاء حساب جديد</a></div>
        </div>
        <div id="registerForm" class="hidden">
            <div class="input-wrapper"><input type="text" id="regUsername" placeholder="اسم المستخدم"></div>
            <div class="input-wrapper"><input type="password" id="regPassword" placeholder="كلمة المرور"></div>
            <button class="login-btn" onclick="register()">إنشاء حساب</button>
            <div class="login-switch"><a onclick="showLogin()">لدي حساب بالفعل</a></div>
        </div>
    </div>
</div>

<div id="app" class="app hidden">
    <div class="app-header">
        <div class="user-section">
            <div class="avatar" id="myAvatar"></div>
            <span id="myName"></span>
        </div>
        <i class="fas fa-sign-out-alt" onclick="logout()"></i>
    </div>
    
    <div class="tabs-container">
        <div class="tab-item active" onclick="switchTab('chat')"><i class="fas fa-comments"></i> الدردشة</div>
        <div class="tab-item" onclick="switchTab('friends')"><i class="fas fa-users"></i> الأصدقاء</div>
        <div class="tab-item" onclick="switchTab('active')"><i class="fas fa-circle"></i> نشط</div>
    </div>
    
    <div class="content-area">
        <div id="chatTab" class="chat-view">
            <div class="messages-list" id="messages"></div>
            <div class="chat-footer"><input type="text" id="chatInput" placeholder="اكتب رسالتك..."><button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
        </div>
        <div id="friendsTab" class="friends-view hidden">
            <div class="section-header">👥 أصدقائي</div><div id="friendsList"></div>
            <div class="section-header">📨 طلبات الصداقة</div><div id="requestsList"></div>
        </div>
        <div id="activeTab" class="friends-view hidden">
            <div class="section-header">🟢 متصلون الآن</div><div id="activeList"></div>
        </div>
    </div>
</div>

<div id="privateChat" class="private-overlay hidden">
    <div class="private-top"><i class="fas fa-arrow-right" onclick="closePrivateChat()"></i><span id="privateChatName"></span><i class="fas fa-phone" onclick="startCallFromChat()"></i></div>
    <div class="private-messages" id="privateMessages"></div>
    <div class="private-bottom"><input type="text" id="privateInput" placeholder="اكتب رسالة..."><button class="send-btn" onclick="sendPrivateMessage()"><i class="fas fa-paper-plane"></i></button></div>
</div>

<div id="incomingCall" class="incoming-call-overlay hidden">
    <div class="incoming-card">
        <div class="incoming-avatar" id="incomingAvatar"></div>
        <div class="incoming-name" id="incomingName"></div>
        <div class="incoming-actions">
            <button class="incoming-reject" onclick="rejectIncomingCall()"><i class="fas fa-times"></i></button>
            <button class="incoming-accept" onclick="acceptIncomingCall()"><i class="fas fa-check"></i></button>
        </div>
    </div>
</div>

<div id="toast" class="toast-notification"><span id="toastText"></span></div>

<div id="callScreen" class="call-screen hidden">
    <div class="call-avatar-large" id="callAvatar"></div>
    <div class="call-name-large" id="callName"></div>
    <div class="call-duration" id="callDuration">00:00</div>
    <div class="call-controls">
        <button class="ctrl-btn ctrl-mute" id="muteBtn" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
        <button class="ctrl-btn ctrl-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
const ADMIN_USER = '3tx';
const ADMIN_PASS = '11';

let currentUser = null, isAdmin = false, ably = null, pubChannel = null, privChannel = null;
let currentChat = null, localStream = null, currentPeer = null, muted = false;
let incomingCallFrom = null;
let callTimer = null, callSeconds = 0;

let users = JSON.parse(localStorage.getItem('cu')) || {};
let friends = JSON.parse(localStorage.getItem('cf')) || {};
let requests = JSON.parse(localStorage.getItem('cr')) || {};

const lastUser = localStorage.getItem('lu');
if(lastUser) document.getElementById('loginUsername').value = lastUser;

function showToast(t) { 
    document.getElementById('toastText').textContent=t; 
    document.getElementById('toast').classList.add('show'); 
    setTimeout(()=>document.getElementById('toast').classList.remove('show'),3000); 
}
function getColor(n) { return ['bg1','bg2','bg3','bg4','bg5','bg6'][(n||'a').charCodeAt(0)%6]; }

function showRegister() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
function showLogin() { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }
function register() {
    const u = document.getElementById('regUsername').value.trim(), p = document.getElementById('regPassword').value;
    if(!u||!p) return;
    if(users[u]) { alert('الاسم موجود'); return; }
    users[u]=p; localStorage.setItem('cu',JSON.stringify(users));
    showLogin(); document.getElementById('loginUsername').value=u;
}
async function login() {
    const u = document.getElementById('loginUsername').value.trim(), p = document.getElementById('loginPassword').value;
    if(u===ADMIN_USER && p===ADMIN_PASS) { isAdmin=true; if(!users[u]) users[u]=p; }
    else if(!users[u]||users[u]!==p) { alert('بيانات خاطئة'); return; }
    else isAdmin=false;
    currentUser=u; localStorage.setItem('lu',u);
    
    try { localStream = await navigator.mediaDevices.getUserMedia({audio:true}); } catch(e) {}
    
    ably = new Ably.Realtime({key:ABLY_KEY, clientId:u});
    ably.connection.on('connected',()=>{
        pubChannel=ably.channels.get('public');
        pubChannel.subscribe('msg',m=>{ if(m.data.sender!==currentUser) addMessage(m.data); });
        pubChannel.presence.enter({username:u});
        pubChannel.presence.subscribe('enter',updateActive);
        pubChannel.presence.subscribe('leave',updateActive);
        
        privChannel=ably.channels.get(`priv-${u}`);
        privChannel.subscribe('msg',m=>{ if(m.data.from!==currentUser) handlePrivateMessage(m.data); });
        privChannel.subscribe('call',handleCall);
        privChannel.subscribe('call-signal',handleCallSignal);
        privChannel.subscribe('call-end',handleCallEnd);
        privChannel.subscribe('friend-req',handleFriendReq);
        privChannel.subscribe('friend-acc',handleFriendAcc);
    });
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('myName').textContent=u;
    document.getElementById('myAvatar').textContent=u[0].toUpperCase();
    document.getElementById('myAvatar').className=`avatar ${getColor(u)}`;
    renderFriends(); updateActive();
}
function logout() { if(ably) ably.close(); localStorage.removeItem('lu'); location.reload(); }

function switchTab(t) {
    document.querySelectorAll('.tab-item').forEach(x=>x.classList.remove('active'));
    event.target.classList.add('active');
    ['chatTab','friendsTab','activeTab'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    document.getElementById(t+'Tab').classList.remove('hidden');
    if(t==='active') renderActive();
}

function sendMessage() { 
    const inp=document.getElementById('chatInput'), text=inp.value.trim(); 
    if(!text) return; 
    const msg={sender:currentUser,text,time:new Date().toLocaleTimeString()}; 
    pubChannel.publish('msg',msg); addMessage(msg); inp.value=''; 
}
function addMessage(m) { 
    const div=document.getElementById('messages'), isMe=m.sender===currentUser; 
    div.innerHTML+=`<div class="msg-row ${isMe?'own':''}"><div class="msg-avatar ${getColor(m.sender)}">${m.sender[0]}</div><div class="msg-bubble"><strong>${m.sender}</strong><br>${m.text}</div></div>`; 
    div.scrollTop=div.scrollHeight; 
}

function handleFriendReq(m) { 
    if(!requests[currentUser]) requests[currentUser]=[]; 
    if(!requests[currentUser].find(r=>r.from===m.data.from)) { 
        requests[currentUser].push({from:m.data.from}); 
        localStorage.setItem('cr',JSON.stringify(requests)); 
        renderFriends(); 
        showToast(`${m.data.from} يريد إضافتك`); 
    } 
}
function acceptFriend(f) { 
    if(!friends[currentUser]) friends[currentUser]=[]; 
    if(!friends[f]) friends[f]=[]; 
    friends[currentUser].push(f); friends[f].push(currentUser); 
    requests[currentUser]=(requests[currentUser]||[]).filter(r=>r.from!==f); 
    localStorage.setItem('cf',JSON.stringify(friends)); localStorage.setItem('cr',JSON.stringify(requests)); 
    ably.channels.get(`priv-${f}`).publish('friend-acc',{from:currentUser}); 
    renderFriends(); 
}
function handleFriendAcc(m) { 
    if(!friends[currentUser]) friends[currentUser]=[]; 
    friends[currentUser].push(m.data.from); 
    localStorage.setItem('cf',JSON.stringify(friends)); 
    renderFriends(); 
}
function renderFriends() { 
    const mf=friends[currentUser]||[], mr=requests[currentUser]||[]; 
    document.getElementById('friendsList').innerHTML=mf.map(f=>`<div class="friend-card"><div class="friend-left"><div class="friend-avatar ${getColor(f)}">${f[0]}</div><div>${f}</div></div><div class="friend-actions"><button class="icon-btn call-icon" onclick="startCall('${f}')"><i class="fas fa-phone"></i></button><button class="icon-btn chat-icon" onclick="openPrivateChat('${f}')"><i class="fas fa-comment"></i></button></div></div>`).join('')||'<p>لا يوجد أصدقاء</p>'; 
    document.getElementById('requestsList').innerHTML=mr.map(r=>`<div class="friend-card"><div>${r.from}</div><div><button onclick="acceptFriend('${r.from}')">قبول</button></div></div>`).join('')||'<p>لا توجد طلبات</p>'; 
}

function updateActive() { 
    pubChannel.presence.get((e,m)=>{ 
        window.activeMembers=m||[]; 
        renderActive(); 
    }); 
}
function renderActive() { 
    const m=window.activeMembers||[]; 
    document.getElementById('activeList').innerHTML=m.filter(x=>x.clientId!==currentUser).map(x=>`<div class="friend-card"><div class="friend-left"><div class="friend-avatar ${getColor(x.clientId)}">${x.clientId[0]}</div><div>${x.clientId}</div></div><div class="dot-online" style="width:12px;height:12px;background:#2ecc71;border-radius:50%;"></div></div>`).join('')||'<p>لا يوجد نشط</p>'; 
}

function openPrivateChat(u) { 
    currentChat=u; 
    document.getElementById('privateChatName').textContent=u; 
    document.getElementById('privateChat').classList.remove('hidden'); 
}
function closePrivateChat() { document.getElementById('privateChat').classList.add('hidden'); currentChat=null; }
function sendPrivateMessage() { 
    const inp=document.getElementById('privateInput'), text=inp.value.trim(); 
    if(!text||!currentChat) return; 
    const msg={from:currentUser,text,time:new Date().toLocaleTimeString()}; 
    ably.channels.get(`priv-${currentChat}`).publish('msg',msg); 
    addPrivateMsg(msg); inp.value=''; 
}
function handlePrivateMessage(m) { if(currentChat===m.from) addPrivateMsg(m); else showToast(`${m.from}: ${m.text}`); }
function addPrivateMsg(m) { 
    const div=document.getElementById('privateMessages'), isMe=m.from===currentUser; 
    div.innerHTML+=`<div class="msg-row ${isMe?'own':''}"><div class="msg-avatar ${getColor(m.from)}">${m.from[0]}</div><div class="msg-bubble">${m.text}</div></div>`; 
    div.scrollTop=div.scrollHeight; 
}

// ================ المكالمات ================
function startCallTimer() {
    callSeconds = 0;
    updateTimerDisplay();
    if(callTimer) clearInterval(callTimer);
    callTimer = setInterval(() => {
        callSeconds++;
        updateTimerDisplay();
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(callSeconds / 60);
    const secs = callSeconds % 60;
    document.getElementById('callDuration').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

function stopCallTimer() {
    if(callTimer) { clearInterval(callTimer); callTimer = null; }
    callSeconds = 0;
    document.getElementById('callDuration').textContent = '00:00';
}

function startCall(u) {
    currentChat = u;
    document.getElementById('callScreen').classList.remove('hidden');
    document.getElementById('callName').textContent = u;
    document.getElementById('callAvatar').textContent = u[0];
    document.getElementById('callAvatar').className = `call-avatar-large ${getColor(u)}`;
    stopCallTimer();
    startCallTimer();
    
    const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: true });
    
    peer.on('signal', signal => {
        ably.channels.get(`priv-${u}`).publish('call-signal', { signal, from: currentUser });
    });
    
    peer.on('stream', remoteStream => {
        const audio = new Audio();
        audio.srcObject = remoteStream;
        audio.autoplay = true;
        audio.play().catch(e => console.log('الصوت يحتاج تفعيل يدوي'));
    });
    
    peer.on('connect', () => console.log('متصل'));
    peer.on('close', () => { stopCallTimer(); document.getElementById('callScreen').classList.add('hidden'); });
    peer.on('error', () => { stopCallTimer(); document.getElementById('callScreen').classList.add('hidden'); });
    
    currentPeer = peer;
    ably.channels.get(`priv-${u}`).publish('call', { from: currentUser });
}

function startCallFromChat() { if(currentChat) startCall(currentChat); }

function handleCall(m) {
    incomingCallFrom = m.data.from;
    document.getElementById('incomingCall').classList.remove('hidden');
    document.getElementById('incomingName').textContent = incomingCallFrom;
    document.getElementById('incomingAvatar').textContent = incomingCallFrom[0];
    document.getElementById('incomingAvatar').className = `incoming-avatar ${getColor(incomingCallFrom)}`;
}

function acceptIncomingCall() {
    document.getElementById('incomingCall').classList.add('hidden');
    currentChat = incomingCallFrom;
    
    document.getElementById('callScreen').classList.remove('hidden');
    document.getElementById('callName').textContent = incomingCallFrom;
    document.getElementById('callAvatar').textContent = incomingCallFrom[0];
    document.getElementById('callAvatar').className = `call-avatar-large ${getColor(incomingCallFrom)}`;
    stopCallTimer();
    startCallTimer();
    
    const peer = new SimplePeer({ initiator: false, stream: localStream, trickle: true });
    
    peer.on('signal', signal => {
        ably.channels.get(`priv-${incomingCallFrom}`).publish('call-signal', { signal, from: currentUser });
    });
    
    peer.on('stream', remoteStream => {
        const audio = new Audio();
        audio.srcObject = remoteStream;
        audio.autoplay = true;
        audio.play().catch(e => console.log('الصوت يحتاج تفعيل يدوي'));
    });
    
    peer.on('connect', () => console.log('متصل'));
    peer.on('close', () => { stopCallTimer(); document.getElementById('callScreen').classList.add('hidden'); });
    peer.on('error', () => { stopCallTimer(); document.getElementById('callScreen').classList.add('hidden'); });
    
    currentPeer = peer;
}

function rejectIncomingCall() {
    document.getElementById('incomingCall').classList.add('hidden');
    if(incomingCallFrom) ably.channels.get(`priv-${incomingCallFrom}`).publish('call-end', { from: currentUser });
    incomingCallFrom = null;
}

function handleCallSignal(m) {
    if(m.data.from !== currentUser && currentPeer) currentPeer.signal(m.data.signal);
}

function handleCallEnd(m) {
    showToast(`${m.data.from} أنهى المكالمة`);
    stopCallTimer();
    document.getElementById('callScreen').classList.add('hidden');
    if(currentPeer) { currentPeer.destroy(); currentPeer = null; }
}

function toggleMute() {
    if(localStream) {
        muted = !muted;
        localStream.getAudioTracks()[0].enabled = !muted;
        document.getElementById('muteBtn').classList.toggle('active', muted);
    }
}

function endCall() {
    stopCallTimer();
    document.getElementById('callScreen').classList.add('hidden');
    if(currentPeer) { currentPeer.destroy(); currentPeer = null; }
    if(currentChat) ably.channels.get(`priv-${currentChat}`).publish('call-end', { from: currentUser });
}

window.showRegister=showRegister; window.showLogin=showLogin; window.register=register; window.login=login; window.logout=logout;
window.switchTab=switchTab; window.sendMessage=sendMessage; window.acceptFriend=acceptFriend;
window.openPrivateChat=openPrivateChat; window.closePrivateChat=closePrivateChat; window.sendPrivateMessage=sendPrivateMessage;
window.startCall=startCall; window.startCallFromChat=startCallFromChat; window.toggleMute=toggleMute; window.endCall=endCall;
window.acceptIncomingCall=acceptIncomingCall; window.rejectIncomingCall=rejectIncomingCall;
</script>
