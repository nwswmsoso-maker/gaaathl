<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دردشة فورية - Ably</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.8rem; opacity: 0.9; }
        .login-box, .chat-box { padding: 20px; }
        input, button {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
        .messages {
            height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .msg {
            padding: 10px 14px;
            margin: 8px 0;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .my-msg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .other-msg {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
        }
        .system-msg {
            background: #ffc107;
            color: #333;
            text-align: center;
            margin: 10px auto;
            font-size: 0.75rem;
            width: fit-content;
        }
        .sender {
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .time {
            font-size: 0.6rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .online-users {
            background: #e9ecef;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            text-align: center;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            margin: 0;
        }
        .input-area button {
            width: auto;
            padding: 12px 20px;
        }
        .status {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
            color: #666;
        }
        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            color: #28a745;
            text-align: center;
            margin-top: 10px;
        }
        .logout-btn {
            margin-top: 10px;
            background: #dc3545;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>💬 دردشة فورية</h2>
        <p>تواصل مع أصدقائك في الوقت الحقيقي</p>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
        <input type="text" id="roomName" placeholder="اسم الغرفة" value="general">
        <button onclick="joinChat()">🚀 دخول إلى الدردشة</button>
        <div id="loginStatus" class="status"></div>
    </div>

    <!-- شاشة الدردشة -->
    <div id="chatScreen" class="chat-box hidden">
        <div class="online-users" id="onlineUsers">🟢 جاري التحميل...</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤 إرسال</button>
        </div>
        <button class="logout-btn" onclick="leaveChat()">🚪 مغادرة الغرفة</button>
        <div id="chatStatus" class="status"></div>
    </div>
</div>

<script>
    // 🔑 المفتاح الجديد
    const ABLY_KEY = 'VH9zDw.kUHivg:dEwXMdK-kqIGPtqj_e8t_Oyz6knD6upO_7LJZdRJsVc';
    
    let ably = null;
    let channel = null;
    let currentUser = null;
    let currentRoom = null;

    function joinChat() {
        const username = document.getElementById('username').value.trim();
        const roomName = document.getElementById('roomName').value.trim() || 'general';
        
        if (!username) {
            document.getElementById('loginStatus').innerHTML = '<span class="error">❌ الرجاء إدخال اسم المستخدم</span>';
            return;
        }
        
        currentUser = username;
        currentRoom = roomName;
        
        document.getElementById('loginStatus').innerHTML = '<span class="status">🔄 جاري الاتصال...</span>';
        
        try {
            // الاتصال بـ Ably
            ably = new Ably.Realtime({ 
                key: ABLY_KEY, 
                clientId: currentUser,
                echoMessages: false // منع تكرار الرسائل لنفس المستخدم
            });
            
            // مراقبة حالة الاتصال
            ably.connection.on('connected', () => {
                console.log('✅ متصل بـ Ably');
                document.getElementById('loginStatus').innerHTML = '<span class="success">✅ تم الاتصال بنجاح</span>';
                setupChatRoom();
            });
            
            ably.connection.on('failed', (err) => {
                console.error('❌ فشل الاتصال:', err);
                document.getElementById('loginStatus').innerHTML = '<span class="error">❌ فشل الاتصال بالخادم. تأكد من اتصالك بالإنترنت</span>';
            });
            
            ably.connection.on('disconnected', () => {
                document.getElementById('chatStatus').innerHTML = '<span class="error">⚠️ انقطع الاتصال... جاري إعادة المحاولة</span>';
            });
            
        } catch (err) {
            document.getElementById('loginStatus').innerHTML = '<span class="error">❌ خطأ: ' + err.message + '</span>';
        }
    }
    
    function setupChatRoom() {
        // الانضمام إلى قناة الغرفة
        channel = ably.channels.get(currentRoom);
        
        // استقبال الرسائل
        channel.subscribe('chat_message', (message) => {
            console.log('📨 رسالة واصلة:', message.data);
            displayMessage(message.data);
        });
        
        // إدارة الحضور (Presence)
        const presenceData = { userId: currentUser, name: currentUser };
        
        channel.presence.enter(presenceData, (err) => {
            if (err) console.error('خطأ في الدخول:', err);
            else console.log('✅ تم الدخول إلى الغرفة');
        });
        
        // مراقبة تغييرات الحضور
        channel.presence.subscribe('enter', (member) => {
            console.log('👤 مستخدم دخل:', member.data.name);
            updateOnlineUsers();
            // إشعار دخول
            if (member.data.name !== currentUser) {
                const systemMsg = {
                    sender: 'النظام',
                    text: `🎉 ${member.data.name} انضم إلى الغرفة`,
                    time: getCurrentTime(),
                    isSystem: true
                };
                channel.publish('chat_message', systemMsg);
            }
        });
        
        channel.presence.subscribe('leave', (member) => {
            console.log('👋 مستخدم خرج:', member.data.name);
            updateOnlineUsers();
            const systemMsg = {
                sender: 'النظام',
                text: `🔴 ${member.data.name} غادر الغرفة`,
                time: getCurrentTime(),
                isSystem: true
            };
            channel.publish('chat_message', systemMsg);
        });
        
        // تحديث قائمة المستخدمين
        updateOnlineUsers();
        setInterval(() => updateOnlineUsers(), 10000);
        
        // إرسال رسالة ترحيب
        setTimeout(() => {
            const welcomeMsg = {
                sender: 'النظام',
                text: `✨ مرحباً ${currentUser}! أنت الآن في غرفة ${currentRoom}`,
                time: getCurrentTime(),
                isSystem: true
            };
            displayMessage(welcomeMsg);
        }, 500);
        
        // إظهار واجهة الدردشة
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        document.getElementById('messageInput').focus();
        document.getElementById('chatStatus').innerHTML = '<span class="success">✅ متصل بالغرفة: ' + currentRoom + '</span>';
        
        // إخفاء رسالة الحالة بعد 3 ثواني
        setTimeout(() => {
            document.getElementById('chatStatus').innerHTML = '';
        }, 3000);
    }
    
    function updateOnlineUsers() {
        if (!channel) return;
        
        channel.presence.get((err, members) => {
            if (err) {
                console.error('خطأ في جلب المستخدمين:', err);
                return;
            }
            
            const users = members.map(m => m.data.name).filter(u => u);
            const uniqueUsers = [...new Set(users)];
            const otherUsers = uniqueUsers.filter(u => u !== currentUser);
            
            let usersText = '';
            if (otherUsers.length === 0) {
                usersText = '👥 لا يوجد مستخدمون آخرون متصلون';
            } else {
                usersText = '👥 المتصلون: ' + otherUsers.join('، ');
            }
            
            document.getElementById('onlineUsers').innerHTML = usersText + ` (${uniqueUsers.length} متصل)`;
        });
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        
        if (!text) return;
        
        const messageData = {
            sender: currentUser,
            text: text,
            time: getCurrentTime(),
            isSystem: false
        };
        
        // إرسال الرسالة عبر Ably
        channel.publish('chat_message', messageData, (err) => {
            if (err) {
                console.error('❌ فشل إرسال الرسالة:', err);
                document.getElementById('chatStatus').innerHTML = '<span class="error">❌ فشل إرسال الرسالة</span>';
                setTimeout(() => document.getElementById('chatStatus').innerHTML = '', 2000);
            } else {
                console.log('✅ تم إرسال الرسالة');
            }
        });
        
        // عرض الرسالة محلياً
        displayMessage(messageData, true);
        
        input.value = '';
        input.focus();
    }
    
    function displayMessage(message, isMine = false) {
        const messagesDiv = document.getElementById('messages');
        const messageDiv = document.createElement('div');
        
        const isCurrentUser = (message.sender === currentUser);
        const isSystem = message.isSystem === true;
        
        if (isSystem) {
            messageDiv.className = 'msg system-msg';
            messageDiv.style.background = '#ffc107';
            messageDiv.style.color = '#333';
            messageDiv.style.textAlign = 'center';
            messageDiv.style.width = 'fit-content';
            messageDiv.style.margin = '5px auto';
            messageDiv.innerHTML = `
                <div>${escapeHtml(message.text)}</div>
                <div class="time">${message.time}</div>
            `;
        } else {
            messageDiv.className = `msg ${isCurrentUser ? 'my-msg' : 'other-msg'}`;
            messageDiv.innerHTML = `
                <div class="sender">${isCurrentUser ? 'أنت' : escapeHtml(message.sender)}</div>
                <div>${escapeHtml(message.text)}</div>
                <div class="time">${message.time}</div>
            `;
        }
        
        messagesDiv.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth' });
        
        // تنظيف الرسائل القديمة (اختياري)
        if (messagesDiv.children.length > 200) {
            messagesDiv.removeChild(messagesDiv.children[0]);
        }
    }
    
    function leaveChat() {
        if (channel) {
            // إرسال رسالة مغادرة
            const leaveMsg = {
                sender: 'النظام',
                text: `🔴 ${currentUser} غادر الغرفة`,
                time: getCurrentTime(),
                isSystem: true
            };
            channel.publish('chat_message', leaveMsg);
            
            // مغادرة الحضور
            channel.presence.leave();
        }
        
        if (ably) {
            ably.close();
        }
        
        // العودة إلى شاشة تسجيل الدخول
        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('messages').innerHTML = '';
        document.getElementById('username').value = '';
        document.getElementById('roomName').value = 'general';
        document.getElementById('loginStatus').innerHTML = '';
        
        currentUser = null;
        currentRoom = null;
        channel = null;
        ably = null;
    }
    
    function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    // اختبار الاتصال عند تحميل الصفحة
    window.addEventListener('load', () => {
        console.log('📱 التطبيق جاهز');
        console.log('🔑 مفتاح Ably:', ABLY_KEY.substring(0, 20) + '...');
    });
</script>

</body>
</html>
