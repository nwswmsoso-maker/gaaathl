<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎲 لودو - تواصل اجتماعي</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Cairo',sans-serif; background:linear-gradient(135deg,#1a5f2e 0%,#0d3318 100%); overflow:hidden; position:fixed; width:100%; height:100%; }
        
        /* شاشة تسجيل الدخول الاحترافية */
        .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#1a5f2e 0%,#0d3318 100%); display:flex; align-items:center; justify-content:center; padding:20px; z-index:1000; }
        .login-container { width:100%; max-width:400px; }
        .login-header { text-align:center; margin-bottom:30px; }
        .login-header h1 { font-size:3rem; color:#FFD700; text-shadow:0 4px 15px rgba(0,0,0,0.5); }
        .login-header p { color:white; opacity:0.9; }
        .login-tabs { display:flex; background:rgba(255,255,255,0.1); border-radius:15px; padding:5px; margin-bottom:20px; }
        .login-tab { flex:1; padding:12px; text-align:center; color:white; cursor:pointer; border-radius:10px; transition:0.3s; }
        .login-tab.active { background:#4CAF50; }
        .login-form { background:white; border-radius:20px; padding:30px; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
        .input-group { margin-bottom:20px; }
        .input-group label { display:block; margin-bottom:8px; color:#333; font-weight:600; }
        .input-group input { width:100%; padding:15px; border:2px solid #eee; border-radius:12px; font-family:'Cairo',sans-serif; font-size:16px; }
        .input-group input:focus { outline:none; border-color:#4CAF50; }
        .login-btn { width:100%; padding:15px; background:linear-gradient(135deg,#4CAF50,#45a049); color:white; border:none; border-radius:12px; font-size:1.2rem; font-weight:700; cursor:pointer; font-family:'Cairo',sans-serif; }
        
        /* التطبيق الرئيسي - مثل الواتساب */
        .app-container { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; background:#f0f2f5; }
        
        /* هيدر التطبيق */
        .app-header { background:#075E54; color:white; padding:10px 15px; display:flex; align-items:center; justify-content:space-between; }
        .app-title { font-size:1.3rem; font-weight:700; }
        .header-icons { display:flex; gap:20px; }
        .header-icons i { font-size:1.3rem; cursor:pointer; }
        
        /* تبويبات */
        .tabs { display:flex; background:#075E54; padding:0 10px; }
        .tab { flex:1; padding:15px; text-align:center; color:rgba(255,255,255,0.7); cursor:pointer; font-weight:600; border-bottom:3px solid transparent; }
        .tab.active { color:white; border-bottom-color:white; }
        .tab i { margin-left:5px; }
        
        /* المحتوى */
        .content-area { flex:1; overflow-y:auto; background:white; }
        
        /* قسم الدردشة العامة */
        .public-chat { height:100%; display:flex; flex-direction:column; }
        .chat-messages { flex:1; overflow-y:auto; padding:15px; }
        .message { margin-bottom:15px; display:flex; gap:10px; }
        .message-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
        .message-content { flex:1; }
        .message-header { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
        .message-name { font-weight:700; color:#075E54; }
        .message-time { font-size:0.7rem; color:#999; }
        .message-text { background:#f0f2f5; padding:10px 15px; border-radius:10px; display:inline-block; }
        .message-badge { background:#FFD700; color:#333; padding:2px 8px; border-radius:10px; font-size:0.7rem; margin-right:5px; }
        .chat-input-area { padding:15px; background:#f0f2f5; display:flex; gap:10px; }
        .chat-input { flex:1; padding:12px; border:none; border-radius:25px; font-family:'Cairo',sans-serif; }
        .chat-send { width:50px; height:50px; background:#075E54; border:none; border-radius:50%; color:white; font-size:1.2rem; cursor:pointer; }
        
        /* قسم المنشورات */
        .posts { padding:15px; }
        .post { background:white; border-radius:15px; padding:15px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .post-text { margin-bottom:15px; }
        .post-actions { display:flex; gap:20px; color:#666; }
        .post-actions i { cursor:pointer; }
        .create-post { background:#075E54; color:white; padding:12px; border-radius:10px; margin-bottom:15px; cursor:pointer; text-align:center; }
        
        /* قسم الأصدقاء */
        .friends-list { padding:10px; }
        .friend-item { display:flex; align-items:center; justify-content:space-between; padding:15px; border-bottom:1px solid #eee; }
        .friend-info { display:flex; align-items:center; gap:15px; }
        .friend-avatar { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; }
        .friend-details { }
        .friend-name { font-weight:700; }
        .friend-status { font-size:0.8rem; color:#4CAF50; }
        .friend-status.offline { color:#999; }
        .friend-actions { display:flex; gap:5px; }
        .btn-icon { width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; font-size:1rem; }
        .btn-call { background:#4CAF50; color:white; }
        .btn-chat { background:#2196F3; color:white; }
        .btn-accept { background:#4CAF50; color:white; padding:8px 15px; border-radius:20px; border:none; cursor:pointer; }
        
        /* قسم الأعضاء النشطين */
        .active-members { padding:10px; }
        .member-item { display:flex; align-items:center; gap:15px; padding:10px; border-bottom:1px solid #eee; }
        .online-dot { width:10px; height:10px; background:#4CAF50; border-radius:50%; margin-left:auto; }
        
        /* شاشة المكالمة */
        .call-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#1a5f2e 0%,#0d3318 100%); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:3000; }
        .call-avatar { width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3rem; color:white; margin-bottom:20px; border:4px solid #FFD700; }
        .call-name { color:white; font-size:1.5rem; margin-bottom:10px; }
        .call-status { color:#FFD700; margin-bottom:40px; }
        .call-actions { display:flex; gap:30px; }
        .call-btn { width:70px; height:70px; border-radius:50%; border:none; font-size:1.8rem; cursor:pointer; }
        .call-end { background:#f44336; color:white; }
        .call-mute { background:rgba(255,255,255,0.2); color:white; }
        
        /* شاشة اللعبة */
        .game-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#2d7a3f 0%,#1a5f2e 100%); z-index:2000; }
        
        .hidden { display:none !important; }
        
        /* ألوان الآفاتار */
        .bg-1 { background:#e74c3c; } .bg-2 { background:#3498db; } .bg-3 { background:#2ecc71; }
        .bg-4 { background:#f39c12; } .bg-5 { background:#9b59b6; } .bg-6 { background:#1abc9c; }
        
        /* شارة المشرف */
        .admin-badge { background:#FFD700; color:#333; padding:2px 8px; border-radius:10px; font-size:0.7rem; margin-right:5px; }
        
        /* نافذة الدردشة الخاصة */
        .private-chat-window { position:fixed; bottom:0; left:0; right:0; background:white; border-radius:20px 20px 0 0; height:70%; z-index:2500; display:flex; flex-direction:column; box-shadow:0 -5px 20px rgba(0,0,0,0.2); }
        .private-header { background:#075E54; color:white; padding:15px; border-radius:20px 20px 0 0; display:flex; align-items:center; justify-content:space-between; }
        .private-messages { flex:1; overflow-y:auto; padding:15px; }
        .private-input { padding:15px; background:#f0f2f5; display:flex; gap:10px; }
        .close-chat { cursor:pointer; font-size:1.5rem; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول الاحترافية -->
<div id="loginScreen" class="login-screen">
    <div class="login-container">
        <div class="login-header">
            <h1>🎲 لودو</h1>
            <p>تواصل اجتماعي وألعاب</p>
        </div>
        <div class="login-tabs">
            <div class="login-tab active" onclick="switchLoginTab('login')">دخول</div>
            <div class="login-tab" onclick="switchLoginTab('register')">تسجيل</div>
        </div>
        <div class="login-form">
            <div id="loginForm">
                <div class="input-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم">
                </div>
                <div class="input-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور">
                </div>
                <button class="login-btn" onclick="login()">دخول 🎮</button>
                <p style="text-align:center;margin-top:15px;color:#666;">مشرف: 3tx / 11</p>
            </div>
            <div id="registerForm" class="hidden">
                <div class="input-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="regUsername" placeholder="اختر اسم المستخدم">
                </div>
                <div class="input-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="regPassword" placeholder="اختر كلمة مرور">
                </div>
                <div class="input-group">
                    <label>📧 البريد الإلكتروني (اختياري)</label>
                    <input type="email" id="regEmail" placeholder="بريدك الإلكتروني">
                </div>
                <button class="login-btn" onclick="register()">تسجيل حساب جديد</button>
            </div>
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="appContainer" class="app-container hidden">
    <div class="app-header">
        <div class="app-title">🎲 لودو</div>
        <div class="header-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('chat')"><i class="fas fa-comments"></i> الدردشة</div>
        <div class="tab" onclick="switchTab('posts')"><i class="fas fa-newspaper"></i> المنشورات</div>
        <div class="tab" onclick="switchTab('friends')"><i class="fas fa-users"></i> الأصدقاء</div>
        <div class="tab" onclick="switchTab('active')"><i class="fas fa-circle"></i> نشط الآن</div>
    </div>
    
    <div class="content-area">
        <!-- تبويب الدردشة العامة -->
        <div id="chatTab" class="public-chat">
            <div class="chat-messages" id="publicChatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="publicChatInput" placeholder="اكتب رسالة للجميع...">
                <button class="chat-send" onclick="sendPublicMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        
        <!-- تبويب المنشورات -->
        <div id="postsTab" class="posts hidden">
            <div class="create-post" onclick="createPost()">
                <i class="fas fa-plus-circle"></i> إنشاء منشور جديد
            </div>
            <div id="postsList"></div>
        </div>
        
        <!-- تبويب الأصدقاء -->
        <div id="friendsTab" class="friends-list hidden">
            <div style="padding:15px;display:flex;gap:10px;">
                <input type="text" id="addFriendInput" placeholder="اسم الصديق" style="flex:1;padding:12px;border:1px solid #ddd;border-radius:25px;">
                <button onclick="sendFriendRequest()" style="padding:12px 20px;background:#075E54;color:white;border:none;border-radius:25px;"><i class="fas fa-user-plus"></i></button>
            </div>
            <div id="friendsList"></div>
            <h3 style="padding:15px;">📨 طلبات الصداقة</h3>
            <div id="friendRequestsList"></div>
        </div>
        
        <!-- تبويب الأعضاء النشطين -->
        <div id="activeTab" class="active-members hidden">
            <div id="activeMembersList"></div>
        </div>
    </div>
    
    <!-- زر اللعبة العائم -->
    <div style="position:fixed;bottom:20px;right:20px;">
        <button onclick="startLudoGame()" style="width:60px;height:60px;background:#FFD700;border:none;border-radius:50%;font-size:1.8rem;box-shadow:0 4px 15px rgba(0,0,0,0.3);cursor:pointer;">🎲</button>
    </div>
</div>

<!-- نافذة الدردشة الخاصة -->
<div id="privateChatWindow" class="private-chat-window hidden">
    <div class="private-header">
        <span id="privateChatName">محادثة خاصة</span>
        <i class="fas fa-times close-chat" onclick="closePrivateChat()"></i>
    </div>
    <div class="private-messages" id="privateChatMessages"></div>
    <div class="private-input">
        <input type="text" id="privateChatInput" placeholder="اكتب رسالة...">
        <button onclick="sendPrivateMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- شاشة المكالمة -->
<div id="callScreen" class="call-screen hidden">
    <div class="call-avatar" id="callAvatar">👤</div>
    <div class="call-name" id="callName">جاري الاتصال...</div>
    <div class="call-status" id="callStatus">📞 جاري الاتصال...</div>
    <div class="call-actions">
        <button class="call-btn call-mute" onclick="toggleMute()"><i class="fas fa-microphone"></i></button>
        <button class="call-btn call-end" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
// ==================== المتغيرات ====================
const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
const ADMIN_USER = '3tx';
const ADMIN_CODE = '11';

let currentUser = null;
let isAdmin = false;
let ably = null;
let publicChannel = null;
let privateChannel = null;
let currentPrivateChat = null;
let localStream = null;
let currentPeer = null;
let currentCall = null;

// البيانات
let users = JSON.parse(localStorage.getItem('social_users')) || {};
let posts = JSON.parse(localStorage.getItem('social_posts')) || [];
let friends = JSON.parse(localStorage.getItem('social_friends')) || {};
let friendRequests = JSON.parse(localStorage.getItem('social_requests')) || {};
let messages = JSON.parse(localStorage.getItem('social_messages')) || {};

// حفظ تلقائي
const savedUser = localStorage.getItem('social_lastUser');
if(savedUser) {
    users[savedUser] = users[savedUser] || '123';
}

// ==================== تسجيل الدخول ====================
function switchLoginTab(tab) {
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    if(tab === 'login') {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
    } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    }
}

function register() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    
    if(!username || !password) { alert('املأ الحقول'); return; }
    if(users[username]) { alert('الاسم موجود'); return; }
    
    users[username] = password;
    localStorage.setItem('social_users', JSON.stringify(users));
    alert('✅ تم التسجيل! يمكنك الدخول الآن');
    switchLoginTab('login');
    document.getElementById('loginUsername').value = username;
}

async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    // فحص المشرف
    if(username === ADMIN_USER && password === ADMIN_CODE) {
        isAdmin = true;
    } else {
        if(!users[username] || users[username] !== password) {
            alert('❌ بيانات خاطئة');
            return;
        }
        isAdmin = false;
    }
    
    currentUser = username;
    localStorage.setItem('social_lastUser', username);
    
    // طلب المايك
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {}
    
    // الاتصال
    ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
    ably.connection.on('connected', () => {
        publicChannel = ably.channels.get('public-chat');
        publicChannel.subscribe('message', (msg) => {
            addPublicMessage(msg.data.sender, msg.data.text, msg.data.isAdmin);
        });
        publicChannel.subscribe('post', (msg) => {
            addPost(msg.data);
        });
        publicChannel.subscribe('presence', () => {
            updateActiveMembers();
        });
        publicChannel.presence.enter({ username: currentUser, isAdmin });
        
        privateChannel = ably.channels.get(`private-${currentUser}`);
        privateChannel.subscribe('message', (msg) => {
            if(currentPrivateChat === msg.data.sender) {
                addPrivateMessage(msg.data.sender, msg.data.text);
            }
        });
        privateChannel.subscribe('call', handleIncomingCall);
        privateChannel.subscribe('friend-request', handleFriendRequest);
        privateChannel.subscribe('friend-accept', handleFriendAccept);
    });
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appContainer').classList.remove('hidden');
    
    loadData();
    updateActiveMembers();
}

// ==================== تبويبات ====================
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    document.getElementById('chatTab').classList.add('hidden');
    document.getElementById('postsTab').classList.add('hidden');
    document.getElementById('friendsTab').classList.add('hidden');
    document.getElementById('activeTab').classList.add('hidden');
    
    if(tab === 'chat') document.getElementById('chatTab').classList.remove('hidden');
    else if(tab === 'posts') { document.getElementById('postsTab').classList.remove('hidden'); renderPosts(); }
    else if(tab === 'friends') { document.getElementById('friendsTab').classList.remove('hidden'); renderFriends(); }
    else if(tab === 'active') { document.getElementById('activeTab').classList.remove('hidden'); renderActiveMembers(); }
}

// ==================== الدردشة العامة ====================
function sendPublicMessage() {
    const input = document.getElementById('publicChatInput');
    const text = input.value.trim();
    if(!text) return;
    
    publicChannel.publish('message', { sender: currentUser, text, isAdmin });
    addPublicMessage(currentUser, text, isAdmin);
    input.value = '';
}

function addPublicMessage(sender, text, admin) {
    const div = document.getElementById('publicChatMessages');
    const color = getAvatarColor(sender);
    div.innerHTML += `
        <div class="message">
            <div class="message-avatar ${color}">${sender[0].toUpperCase()}</div>
            <div class="message-content">
                <div class="message-header">
                    <span class="message-name">${sender}</span>
                    ${admin ? '<span class="admin-badge">👑 مشرف</span>' : ''}
                    <span class="message-time">الآن</span>
                </div>
                <div class="message-text">${text}</div>
            </div>
        </div>
    `;
    div.scrollTop = div.scrollHeight;
}

// ==================== المنشورات ====================
function createPost() {
    const text = prompt('اكتب منشورك:');
    if(!text) return;
    
    const post = { id: Date.now(), author: currentUser, text, likes: 0, comments: [], time: new Date().toLocaleString() };
    posts.unshift(post);
    localStorage.setItem('social_posts', JSON.stringify(posts));
    publicChannel.publish('post', post);
    renderPosts();
}

function addPost(post) {
    posts.unshift(post);
    localStorage.setItem('social_posts', JSON.stringify(posts));
    renderPosts();
}

function renderPosts() {
    const div = document.getElementById('postsList');
    div.innerHTML = posts.map(p => `
        <div class="post">
            <div class="post-header">
                <div class="friend-avatar ${getAvatarColor(p.author)}">${p.author[0]}</div>
                <div>
                    <div class="friend-name">${p.author}</div>
                    <div style="font-size:0.7rem;color:#999;">${p.time}</div>
                </div>
            </div>
            <div class="post-text">${p.text}</div>
            <div class="post-actions">
                <span onclick="likePost('${p.id}')"><i class="far fa-heart"></i> ${p.likes}</span>
                <span><i class="far fa-comment"></i> ${p.comments.length}</span>
            </div>
        </div>
    `).join('');
}

function likePost(id) {
    const post = posts.find(p => p.id == id);
    if(post) { post.likes++; localStorage.setItem('social_posts', JSON.stringify(posts)); renderPosts(); }
}

// ==================== الأصدقاء ====================
function sendFriendRequest() {
    const name = document.getElementById('addFriendInput').value.trim();
    if(!name || name === currentUser) return;
    
    privateChannel = ably.channels.get(`private-${name}`);
    privateChannel.publish('friend-request', { from: currentUser });
    alert('✅ تم إرسال الطلب');
}

function handleFriendRequest(msg) {
    if(!friendRequests[currentUser]) friendRequests[currentUser] = [];
    friendRequests[currentUser].push({ from: msg.data.from });
    localStorage.setItem('social_requests', JSON.stringify(friendRequests));
    renderFriends();
}

function acceptFriend(from) {
    if(!friends[currentUser]) friends[currentUser] = [];
    if(!friends[from]) friends[from] = [];
    friends[currentUser].push(from);
    friends[from].push(currentUser);
    
    friendRequests[currentUser] = friendRequests[currentUser].filter(r => r.from !== from);
    localStorage.setItem('social_friends', JSON.stringify(friends));
    localStorage.setItem('social_requests', JSON.stringify(friendRequests));
    
    const peerChannel = ably.channels.get(`private-${from}`);
    peerChannel.publish('friend-accept', { from: currentUser });
    renderFriends();
}

function handleFriendAccept(msg) {
    if(!friends[currentUser]) friends[currentUser] = [];
    friends[currentUser].push(msg.data.from);
    localStorage.setItem('social_friends', JSON.stringify(friends));
    renderFriends();
}

function renderFriends() {
    const myFriends = friends[currentUser] || [];
    const myRequests = friendRequests[currentUser] || [];
    
    document.getElementById('friendsList').innerHTML = myFriends.map(f => `
        <div class="friend-item">
            <div class="friend-info">
                <div class="friend-avatar ${getAvatarColor(f)}">${f[0]}</div>
                <div class="friend-details">
                    <div class="friend-name">${f}</div>
                    <div class="friend-status">🟢 متصل</div>
                </div>
            </div>
            <div class="friend-actions">
                <button class="btn-icon btn-call" onclick="startCall('${f}')"><i class="fas fa-phone"></i></button>
                <button class="btn-icon btn-chat" onclick="openPrivateChat('${f}')"><i class="fas fa-comment"></i></button>
            </div>
        </div>
    `).join('') || '<p>لا يوجد أصدقاء</p>';
    
    document.getElementById('friendRequestsList').innerHTML = myRequests.map(r => `
        <div class="friend-item">
            <span>${r.from}</span>
            <button class="btn-accept" onclick="acceptFriend('${r.from}')">قبول</button>
        </div>
    `).join('') || '<p>لا توجد طلبات</p>';
}

// ==================== الأعضاء النشطين ====================
function updateActiveMembers() {
    publicChannel.presence.get((err, members) => {
        window.activeMembers = members || [];
        renderActiveMembers();
    });
}

function renderActiveMembers() {
    const members = window.activeMembers || [];
    const div = document.getElementById('activeMembersList');
    div.innerHTML = members.map(m => `
        <div class="member-item">
            <div class="friend-avatar ${getAvatarColor(m.clientId)}">${m.clientId[0]}</div>
            <div>
                <div class="friend-name">${m.clientId}</div>
                ${m.data?.isAdmin ? '<span class="admin-badge">👑 مشرف</span>' : ''}
            </div>
            <div class="online-dot"></div>
        </div>
    `).join('');
}

// ==================== الدردشة الخاصة ====================
function openPrivateChat(user) {
    currentPrivateChat = user;
    document.getElementById('privateChatName').textContent = `💬 ${user}`;
    document.getElementById('privateChatWindow').classList.remove('hidden');
    loadPrivateMessages(user);
}

function closePrivateChat() {
    document.getElementById('privateChatWindow').classList.add('hidden');
    currentPrivateChat = null;
}

function sendPrivateMessage() {
    const input = document.getElementById('privateChatInput');
    const text = input.value.trim();
    if(!text || !currentPrivateChat) return;
    
    const peerChannel = ably.channels.get(`private-${currentPrivateChat}`);
    peerChannel.publish('message', { sender: currentUser, text });
    addPrivateMessage(currentUser, text);
    input.value = '';
}

function addPrivateMessage(sender, text) {
    const div = document.getElementById('privateChatMessages');
    div.innerHTML += `<div class="message-text" style="margin-bottom:10px;"><strong>${sender}:</strong> ${text}</div>`;
    div.scrollTop = div.scrollHeight;
}

function loadPrivateMessages(user) {
    const key = [currentUser, user].sort().join('-');
    const msgs = messages[key] || [];
    const div = document.getElementById('privateChatMessages');
    div.innerHTML = msgs.map(m => `<div class="message-text"><strong>${m.sender}:</strong> ${m.text}</div>`).join('');
}

// ==================== المكالمات ====================
function startCall(user) {
    currentCall = user;
    document.getElementById('callScreen').classList.remove('hidden');
    document.getElementById('callName').textContent = user;
    document.getElementById('callAvatar').textContent = user[0];
    document.getElementById('callAvatar').className = `call-avatar ${getAvatarColor(user)}`;
    
    const peer = new SimplePeer({ initiator: true, stream: localStream, trickle: false });
    setupCallPeer(peer, user);
    
    const peerChannel = ably.channels.get(`private-${user}`);
    peerChannel.publish('call', { from: currentUser, type: 'offer' });
}

function handleIncomingCall(msg) {
    const { from } = msg.data;
    if(confirm(`${from} يتصل بك! هل تريد الرد؟`)) {
        currentCall = from;
        document.getElementById('callScreen').classList.remove('hidden');
        document.getElementById('callName').textContent = from;
        document.getElementById('callStatus').textContent = '📞 متصل';
        
        const peer = new SimplePeer({ initiator: false, stream: localStream, trickle: false });
        setupCallPeer(peer, from);
    }
}

function setupCallPeer(peer, user) {
    peer.on('signal', signal => {
        const peerChannel = ably.channels.get(`private-${user}`);
        peerChannel.publish('call-signal', { signal });
    });
    
    peer.on('stream', remoteStream => {
        const audio = new Audio();
        audio.srcObject = remoteStream;
        audio.autoplay = true;
        document.getElementById('callStatus').textContent = '📞 متصل';
    });
    
    currentPeer = peer;
    
    privateChannel.subscribe('call-signal', (msg) => {
        if(currentPeer) currentPeer.signal(msg.data.signal);
    });
}

function toggleMute() {
    if(localStream) {
        const track = localStream.getAudioTracks()[0];
        track.enabled = !track.enabled;
    }
}

function endCall() {
    document.getElementById('callScreen').classList.add('hidden');
    if(currentPeer) currentPeer.destroy();
    currentPeer = null;
    currentCall = null;
}

function getAvatarColor(name) {
    const colors = ['bg-1','bg-2','bg-3','bg-4','bg-5','bg-6'];
    return colors[name.length % colors.length];
}
