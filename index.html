<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة فورية - شغالة 100%</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #075E54; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { background: #fff; border-radius: 20px; width: 100%; max-width: 450px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header { background: #075E54; color: white; padding: 15px; text-align: center; }
        .login-box, .chat-box { padding: 15px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 25px; font-size: 16px; }
        button { background: #25D366; color: white; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .messages { height: 400px; overflow-y: auto; background: #E5DDD5; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; margin: 5px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .my-msg { background: #DCF8C6; margin-left: auto; text-align: right; }
        .other-msg { background: white; margin-right: auto; }
        .system-msg { background: #FFC107; text-align: center; margin: 5px auto; font-size: 11px; width: fit-content; }
        .sender { font-size: 11px; font-weight: bold; color: #075E54; }
        .time { font-size: 10px; color: #666; margin-top: 3px; }
        .online-users { background: #E5DDD5; padding: 8px; border-radius: 10px; margin-bottom: 10px; font-size: 12px; text-align: center; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; margin: 0; }
        .input-area button { width: auto; padding: 12px 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>💬 واتساب لايت</h2>
        <p>دردشة فورية حقيقية</p>
    </div>

    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <button onclick="joinChat()">دخول</button>
        <div id="status" style="font-size:12px; text-align:center; margin-top:10px; color:#666;"></div>
    </div>

    <div id="chatScreen" class="chat-box hidden">
        <div id="onlineUsers" class="online-users">🟢 جاري التحميل...</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">📤</button>
        </div>
        <button onclick="leaveChat()" style="background:#dc3545; margin-top:10px;">🚪 خروج</button>
    </div>
</div>

<script>
    // 🔑 مفتاح Ably الجديد
    const ABLY_KEY = 'w2taPw.vowV2w:a8slKnYqOSdV5LTfnomK5UpANKY2snGDyf-KmmVhtaw';
    
    let ably, channel, currentUser;
    
    function joinChat() {
        currentUser = document.getElementById('username').value.trim();
        if (!currentUser) {
            document.getElementById('status').innerHTML = '❌ اكتب اسمك';
            return;
        }
        
        document.getElementById('status').innerHTML = '🔄 جاري الاتصال...';
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            document.getElementById('status').innerHTML = '✅ متصل! جاري الدخول...';
            channel = ably.channels.get('general');
            
            // استقبال الرسائل
            channel.subscribe('message', (msg) => {
                displayMessage(msg.data);
            });
            
            // دخول المستخدم
            channel.presence.enter({ name: currentUser });
            
            // تحديث قائمة المتصلين
            channel.presence.subscribe(() => updateUsers());
            updateUsers();
            
            // رسالة ترحيب
            channel.publish('message', {
                sender: 'system',
                text: `🎉 ${currentUser} دخل الدردشة`,
                time: new Date().toLocaleTimeString()
            });
            
            // إظهار الدردشة
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('status').innerHTML = '';
        });
        
        ably.connection.on('failed', (err) => {
            document.getElementById('status').innerHTML = '❌ فشل الاتصال: ' + JSON.stringify(err);
        });
    }
    
    function updateUsers() {
        channel.presence.get((err, members) => {
            if (err) return;
            let users = members.map(m => m.data.name).filter(u => u);
            let text = users.length ? '👥 ' + users.join('، ') : '👥 لا يوجد متصلين';
            document.getElementById('onlineUsers').innerHTML = text;
        });
    }
    
    function sendMsg() {
        let text = document.getElementById('msgInput').value.trim();
        if (!text) return;
        
        let msg = {
            sender: currentUser,
            text: text,
            time: new Date().toLocaleTimeString()
        };
        
        channel.publish('message', msg);
        displayMessage(msg, true);
        document.getElementById('msgInput').value = '';
    }
    
    function displayMessage(msg, isMe = false) {
        let div = document.createElement('div');
        
        if (msg.sender === 'system') {
            div.className = 'msg system-msg';
            div.innerHTML = msg.text;
        } else {
            div.className = 'msg ' + (isMe || msg.sender === currentUser ? 'my-msg' : 'other-msg');
            div.innerHTML = `
                <div class="sender">${msg.sender === currentUser ? 'أنت' : msg.sender}</div>
                <div>${escapeHtml(msg.text)}</div>
                <div class="time">${msg.time}</div>
            `;
        }
        
        document.getElementById('messages').appendChild(div);
        div.scrollIntoView();
    }
    
    function leaveChat() {
        if (channel) {
            channel.publish('message', {
                sender: 'system',
                text: `🔴 ${currentUser} غادر`,
                time: new Date().toLocaleTimeString()
            });
            channel.presence.leave();
            ably.close();
        }
        location.reload();
    }
    
    function escapeHtml(text) {
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>

</body>
</html>
