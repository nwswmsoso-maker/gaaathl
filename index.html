<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دردشة صوتية - مكالمات حقيقية</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0B0C10; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { background: #1F2833; border-radius: 25px; width: 100%; max-width: 500px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .header { background: #45A29E; color: white; padding: 18px; text-align: center; }
        .header h2 { font-size: 1.3rem; }
        .login-box, .chat-box { padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 25px; font-size: 16px; }
        button { background: #45A29E; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .hidden { display: none; }
        .messages { height: 350px; overflow-y: auto; background: #0B0C10; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; margin: 5px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .my-msg { background: #45A29E; color: white; margin-left: auto; text-align: right; }
        .other-msg { background: #2C3E50; color: white; margin-right: auto; }
        .system-msg { background: #FFC107; color: #333; text-align: center; margin: 5px auto; font-size: 11px; width: fit-content; }
        .sender { font-size: 11px; font-weight: bold; margin-bottom: 3px; opacity: 0.8; }
        .time { font-size: 9px; opacity: 0.6; margin-top: 3px; }
        .online-users { background: #2C3E50; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 12px; text-align: center; color: white; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; margin: 0; background: #2C3E50; color: white; }
        .input-area input::placeholder { color: #888; }
        .input-area button { width: auto; padding: 12px 20px; }
        .call-status { background: #FFC107; color: #333; padding: 10px; text-align: center; border-radius: 12px; margin-bottom: 10px; font-size: 13px; font-weight: bold; }
        .user-item { display: flex; justify-content: space-between; align-items: center; background: #2C3E50; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; }
        .user-name { color: white; font-size: 14px; }
        .call-btn { background: #4CAF50; border: none; padding: 6px 15px; border-radius: 20px; color: white; cursor: pointer; font-size: 12px; }
        .call-btn.in-call { background: #f44336; }
        .call-btn.ringing { background: #ff9800; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .logout-btn { background: #f44336; margin-top: 10px; }
        .mic-permission { background: #ff9800; padding: 8px; border-radius: 10px; text-align: center; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🎙️ دردشة صوتية</h2>
        <p>مكالمات حقيقية + رسائل فورية</p>
    </div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <button onclick="login()">دخول</button>
        <div id="loginStatus" style="font-size:12px; text-align:center; margin-top:10px; color:#888;"></div>
    </div>

    <!-- شاشة الدردشة -->
    <div id="chatScreen" class="chat-box hidden">
        <div class="online-users" id="onlineUsers">🟢 جاري التحميل...</div>
        <div class="call-status" id="callStatus"></div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">📤</button>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 خروج</button>
    </div>
</div>

<script>
    // 🔑 مفتاح Ably
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, channel, currentUser;
    let localStream = null;
    let currentCall = null;
    let callWithUser = null;
    let processedMessages = new Set(); // لمنع تكرار الرسائل
    
    async function login() {
        currentUser = document.getElementById('username').value.trim();
        if (!currentUser) {
            document.getElementById('loginStatus').innerHTML = '❌ اكتب اسمك';
            return;
        }
        
        document.getElementById('loginStatus').innerHTML = '🔄 جاري الاتصال...';
        
        // طلب صلاحية الميكروفون
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('🎤 ميكروفون جاهز');
        } catch (err) {
            document.getElementById('loginStatus').innerHTML = '⚠️ لا يمكن الوصول للميكروفون - المكالمات الصوتية غير متاحة';
        }
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            document.getElementById('loginStatus').innerHTML = '✅ متصل!';
            
            channel = ably.channels.get('main_room');
            
            // استقبال الرسائل النصية (مع منع التكرار)
            channel.subscribe('message', (msg) => {
                const msgId = `${msg.data.sender}_${msg.data.text}_${msg.data.time}`;
                if (!processedMessages.has(msgId)) {
                    processedMessages.add(msgId);
                    displayMessage(msg.data);
                }
            });
            
            // استقبال إشارات المكالمات
            channel.subscribe('webrtc', (signal) => {
                handleWebRTCSignal(signal.data);
            });
            
            // الحضور
            channel.presence.enter({ name: currentUser });
            channel.presence.subscribe(() => updateUsers());
            updateUsers();
            
            // رسالة ترحيب
            channel.publish('message', {
                sender: 'system',
                text: `🎉 ${currentUser} دخل الدردشة`,
                time: getTime(),
                isSystem: true
            });
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        });
        
        ably.connection.on('failed', () => {
            document.getElementById('loginStatus').innerHTML = '❌ فشل الاتصال';
        });
    }
    
    function updateUsers() {
        channel.presence.get((err, members) => {
            if (err) return;
            let users = members.map(m => m.data.name);
            let otherUsers = users.filter(u => u !== currentUser);
            
            let container = document.getElementById('onlineUsers');
            if (otherUsers.length === 0) {
                container.innerHTML = '👥 لا يوجد مستخدمون آخرون';
            } else {
                let html = '👥 المتصلون: ';
                otherUsers.forEach(user => {
                    const isCalling = (callWithUser === user);
                    html += `<div class="user-item">
                                <span class="user-name">${escapeHtml(user)}</span>
                                <button class="call-btn ${isCalling ? 'in-call' : ''}" 
                                        onclick="startCall('${user}')">
                                    ${isCalling ? '🔴 في مكالمة' : '🎤 اتصل'}
                                </button>
                             </div>`;
                });
                container.innerHTML = html;
            }
        });
    }
    
    async function startCall(targetUser) {
        if (!localStream) {
            document.getElementById('callStatus').innerHTML = '❌ لا يمكن بدء المكالمة - الميكروفون غير متاح';
            return;
        }
        
        if (currentCall) {
            endCall();
        }
        
        callWithUser = targetUser;
        document.getElementById('callStatus').innerHTML = `📞 جاري الاتصال بـ ${targetUser}...`;
        
        const peer = new SimplePeer({
            initiator: true,
            stream: localStream,
            trickle: false
        });
        
        peer.on('signal', signalData => {
            channel.publish('webrtc', {
                to: targetUser,
                from: currentUser,
                signal: signalData,
                type: 'offer'
            });
        });
        
        peer.on('stream', stream => {
            playRemoteAudio(stream);
            document.getElementById('callStatus').innerHTML = `🎙️ مكالمة جارية مع ${targetUser} - اضغط زر اتصل مرة أخرى لإنهاء`;
            updateUsers();
        });
        
        peer.on('error', () => endCall());
        peer.on('close', () => endCall());
        
        currentCall = peer;
    }
    
    function handleWebRTCSignal(data) {
        if (data.to !== currentUser) return;
        
        if (data.type === 'offer') {
            if (confirm(`${data.from} يتصل بك. هل تريد الرد؟`)) {
                answerCall(data.from, data.signal);
            } else {
                channel.publish('webrtc', {
                    to: data.from,
                    from: currentUser,
                    type: 'reject'
                });
            }
        }
        else if (data.type === 'answer' && currentCall) {
            currentCall.signal(data.signal);
            document.getElementById('callStatus').innerHTML = `🎙️ مكالمة جارية مع ${callWithUser}`;
        }
        else if (data.type === 'reject') {
            document.getElementById('callStatus').innerHTML = `❌ ${data.from} رفض المكالمة`;
            setTimeout(() => {
                if (document.getElementById('callStatus').innerHTML.includes('رفض')) {
                    document.getElementById('callStatus').innerHTML = '';
                }
            }, 3000);
            endCall();
        }
    }
    
    async function answerCall(caller, signalData) {
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(err) {
                document.getElementById('callStatus').innerHTML = '❌ لا يمكن الوصول للميكروفون';
                return;
            }
        }
        
        callWithUser = caller;
        
        const peer = new SimplePeer({
            initiator: false,
            stream: localStream,
            trickle: false
        });
        
        peer.on('signal', signal => {
            channel.publish('webrtc', {
                to: caller,
                from: currentUser,
                signal: signal,
                type: 'answer'
            });
        });
        
        peer.on('stream', stream => {
            playRemoteAudio(stream);
            document.getElementById('callStatus').innerHTML = `🎙️ مكالمة جارية مع ${caller}`;
            updateUsers();
        });
        
        peer.on('error', () => endCall());
        peer.on('close', () => endCall());
        
        peer.signal(signalData);
        currentCall = peer;
    }
    
    function playRemoteAudio(stream) {
        const audio = new Audio();
        audio.srcObject = stream;
        audio.autoplay = true;
    }
    
    function endCall() {
        if (currentCall) {
            currentCall.destroy();
            currentCall = null;
        }
        callWithUser = null;
        document.getElementById('callStatus').innerHTML = '';
        updateUsers();
    }
    
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;
        
        const msg = {
            sender: currentUser,
            text: text,
            time: getTime(),
            isSystem: false,
            id: Date.now()
        };
        
        channel.publish('message', msg);
        displayMessage(msg, true);
        input.value = '';
    }
    
    function displayMessage(msg, isMe = false) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        
        if (msg.isSystem || msg.sender === 'system') {
            div.className = 'msg system-msg';
            div.innerHTML = msg.text;
        } else {
            const isCurrent = (msg.sender === currentUser);
            div.className = `msg ${isCurrent ? 'my-msg' : 'other-msg'}`;
            div.innerHTML = `
                ${!isCurrent ? `<div class="sender">${escapeHtml(msg.sender)}</div>` : ''}
                <div>${escapeHtml(msg.text)}</div>
                <div class="time">${msg.time}</div>
            `;
        }
        
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }
    
    function logout() {
        if (currentCall) endCall();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (channel) {
            channel.publish('message', {
                sender: 'system',
                text: `🔴 ${currentUser} غادر`,
                time: getTime(),
                isSystem: true
            });
            channel.presence.leave();
            ably.close();
        }
        location.reload();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
