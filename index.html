<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غرفة صوتية - 10 مايكات</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; background: #0f3460; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 2px solid #e94560; }
        .header { background: #e94560; color: white; padding: 15px; text-align: center; }
        .header h1 { font-size: 1.5rem; }
        .login-box { padding: 30px; text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 30px; font-size: 1rem; text-align: center; background: #1a1a2e; color: white; }
        .login-box button { width: 100%; padding: 15px; background: #e94560; color: white; border: none; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .mics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px; background: #0f3460; }
        .mic-card { background: #1a1a2e; border-radius: 20px; padding: 15px 10px; text-align: center; transition: all 0.3s ease; border: 2px solid #533483; cursor: pointer; }
        .mic-card.speaking { border-color: #4CAF50; box-shadow: 0 0 20px rgba(76, 175, 80, 0.5); animation: borderPulse 0.5s infinite; }
        @keyframes borderPulse { 0% { border-color: #4CAF50; } 100% { border-color: #00ff00; } }
        .mic-card.empty { opacity: 0.6; border-color: #666; }
        .mic-card.selected { border-color: #e94560; box-shadow: 0 0 15px #e94560; }
        .mic-number { background: #e94560; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: bold; }
        .mic-icon { font-size: 40px; margin-bottom: 10px; }
        .mic-name { color: white; font-size: 12px; font-weight: bold; margin: 8px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .voice-indicator { width: 100%; height: 3px; background: #333; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .voice-level { height: 100%; width: 0%; background: #4CAF50; transition: width 0.05s; }
        .chat-area { background: #1a1a2e; margin: 0 20px 20px; border-radius: 20px; overflow: hidden; }
        .chat-messages { height: 120px; overflow-y: auto; padding: 10px; background: #0d0d1a; }
        .chat-msg { padding: 5px 10px; margin: 3px 0; border-radius: 15px; font-size: 12px; }
        .chat-msg.my { background: #e94560; color: white; text-align: right; margin-left: 20px; }
        .chat-msg.other { background: #533483; color: white; margin-right: 20px; }
        .chat-msg.system { background: #ff9800; color: #333; text-align: center; font-size: 10px; }
        .chat-input { display: flex; padding: 10px; gap: 8px; background: #1a1a2e; }
        .chat-input input { flex: 1; padding: 10px; border: none; border-radius: 20px; background: #0d0d1a; color: white; }
        .chat-input button { padding: 10px 20px; background: #e94560; border: none; border-radius: 20px; color: white; cursor: pointer; }
        .action-buttons { display: flex; gap: 10px; padding: 0 20px 20px; }
        .action-buttons button { flex: 1; padding: 12px; background: #533483; border: none; border-radius: 25px; color: white; cursor: pointer; }
        .hidden { display: none; }
        .status { text-align: center; padding: 10px; font-size: 12px; color: #ff9800; }
        .mic-status { position: absolute; top: 5px; right: 5px; width: 10px; height: 10px; border-radius: 50%; background: red; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎙️ غرفة المايكات</h1>
        <p>اختر مايك وتكلم مع الجميع</p>
    </div>

    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <div class="mics-grid" id="micSelection" style="grid-template-columns: repeat(5, 1fr); padding: 20px 0;">
            <!-- 10 مايكات للاختيار -->
        </div>
        <div id="loginStatus" class="status"></div>
    </div>

    <div id="roomScreen" class="hidden">
        <div class="mics-grid" id="micsGrid"></div>
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="رسالة..." onkeypress="if(event.key==='Enter') sendChat()">
                <button onclick="sendChat()">إرسال</button>
            </div>
        </div>
        <div class="action-buttons">
            <button id="muteBtn" onclick="toggleMute()">🔇 كتم مايكي</button>
            <button onclick="leaveRoom()">🚪 مغادرة</button>
        </div>
        <div id="roomStatus" class="status"></div>
    </div>
</div>

<script>
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, channel;
    let currentUser = null;
    let myMicNumber = null;
    let localStream = null;
    let peers = new Map();
    let micsData = {};
    let isMuted = false;
    let processedMessages = new Set();
    let iceServers = [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }];

    // إنشاء مايكات للاختيار
    function createMicSelection() {
        const container = document.getElementById('micSelection');
        container.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const mic = document.createElement('div');
            mic.className = 'mic-card';
            mic.onclick = () => selectMic(i);
            mic.innerHTML = `
                <div class="mic-number">🎤 ${i}</div>
                <div class="mic-icon">🎙️</div>
                <div class="mic-name">مايك ${i}</div>
            `;
            container.appendChild(mic);
        }
    }

    function selectMic(micNumber) {
        document.querySelectorAll('#micSelection .mic-card').forEach((mic, idx) => {
            if (idx + 1 === micNumber) {
                mic.classList.add('selected');
            } else {
                mic.classList.remove('selected');
            }
        });
        myMicNumber = micNumber;
        document.getElementById('loginStatus').innerHTML = `✅ تم اختيار مايك رقم ${micNumber}`;
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        
        if (!username) {
            document.getElementById('loginStatus').innerHTML = '❌ اكتب اسم المستخدم';
            return;
        }
        
        if (!myMicNumber) {
            document.getElementById('loginStatus').innerHTML = '❌ اختر مايك أولاً';
            return;
        }
        
        currentUser = username;
        
        document.getElementById('loginStatus').innerHTML = '🎤 جاري طلب الميكروفون...';
        
        // طلب الميكروفون
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('✅ ميكروفون جاهز');
            document.getElementById('loginStatus').innerHTML = '✅ ميكروفون جاهز، جاري الاتصال...';
        } catch (err) {
            document.getElementById('loginStatus').innerHTML = '❌ لا يمكن الوصول للميكروفون: ' + err.message;
            return;
        }
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            document.getElementById('loginStatus').innerHTML = '✅ متصل! جاري الدخول للغرفة...';
            
            channel = ably.channels.get('voice_room');
            
            // استقبال إشارات WebRTC
            channel.subscribe('webrtc', (signal) => {
                handleSignal(signal.data);
            });
            
            // استقبال تحديثات المايكات
            channel.subscribe('mic_update', (update) => {
                handleMicUpdate(update.data);
            });
            
            // استقبال رسائل الدردشة
            channel.subscribe('chat', (msg) => {
                const msgId = `${msg.data.sender}_${msg.data.text}_${msg.data.time}`;
                if (!processedMessages.has(msgId)) {
                    processedMessages.add(msgId);
                    displayChat(msg.data);
                }
            });
            
            // إعلان المايك
            announceMic();
            
            // تحديث الحضور
            channel.presence.enter({ user: currentUser, mic: myMicNumber });
            channel.presence.subscribe(() => updateFromPresence());
            updateFromPresence();
            
            // إنشاء واجهة المايكات
            createMicsUI();
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('roomScreen').classList.remove('hidden');
            document.getElementById('roomStatus').innerHTML = `🎤 أنت في مايك ${myMicNumber} - ${currentUser}`;
        });
        
        ably.connection.on('failed', (err) => {
            document.getElementById('loginStatus').innerHTML = '❌ فشل الاتصال: ' + JSON.stringify(err);
        });
    }
    
    function announceMic() {
        channel.publish('mic_update', {
            mic: myMicNumber,
            user: currentUser,
            action: 'join'
        });
        
        channel.publish('chat', {
            sender: 'system',
            text: `🎉 ${currentUser} دخل مايك ${myMicNumber}`,
            time: getTime()
        });
    }
    
    function handleMicUpdate(data) {
        if (data.mic === myMicNumber && data.action !== 'join') return;
        
        if (data.action === 'join') {
            micsData[data.mic] = { user: data.user, speaking: false };
            updateMicUI(data.mic);
            
            // إنشاء اتصال مع المستخدم الجديد
            if (data.user !== currentUser && !peers.has(data.user)) {
                createPeer(data.user, true);
            }
        } else if (data.action === 'leave') {
            micsData[data.mic] = { user: null, speaking: false };
            updateMicUI(data.mic);
            
            if (peers.has(data.user)) {
                peers.get(data.user).destroy();
                peers.delete(data.user);
            }
        }
    }
    
    function updateFromPresence() {
        channel.presence.get((err, members) => {
            if (err) return;
            
            // إعادة تعيين
            for (let i = 1; i <= 10; i++) {
                micsData[i] = { user: null, speaking: false };
            }
            
            members.forEach(m => {
                if (m.data && m.data.mic) {
                    micsData[m.data.mic] = { user: m.data.user, speaking: false };
                    updateMicUI(m.data.mic);
                }
            });
            
            // الاتصال بالجميع
            members.forEach(m => {
                if (m.data.user !== currentUser && !peers.has(m.data.user)) {
                    createPeer(m.data.user, true);
                }
            });
        });
    }
    
    function createMicsUI() {
        const grid = document.getElementById('micsGrid');
        grid.innerHTML = '';
        
        for (let i = 1; i <= 10; i++) {
            const mic = document.createElement('div');
            mic.className = 'mic-card empty';
            mic.id = `mic_${i}`;
            mic.innerHTML = `
                <div class="mic-number">🎤 ${i}</div>
                <div class="mic-icon">🎙️</div>
                <div class="mic-name">مايك ${i}</div>
                <div class="voice-indicator"><div class="voice-level" id="voice_${i}"></div></div>
            `;
            grid.appendChild(mic);
            micsData[i] = { user: null, speaking: false };
        }
    }
    
    function updateMicUI(micNum) {
        const mic = document.getElementById(`mic_${micNum}`);
        const data = micsData[micNum];
        
        if (!mic) return;
        
        if (data && data.user) {
            mic.classList.remove('empty');
            mic.querySelector('.mic-name').innerHTML = data.user;
            if (data.speaking) {
                mic.classList.add('speaking');
            } else {
                mic.classList.remove('speaking');
            }
        } else {
            mic.classList.add('empty');
            mic.querySelector('.mic-name').innerHTML = `مايك ${micNum} - فارغ`;
            mic.classList.remove('speaking');
        }
    }
    
    function createPeer(remoteUser, initiator = true) {
        if (!localStream) return null;
        
        const peer = new SimplePeer({
            initiator: initiator,
            stream: localStream,
            trickle: false,
            config: { iceServers: iceServers }
        });
        
        peer.on('signal', signalData => {
            channel.publish('webrtc', {
                to: remoteUser,
                from: currentUser,
                signal: signalData
            });
        });
        
        peer.on('stream', stream => {
            console.log(`🎵 استلام صوت من ${remoteUser}`);
            
            // تشغيل الصوت
            const audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
            
            // تحليل مستوى الصوت
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            // إيجاد رقم مايك هذا المستخدم
            let targetMic = null;
            for (let i = 1; i <= 10; i++) {
                if (micsData[i]?.user === remoteUser) targetMic = i;
            }
            
            const interval = setInterval(() => {
                analyser.getByteTimeDomainData(dataArray);
                let max = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = Math.abs(dataArray[i] - 128) / 128;
                    if (v > max) max = v;
                }
                
                if (targetMic) {
                    const voiceLevel = document.getElementById(`voice_${targetMic}`);
                    if (voiceLevel) voiceLevel.style.width = (max * 100) + '%';
                    
                    if (max > 0.05 && !micsData[targetMic]?.speaking) {
                        micsData[targetMic].speaking = true;
                        updateMicUI(targetMic);
                    } else if (max <= 0.05 && micsData[targetMic]?.speaking) {
                        micsData[targetMic].speaking = false;
                        updateMicUI(targetMic);
                    }
                }
            }, 100);
            
            peer.on('close', () => clearInterval(interval));
        });
        
        peer.on('connect', () => {
            console.log(`✅ متصل مع ${remoteUser}`);
        });
        
        peer.on('error', err => console.error('Peer error:', err));
        
        peers.set(remoteUser, peer);
        return peer;
    }
    
    function handleSignal(data) {
        if (data.to !== currentUser) return;
        
        if (peers.has(data.from)) {
            peers.get(data.from).signal(data.signal);
        } else {
            const peer = createPeer(data.from, false);
            if (peer) peer.signal(data.signal);
        }
    }
    
    function toggleMute() {
        isMuted = !isMuted;
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = !isMuted;
        }
        const btn = document.getElementById('muteBtn');
        btn.innerHTML = isMuted ? '🔊 فتح المايك' : '🔇 كتم المايك';
        btn.style.background = isMuted ? '#f44336' : '#533483';
    }
    
    function sendChat() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        channel.publish('chat', {
            sender: currentUser,
            text: text,
            time: getTime(),
            mic: myMicNumber
        });
        
        displayChat({ sender: currentUser, text: text, time: getTime(), mic: myMicNumber }, true);
        input.value = '';
    }
    
    function displayChat(msg, isMe = false) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        
        if (msg.sender === 'system') {
            div.className = 'chat-msg system';
            div.innerHTML = msg.text;
        } else {
            div.className = `chat-msg ${isMe ? 'my' : 'other'}`;
            div.innerHTML = `<strong>${msg.sender}</strong> (مايك ${msg.mic}): ${msg.text} <span style="font-size:9px;">${msg.time}</span>`;
        }
        
        container.appendChild(div);
        div.scrollIntoView();
        
        while (container.children.length > 50) container.removeChild(container.children[0]);
    }
    
    function leaveRoom() {
        channel.publish('mic_update', { mic: myMicNumber, user: currentUser, action: 'leave' });
        channel.publish('chat', { sender: 'system', text: `🔴 ${currentUser} غادر مايك ${myMicNumber}`, time: getTime() });
        
        peers.forEach(p => p.destroy());
        peers.clear();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (channel) channel.presence.leave();
        if (ably) ably.close();
        
        location.reload();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
    
    // بدء التشغيل
    createMicSelection();
</script>

</body>
</html>
