<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>غرفة صوتية - 10 مايكات</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 800px;
            width: 100%;
            background: #0f3460;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 2px solid #e94560;
        }

        /* رأس التطبيق */
        .header {
            background: #e94560;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
        }

        .header p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* منطقة تسجيل الدخول */
        .login-box {
            padding: 30px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            text-align: center;
            background: #1a1a2e;
            color: white;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* شبكة المايكات - 10 أماكن */
        .mics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding: 20px;
            background: #0f3460;
        }

        /* كل مايك */
        .mic-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 15px 10px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid #533483;
            position: relative;
        }

        .mic-card.speaking {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            animation: borderPulse 0.5s infinite;
        }

        @keyframes borderPulse {
            0% { border-color: #4CAF50; box-shadow: 0 0 5px #4CAF50; }
            100% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
        }

        .mic-card.empty {
            opacity: 0.6;
            border-color: #666;
        }

        /* أيقونة المايك */
        .mic-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .mic-icon.muted {
            opacity: 0.3;
        }

        /* رقم المايك */
        .mic-number {
            background: #e94560;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            font-size: 14px;
        }

        /* اسم المستخدم */
        .mic-name {
            color: white;
            font-size: 12px;
            font-weight: bold;
            margin: 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* أزرار التحكم */
        .mic-controls {
            margin-top: 8px;
        }

        .mic-btn {
            background: #533483;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            color: white;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
        }

        .mic-btn.muted {
            background: #f44336;
        }

        /* مؤشر الصوت */
        .voice-indicator {
            width: 100%;
            height: 3px;
            background: #333;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .voice-level {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            transition: width 0.05s;
        }

        /* منطقة الدردشة النصية */
        .chat-area {
            background: #1a1a2e;
            margin: 0 20px 20px;
            border-radius: 20px;
            overflow: hidden;
        }

        .chat-messages {
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            background: #0d0d1a;
        }

        .chat-msg {
            padding: 5px 10px;
            margin: 3px 0;
            border-radius: 15px;
            font-size: 12px;
        }

        .chat-msg.my {
            background: #e94560;
            color: white;
            text-align: right;
            margin-left: 20px;
        }

        .chat-msg.other {
            background: #533483;
            color: white;
            margin-right: 20px;
        }

        .chat-msg.system {
            background: #ff9800;
            color: #333;
            text-align: center;
            font-size: 10px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: #1a1a2e;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #0d0d1a;
            color: white;
        }

        .chat-input button {
            padding: 10px 20px;
            background: #e94560;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        /* أزرار عامة */
        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 0 20px 20px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            background: #533483;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        /* رسالة الحالة */
        .status {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #ff9800;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎙️ غرفة المايكات</h1>
        <p>10 مايكات - كل واحد يتكلم من مايكه</p>
    </div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-box">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="number" id="micNumber" placeholder="رقم المايك (1-10)" min="1" max="10">
        <button onclick="login()">دخول إلى الغرفة</button>
        <div id="loginStatus" class="status"></div>
    </div>

    <!-- شاشة الغرفة -->
    <div id="roomScreen" class="hidden">
        <!-- شبكة المايكات 10 -->
        <div class="mics-grid" id="micsGrid">
            <!-- سيتم إنشاء 10 مايكات بالجافاسكريبت -->
        </div>

        <!-- منطقة الدردشة -->
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="رسالة نصية..." onkeypress="if(event.key==='Enter') sendChat()">
                <button onclick="sendChat()">إرسال</button>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="action-buttons">
            <button id="globalMuteBtn" onclick="toggleGlobalMute()">🔇 كتم مايكي</button>
            <button onclick="leaveRoom()">🚪 مغادرة</button>
        </div>
        <div id="roomStatus" class="status"></div>
    </div>
</div>

<script>
    const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';
    
    let ably, channel;
    let currentUser = null;
    let myMicNumber = null;
    let localStream = null;
    let peers = new Map(); // تخزين اتصالات المايكات الأخرى
    let micsData = {}; // { micNumber: { user: name, speaking: false, muted: false } }
    let isMyMuted = false;
    let processedMessages = new Set();

    // إنشاء المايكات الـ 10
    function createMicsGrid() {
        const grid = document.getElementById('micsGrid');
        grid.innerHTML = '';
        
        for (let i = 1; i <= 10; i++) {
            const micCard = document.createElement('div');
            micCard.className = 'mic-card empty';
            micCard.id = `mic_${i}`;
            micCard.setAttribute('data-mic', i);
            
            micCard.innerHTML = `
                <div class="mic-number">🎤 ${i}</div>
                <div class="mic-icon">🎙️</div>
                <div class="mic-name">مايك ${i}</div>
                <div class="voice-indicator"><div class="voice-level" id="voice_${i}"></div></div>
                <div class="mic-controls">
                    <button class="mic-btn" id="muteBtn_${i}" onclick="toggleMicMute(${i})" style="display:none;">🔇 كتم</button>
                </div>
            `;
            
            grid.appendChild(micCard);
            micsData[i] = { user: null, speaking: false, muted: false };
        }
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const micNumber = parseInt(document.getElementById('micNumber').value);
        
        if (!username) {
            document.getElementById('loginStatus').innerHTML = '❌ اكتب اسم المستخدم';
            return;
        }
        
        if (isNaN(micNumber) || micNumber < 1 || micNumber > 10) {
            document.getElementById('loginStatus').innerHTML = '❌ اختر رقم مايك من 1 إلى 10';
            return;
        }
        
        currentUser = username;
        myMicNumber = micNumber;
        
        document.getElementById('loginStatus').innerHTML = '🔄 جاري الاتصال...';
        
        // طلب الميكروفون
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('🎤 ميكروفون جاهز');
        } catch (err) {
            document.getElementById('loginStatus').innerHTML = '⚠️ لا يمكن الوصول للميكروفون - لن يتمكن أحد من سماعك';
        }
        
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        
        ably.connection.on('connected', () => {
            document.getElementById('loginStatus').innerHTML = '✅ متصل! جاري الدخول...';
            
            channel = ably.channels.get('voice_room');
            
            // استقبال إشارات WebRTC
            channel.subscribe('webrtc', (signal) => {
                handleSignal(signal.data);
            });
            
            // استقبال تحديثات المايكات
            channel.subscribe('mic_update', (update) => {
                handleMicUpdate(update.data);
            });
            
            // استقبال رسائل الدردشة
            channel.subscribe('chat', (msg) => {
                const msgId = `${msg.data.sender}_${msg.data.text}_${msg.data.time}`;
                if (!processedMessages.has(msgId)) {
                    processedMessages.add(msgId);
                    displayChatMessage(msg.data);
                }
            });
            
            // إعلان المايك الخاص بي
            announceMyMic();
            
            // الحضور
            channel.presence.enter({ user: currentUser, mic: myMicNumber });
            channel.presence.subscribe(() => updateMicsFromPresence());
            updateMicsFromPresence();
            
            // إنشاء واجهة المايكات
            createMicsGrid();
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('roomScreen').classList.remove('hidden');
            
            // إظهار زر كتم المايك الخاص بي
            document.getElementById(`muteBtn_${myMicNumber}`).style.display = 'block';
            document.getElementById('roomStatus').innerHTML = `✅ أنت في مايك رقم ${myMicNumber} - اسمك: ${currentUser}`;
        });
        
        ably.connection.on('failed', () => {
            document.getElementById('loginStatus').innerHTML = '❌ فشل الاتصال';
        });
    }
    
    function announceMyMic() {
        const update = {
            micNumber: myMicNumber,
            user: currentUser,
            action: 'join',
            muted: false
        };
        channel.publish('mic_update', update);
        
        // رسالة ترحيب
        channel.publish('chat', {
            sender: 'system',
            text: `🎉 ${currentUser} دخل على مايك رقم ${myMicNumber}`,
            time: getTime(),
            isSystem: true
        });
    }
    
    function handleMicUpdate(data) {
        if (data.micNumber === myMicNumber && data.action !== 'join') return;
        
        if (data.action === 'join') {
            micsData[data.micNumber] = { user: data.user, speaking: false, muted: data.muted || false };
            updateMicUI(data.micNumber);
            
            // إنشاء اتصال WebRTC مع المايك الجديد
            if (data.user !== currentUser && !peers.has(data.user)) {
                createPeerConnection(data.user, true);
            }
        } else if (data.action === 'leave') {
            micsData[data.micNumber] = { user: null, speaking: false, muted: false };
            updateMicUI(data.micNumber);
            
            if (peers.has(data.user)) {
                peers.get(data.user).destroy();
                peers.delete(data.user);
            }
        } else if (data.action === 'mute_toggle') {
            if (micsData[data.micNumber]) {
                micsData[data.micNumber].muted = data.muted;
                updateMicUI(data.micNumber);
            }
        }
    }
    
    function updateMicsFromPresence() {
        channel.presence.get((err, members) => {
            if (err || !members) return;
            
            // إعادة تعيين بيانات المايكات
            for (let i = 1; i <= 10; i++) {
                micsData[i] = { user: null, speaking: false, muted: false };
            }
            
            members.forEach(member => {
                const data = member.data;
                if (data && data.mic) {
                    micsData[data.mic] = { user: data.user, speaking: false, muted: false };
                    updateMicUI(data.mic);
                }
            });
            
            // الاتصال بجميع المستخدمين
            members.forEach(member => {
                if (member.data.user !== currentUser && !peers.has(member.data.user)) {
                    createPeerConnection(member.data.user, true);
                }
            });
        });
    }
    
    function updateMicUI(micNumber) {
        const micCard = document.getElementById(`mic_${micNumber}`);
        const data = micsData[micNumber];
        
        if (!micCard) return;
        
        if (data.user) {
            micCard.classList.remove('empty');
            micCard.querySelector('.mic-name').innerHTML = data.user;
            micCard.querySelector('.mic-icon').innerHTML = data.muted ? '🔇' : '🎙️';
            micCard.querySelector('.mic-icon').classList.toggle('muted', data.muted);
            
            if (data.speaking) {
                micCard.classList.add('speaking');
            } else {
                micCard.classList.remove('speaking');
            }
        } else {
            micCard.classList.add('empty');
            micCard.querySelector('.mic-name').innerHTML = `مايك ${micNumber} - فارغ`;
            micCard.querySelector('.mic-icon').innerHTML = '🎙️';
            micCard.classList.remove('speaking');
        }
    }
    
    function createPeerConnection(remoteUser, initiator = true) {
        if (!localStream) return null;
        
        const peer = new SimplePeer({
            initiator: initiator,
            stream: localStream,
            trickle: false
        });
        
        peer.on('signal', signalData => {
            channel.publish('webrtc', {
                to: remoteUser,
                from: currentUser,
                signal: signalData
            });
        });
        
        peer.on('stream', stream => {
            // تحليل مستوى الصوت
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            const checkVolume = setInterval(() => {
                analyser.getByteTimeDomainData(dataArray);
                let max = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const v = Math.abs(dataArray[i] - 128) / 128;
                    if (v > max) max = v;
                }
                
                // إظهار مستوى الصوت في المايك المناسب
                const micNumber = Object.keys(micsData).find(key => micsData[key]?.user === remoteUser);
                if (micNumber) {
                    const voiceLevel = document.getElementById(`voice_${micNumber}`);
                    if (voiceLevel) {
                        voiceLevel.style.width = (max * 100) + '%';
                    }
                    
                    if (max > 0.05 && !micsData[micNumber]?.speaking) {
                        micsData[micNumber].speaking = true;
                        updateMicUI(micNumber);
                    } else if (max <= 0.05 && micsData[micNumber]?.speaking) {
                        micsData[micNumber].speaking = false;
                        updateMicUI(micNumber);
                    }
                }
            }, 100);
            
            peer.on('close', () => clearInterval(checkVolume));
        });
        
        peer.on('error', err => console.error('Peer error:', err));
        
        peers.set(remoteUser, peer);
        return peer;
    }
    
    function handleSignal(data) {
        if (data.to !== currentUser) return;
        
        if (peers.has(data.from)) {
            peers.get(data.from).signal(data.signal);
        } else {
            const peer = createPeerConnection(data.from, false);
            if (peer) peer.signal(data.signal);
        }
    }
    
    function toggleMicMute(micNumber) {
        if (micNumber !== myMicNumber) return;
        
        isMyMuted = !isMyMuted;
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = !isMyMuted;
        }
        
        const btn = document.getElementById(`muteBtn_${myMicNumber}`);
        btn.innerHTML = isMyMuted ? '🔇 مكتوم' : '🎤 فتح';
        btn.classList.toggle('muted', isMyMuted);
        
        // إعلان حالة الكتم للجميع
        channel.publish('mic_update', {
            micNumber: myMicNumber,
            user: currentUser,
            action: 'mute_toggle',
            muted: isMyMuted
        });
    }
    
    function toggleGlobalMute() {
        toggleMicMute(myMicNumber);
    }
    
    function sendChat() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        const msg = {
            sender: currentUser,
            text: text,
            time: getTime(),
            mic: myMicNumber
        };
        
        channel.publish('chat', msg);
        displayChatMessage(msg, true);
        input.value = '';
    }
    
    function displayChatMessage(msg, isMe = false) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        
        if (msg.isSystem || msg.sender === 'system') {
            div.className = 'chat-msg system';
            div.innerHTML = msg.text;
        } else {
            div.className = `chat-msg ${isMe ? 'my' : 'other'}`;
            div.innerHTML = `<strong>${msg.sender}</strong> (مايك ${msg.mic || '?'}): ${msg.text} <span style="font-size:9px;">${msg.time}</span>`;
        }
        
        container.appendChild(div);
        div.scrollIntoView();
        
        while (container.children.length > 50) {
            container.removeChild(container.children[0]);
        }
    }
    
    function leaveRoom() {
        // إعلان المغادرة
        channel.publish('mic_update', {
            micNumber: myMicNumber,
            user: currentUser,
            action: 'leave'
        });
        
        channel.publish('chat', {
            sender: 'system',
            text: `🔴 ${currentUser} غادر مايك ${myMicNumber}`,
            time: getTime(),
            isSystem: true
        });
        
        // إغلاق الاتصالات
        peers.forEach(peer => peer.destroy());
        peers.clear();
        
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        
        if (channel) channel.presence.leave();
        if (ably) ably.close();
        
        location.reload();
    }
    
    function getTime() {
        return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
</script>

</body>
</html>
