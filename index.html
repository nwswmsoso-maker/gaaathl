<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 لودو كنج - Ludo King</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #1a5c2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية العشب */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, #2d8a3e 2px, transparent 3px),
                radial-gradient(circle at 30% 60%, #1a6b2a 3px, transparent 4px),
                radial-gradient(circle at 70% 30%, #3a9e4f 2px, transparent 3px),
                radial-gradient(circle at 90% 80%, #2d8a3e 3px, transparent 4px),
                radial-gradient(circle at 50% 50%, #1a6b2a 2px, transparent 3px);
            background-size: 80px 80px, 100px 100px, 120px 120px, 90px 90px, 70px 70px;
            opacity: 0.3;
            pointer-events: none;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* الهيدر - مثل الصورة */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .player-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #FFD700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-info {
            color: white;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .player-level {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .header-icons {
            display: flex;
            gap: 15px;
        }

        .header-icon {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            transition: all 0.3s;
        }

        .header-icon:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.3);
        }

        /* لوحة اللعبة */
        .board-wrapper {
            background: #1a5c2a;
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,215,0,0.3);
            margin-bottom: 15px;
        }

        .game-board {
            width: 100%;
            aspect-ratio: 1/1;
            background: white;
            border-radius: 25px;
            padding: 12px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
        }

        .board-grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1.5px;
            background: #c4a882;
            position: relative;
        }

        .cell {
            background: #f5e6d3;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* القواعد الأربعة - مثل الصورة */
        .base-green { 
            background: linear-gradient(145deg, #2ecc71, #27ae60) !important; 
            border-radius: 8px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 3px 5px rgba(255,255,255,0.3);
        }
        .base-yellow { 
            background: linear-gradient(145deg, #f1c40f, #f39c12) !important; 
            border-radius: 8px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 3px 5px rgba(255,255,255,0.3);
        }
        .base-blue { 
            background: linear-gradient(145deg, #3498db, #2980b9) !important; 
            border-radius: 8px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 3px 5px rgba(255,255,255,0.3);
        }
        .base-red { 
            background: linear-gradient(145deg, #e74c3c, #c0392b) !important; 
            border-radius: 8px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), inset 0 3px 5px rgba(255,255,255,0.3);
        }

        /* المسار الأبيض */
        .path-cell { 
            background: #ffffff !important; 
            border: 0.5px solid #ddd;
        }

        /* المناطق الآمنة (النجوم) */
        .safe-cell {
            position: relative;
        }
        .safe-cell::after {
            content: '⭐';
            position: absolute;
            font-size: 0.5rem;
            color: #FFD700;
            text-shadow: 0 0 3px #FFA500;
        }

        /* نقاط البداية */
        .start-green { background: #2ecc71 !important; }
        .start-yellow { background: #f1c40f !important; }
        .start-blue { background: #3498db !important; }
        .start-red { background: #e74c3c !important; }

        /* المركز */
        .center-cell {
            background: linear-gradient(135deg, #2ecc71, #f1c40f, #e74c3c, #3498db) !important;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* مسار النهاية */
        .home-green { background: linear-gradient(135deg, #fff, #2ecc71) !important; }
        .home-yellow { background: linear-gradient(135deg, #fff, #f1c40f) !important; }
        .home-blue { background: linear-gradient(135deg, #fff, #3498db) !important; }
        .home-red { background: linear-gradient(135deg, #fff, #e74c3c) !important; }

        /* القطع - ثلاثية الأبعاد مثل الصورة */
        .piece {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            color: white;
            text-shadow: 0 2px 3px rgba(0,0,0,0.4);
            border: 2.5px solid white;
            box-shadow: 
                0 5px 0 rgba(0,0,0,0.2),
                0 8px 12px rgba(0,0,0,0.3),
                inset 0 -3px 0 rgba(0,0,0,0.2),
                inset 0 3px 5px rgba(255,255,255,0.5);
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
        }

        .piece-green { 
            background: radial-gradient(circle at 35% 25%, #55efc4, #00b894);
            border-color: #ffeaa7;
        }
        .piece-yellow { 
            background: radial-gradient(circle at 35% 25%, #ffeaa7, #fdcb6e);
            border-color: #fff;
            color: #2d3436;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        .piece-blue { 
            background: radial-gradient(circle at 35% 25%, #74b9ff, #0984e3);
            border-color: #dfe6e9;
        }
        .piece-red { 
            background: radial-gradient(circle at 35% 25%, #ff7675, #d63031);
            border-color: #fab1a0;
        }

        .piece:active {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 3px 0 rgba(0,0,0,0.2), 0 6px 10px rgba(0,0,0,0.3);
        }

        .piece.can-move {
            animation: pulse 1s infinite;
            filter: brightness(1.2);
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 20px #FFD700; }
        }

        /* منطقة النرد - مثل الصورة */
        .dice-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            backdrop-filter: blur(10px);
            margin-top: 10px;
        }

        .game-status-text {
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .dice-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dice {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 
                0 8px 0 #b33939,
                0 10px 20px rgba(0,0,0,0.3),
                inset 0 -3px 0 rgba(0,0,0,0.1);
            border: 2px solid #ff9f43;
        }

        .dice.rolling {
            animation: rollDice 0.4s ease-out;
        }

        @keyframes rollDice {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .roll-btn {
            padding: 15px 25px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            color: #1a5c2a;
            border: none;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #cc7a00, 0 8px 15px rgba(0,0,0,0.3);
            font-family: 'Cairo', sans-serif;
            transition: all 0.1s;
            border: 2px solid #ffeaa7;
        }

        .roll-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #cc7a00, 0 5px 10px rgba(0,0,0,0.3);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 4px 0 #cc7a00, 0 5px 10px rgba(0,0,0,0.3);
            cursor: not-allowed;
        }

        /* المايك - مثل الصورة */
        .mic-btn {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #4CAF50, #45a049);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #2e7d32, 0 8px 15px rgba(0,0,0,0.3);
            border: 2px solid #a5d6a7;
            color: white;
            transition: all 0.1s;
            margin-left: 10px;
        }

        .mic-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2e7d32, 0 5px 10px rgba(0,0,0,0.3);
        }

        .mic-btn.muted {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            box-shadow: 0 6px 0 #b71c1c, 0 8px 15px rgba(0,0,0,0.3);
            border-color: #ef9a9a;
        }

        /* شاشات إضافية */
        .login-screen, .main-menu, .bet-selection, .searching-screen, .result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .login-box, .bet-box, .result-box {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
        }

        .login-logo h1 {
            font-size: 2.5rem;
            color: #1a5c2a;
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 15px;
            border: 3px solid #ddd;
            border-radius: 20px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }

        .btn-login {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-register {
            background: linear-gradient(145deg, #2196F3, #1976D2);
            color: white;
        }

        .bet-option {
            padding: 20px;
            border: 4px solid #ddd;
            border-radius: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .bet-option.selected {
            border-color: #4CAF50;
            background: rgba(76,175,80,0.1);
        }

        .bet-amount {
            color: #FFD700;
            font-size: 2rem;
        }

        .searching-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255,215,0,0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        .hidden { display: none !important; }

        /* خلفية القائمة الرئيسية */
        .main-menu {
            background: linear-gradient(135deg, #1a5c2a, #0d3318);
            flex-direction: column;
        }

        .menu-coins {
            background: rgba(255,215,0,0.2);
            border: 3px solid #FFD700;
            border-radius: 30px;
            padding: 20px 40px;
            margin: 30px 0;
            font-size: 2rem;
            color: #FFD700;
            font-weight: 700;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 350px;
        }

        .menu-btn {
            padding: 22px;
            border: none;
            border-radius: 25px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="login-logo">
            <h1>🎲 لودو كنج</h1>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" class="login-input" placeholder="اسم المستخدم" value="لاعب">
            <input type="password" id="loginPassword" class="login-input" placeholder="كلمة المرور" value="123">
            <button class="login-btn btn-login" id="loginBtn">دخول 🎮</button>
            <button class="login-btn btn-register" id="showRegisterBtn">تسجيل جديد 📝</button>
            <div id="loginMessage" style="margin-top:15px;color:red;"></div>
        </div>
        <div id="registerForm" class="hidden">
            <input type="text" id="regUsername" class="login-input" placeholder="اسم المستخدم">
            <input type="password" id="regPassword" class="login-input" placeholder="كلمة المرور">
            <button class="login-btn btn-register" id="registerBtn">تسجيل ✅</button>
            <button class="login-btn btn-login" id="showLoginBtn">رجوع ↩️</button>
            <div id="regMessage" style="margin-top:15px;color:red;"></div>
        </div>
        <p style="margin-top:20px;opacity:0.7;">👆 استخدم: لاعب / 123 للتجربة</p>
    </div>
</div>

<!-- القائمة الرئيسية -->
<div id="mainMenu" class="main-menu hidden">
    <div style="text-align:center;">
        <h1 style="font-size:3rem;color:#FFD700;text-shadow:0 4px 15px rgba(0,0,0,0.5);">🎲 لودو كنج</h1>
        <p style="color:white;font-size:1.3rem;">مرحباً <span id="menuUsername"></span></p>
    </div>
    <div class="menu-coins">
        <span>💰</span>
        <span id="userCoins">10000</span>
    </div>
    <div class="menu-buttons">
        <button class="menu-btn btn-play" id="playBtn" style="background:#4CAF50;color:white;">🎲 العب الآن</button>
        <button class="menu-btn btn-friends" id="friendsBtn" style="background:#2196F3;color:white;">👥 الأصدقاء</button>
        <button class="menu-btn btn-chat" id="chatBtn" style="background:#FF9800;color:white;">💬 المحادثات</button>
    </div>
</div>

<!-- اختيار المبلغ -->
<div id="betSelection" class="bet-selection hidden">
    <div class="bet-box">
        <h2 style="color:#1a5c2a;margin-bottom:30px;">اختر مبلغ المباراة</h2>
        <div class="bet-option" data-bet="500">
            <div class="bet-amount">💰 500</div>
            <div>مباراة عادية</div>
        </div>
        <div class="bet-option" data-bet="1000">
            <div class="bet-amount">💰 1000</div>
            <div>مباراة كبيرة</div>
        </div>
        <div class="bet-option" data-bet="5000">
            <div class="bet-amount">💰 5000</div>
            <div>مباراة ضخمة</div>
        </div>
        <button class="bet-cancel" id="cancelBetBtn" style="padding:15px;background:#f44336;color:white;border:none;border-radius:15px;width:100%;margin-top:20px;font-size:1.2rem;font-weight:700;cursor:pointer;">إلغاء</button>
    </div>
</div>

<!-- البحث عن لاعب -->
<div id="searchingScreen" class="searching-screen hidden">
    <div style="text-align:center;color:white;">
        <div class="searching-spinner"></div>
        <div style="font-size:2rem;margin:20px 0;">جاري البحث عن لاعب</div>
        <button class="searching-cancel" id="cancelSearchBtn" style="padding:15px 40px;background:#f44336;color:white;border:none;border-radius:20px;font-size:1.2rem;font-weight:700;cursor:pointer;margin-top:30px;">إلغاء</button>
    </div>
</div>

<!-- شاشة اللعبة الرئيسية - مثل الصورة -->
<div id="gameScreen" class="game-screen hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a5c2a;display:flex;align-items:center;justify-content:center;padding:10px;z-index:500;">
    <div class="game-container">
        <!-- الهيدر مثل الصورة -->
        <div class="game-header">
            <div class="player-profile">
                <div class="player-avatar">
                    <span style="font-size:2rem;">👤</span>
                </div>
                <div class="player-info">
                    <div class="player-name" id="myPlayerName">أنت</div>
                    <div class="player-level">🏆 المستوى 1</div>
                </div>
            </div>
            <div class="header-icons">
                <div class="header-icon">🏆</div>
                <div class="header-icon">⚙️</div>
            </div>
        </div>

        <!-- الخصم (يظهر فوق اللوحة مثل الصورة) -->
        <div style="display:flex;justify-content:flex-end;margin-bottom:5px;">
            <div style="background:rgba(0,0,0,0.5);border-radius:40px;padding:8px 20px;display:flex;align-items:center;gap:10px;">
                <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#e74c3c,#c0392b);display:flex;align-items:center;justify-content:center;border:2px solid #FFD700;">
                    <span style="color:white;font-size:1.2rem;">👤</span>
                </div>
                <span style="color:white;font-weight:700;" id="opponentName">في الانتظار...</span>
            </div>
        </div>

        <!-- لوحة اللعبة -->
        <div class="board-wrapper">
            <div class="game-board">
                <div class="board-grid" id="gameBoard"></div>
            </div>
        </div>

        <!-- منطقة النرد والميك -->
        <div class="dice-section">
            <div class="game-status-text" id="gameStatus">🎮 دورك!</div>
            <div class="dice-box">
                <div class="dice" id="diceDisplay">🎲</div>
                <button class="roll-btn" id="rollDiceBtn">رمي</button>
                <div class="mic-btn" id="micBtn">🎤</div>
            </div>
        </div>
    </div>
</div>

<!-- شاشة النتيجة -->
<div id="resultScreen" class="result-screen hidden">
    <div class="result-box">
        <div style="font-size:5rem;" id="resultIcon">🏆</div>
        <div style="font-size:2.5rem;color:#1a5c2a;margin:10px 0;" id="resultTitle">فزت!</div>
        <div style="font-size:2rem;color:#FFD700;font-weight:700;margin:20px 0;" id="resultCoins">+0 💰</div>
        <button class="result-btn" id="backToMenuBtn" style="padding:15px 40px;background:#4CAF50;color:white;border:none;border-radius:15px;font-size:1.3rem;font-weight:700;cursor:pointer;">العودة للقائمة</button>
    </div>
</div>

<script>
// ==================== المتغيرات ====================
const ABLY_KEY = 'w2taPw.9vCSng:V5of3as_szS00NjTbPi_7fUAFT6qyMgbSwGLZBsVbPM';

let currentUser = null;
let userCoins = 10000;
let selectedBet = 0;
let ably = null;
let channel = null;
let gameChannel = null;

// المسار
const PATH = [
    {r:6,c:1},{r:6,c:2},{r:6,c:3},{r:6,c:4},{r:6,c:5},
    {r:5,c:6},{r:4,c:6},{r:3,c:6},{r:2,c:6},{r:1,c:6},{r:0,c:6},
    {r:0,c:7},{r:0,c:8},{r:1,c:8},{r:2,c:8},{r:3,c:8},{r:4,c:8},{r:5,c:8},
    {r:6,c:9},{r:6,c:10},{r:6,c:11},{r:6,c:12},{r:6,c:13},{r:6,c:14},
    {r:7,c:14},{r:8,c:14},{r:8,c:13},{r:8,c:12},{r:8,c:11},{r:8,c:10},{r:8,c:9},
    {r:9,c:8},{r:10,c:8},{r:11,c:8},{r:12,c:8},{r:13,c:8},{r:14,c:8},
    {r:14,c:7},{r:14,c:6},{r:13,c:6},{r:12,c:6},{r:11,c:6},{r:10,c:6},{r:9,c:6},
    {r:8,c:5},{r:8,c:4},{r:8,c:3},{r:8,c:2},{r:8,c:1},{r:8,c:0},
    {r:7,c:0},{r:6,c:0}
];
const STARTS = { green:0, yellow:12, red:25, blue:38 };
const SAFE = [0,12,25,38,8,17,30,43];
const HOME = {
    green: [{r:7,c:1},{r:7,c:2},{r:7,c:3},{r:7,c:4},{r:7,c:5}],
    yellow: [{r:1,c:7},{r:2,c:7},{r:3,c:7},{r:4,c:7},{r:5,c:7}],
    red: [{r:7,c:13},{r:7,c:12},{r:7,c:11},{r:7,c:10},{r:7,c:9}],
    blue: [{r:13,c:7},{r:12,c:7},{r:11,c:7},{r:10,c:7},{r:9,c:7}]
};

let gameState = {
    myColor: null,
    opponentColor: null,
    currentTurn: 'green',
    lastDice: 0,
    pieces: {
        green: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
        yellow: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
        blue: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
        red: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}]
    },
    matchId: null,
    opponent: null
};

let users = JSON.parse(localStorage.getItem('lu_users')) || {'لاعب':'123'};
let userStats = JSON.parse(localStorage.getItem('lu_stats')) || {'لاعب':{coins:10000,wins:0,losses:0}};

// ==================== دوال الواجهة ====================
function showRegisterForm() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
}
function showLoginForm() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
}
function register() {
    const u = document.getElementById('regUsername').value.trim();
    const p = document.getElementById('regPassword').value;
    if(!u||!p) return alert('املأ الحقول');
    users = JSON.parse(localStorage.getItem('lu_users')) || {};
    if(users[u]) return alert('الاسم موجود');
    users[u]=p;
    userStats[u]={coins:10000,wins:0,losses:0};
    localStorage.setItem('lu_users',JSON.stringify(users));
    localStorage.setItem('lu_stats',JSON.stringify(userStats));
    alert('✅ تم التسجيل');
    showLoginForm();
}

async function login() {
    const u = document.getElementById('loginUsername').value.trim();
    const p = document.getElementById('loginPassword').value;
    users = JSON.parse(localStorage.getItem('lu_users')) || {'لاعب':'123'};
    userStats = JSON.parse(localStorage.getItem('lu_stats')) || {'لاعب':{coins:10000,wins:0,losses:0}};
    
    if(!users[u] || users[u]!==p) {
        document.getElementById('loginMessage').textContent = '❌ خطأ في البيانات';
        return;
    }
    currentUser = u;
    userCoins = userStats[u]?.coins || 10000;
    
    try {
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: currentUser });
        ably.connection.on('connected', () => {
            channel = ably.channels.get('ludo-main');
            channel.subscribe('match-found', handleMatchFound);
            channel.presence.enter({ username: currentUser });
            showMainMenu();
        });
    } catch(e) {
        alert('خطأ في الاتصال');
    }
}

function showMainMenu() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    document.getElementById('menuUsername').textContent = currentUser;
    document.getElementById('userCoins').textContent = userCoins;
}

function showBetSelection() {
    document.getElementById('betSelection').classList.remove('hidden');
}

function selectBet(amount) {
    if(userCoins < amount) { alert('عملات غير كافية'); return; }
    selectedBet = amount;
    document.querySelectorAll('.bet-option').forEach(o=>o.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    setTimeout(() => { if(selectedBet>0) startSearching(); }, 300);
}

function startSearching() {
    document.getElementById('betSelection').classList.add('hidden');
    document.getElementById('searchingScreen').classList.remove('hidden');
    
    channel.subscribe('search-match', (msg) => {
        const d = msg.data;
        if(d.username === currentUser) return;
        if(d.bet !== selectedBet) return;
        channel.publish('match-found', {
            player1: currentUser, player2: d.username, bet: selectedBet, matchId: 'm_'+Date.now()
        });
    });
    channel.publish('search-match', { username: currentUser, bet: selectedBet });
}

function handleMatchFound(msg) {
    const d = msg.data;
    if(d.player1 !== currentUser && d.player2 !== currentUser) return;
    
    channel.unsubscribe('search-match');
    
    if(d.player1 === currentUser) {
        gameState.myColor = 'green';
        gameState.opponentColor = 'yellow';
        gameState.opponent = d.player2;
    } else {
        gameState.myColor = 'yellow';
        gameState.opponentColor = 'green';
        gameState.opponent = d.player1;
    }
    gameState.matchId = d.matchId;
    gameState.currentTurn = 'green';
    
    gameChannel = ably.channels.get('game-'+d.matchId);
    gameChannel.subscribe('dice', handleOpponentDice);
    gameChannel.subscribe('move', handleOpponentMove);
    
    document.getElementById('searchingScreen').classList.add('hidden');
    startGame();
}

// ==================== اللعبة ====================
function startGame() {
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('myPlayerName').textContent = currentUser;
    document.getElementById('opponentName').textContent = gameState.opponent || 'منافس';
    initBoard();
    updateStatus();
}

function initBoard() {
    const board = document.getElementById('gameBoard');
    board.innerHTML = '';
    for(let r=0; r<15; r++) {
        for(let c=0; c<15; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            // القواعد
            if(r<6 && c<6) { cell.classList.add('base-green');
                if((r===1&&c===1)||(r===1&&c===4)||(r===4&&c===1)||(r===4&&c===4)) cell.dataset.base='green';
            }
            if(r<6 && c>=9) { cell.classList.add('base-yellow');
                if((r===1&&c===10)||(r===1&&c===13)||(r===4&&c===10)||(r===4&&c===13)) cell.dataset.base='yellow';
            }
            if(r>=9 && c<6) { cell.classList.add('base-blue');
                if((r===10&&c===1)||(r===10&&c===4)||(r===13&&c===1)||(r===13&&c===4)) cell.dataset.base='blue';
            }
            if(r>=9 && c>=9) { cell.classList.add('base-red');
                if((r===10&&c===10)||(r===10&&c===13)||(r===13&&c===10)||(r===13&&c===13)) cell.dataset.base='red';
            }
            
            const pathIdx = PATH.findIndex(p=>p.r===r&&p.c===c);
            if(pathIdx >= 0) { cell.classList.add('path-cell'); cell.dataset.path = pathIdx; }
            
            if(SAFE.includes(pathIdx)) cell.classList.add('safe-cell');
            
            if(r===6&&c===1) cell.classList.add('start-green');
            if(r===1&&c===8) cell.classList.add('start-yellow');
            if(r===8&&c===13) cell.classList.add('start-red');
            if(r===13&&c===6) cell.classList.add('start-blue');
            
            Object.entries(HOME).forEach(([color, cells]) => {
                cells.forEach((pos, i) => {
                    if(pos.r===r && pos.c===c) { cell.dataset.home = color; cell.dataset.homeIdx = i; }
                });
            });
            
            if(r===7&&c===7) { cell.classList.add('center-cell'); cell.innerHTML='🏆'; }
            board.appendChild(cell);
        }
    }
    renderPieces();
}

function renderPieces() {
    document.querySelectorAll('.piece').forEach(p=>p.remove());
    Object.entries(gameState.pieces).forEach(([color, pieces]) => {
        pieces.forEach((p, idx) => {
            if(p.done) return;
            let target = null;
            if(p.pos === -1) {
                const bases = document.querySelectorAll(`[data-base="${color}"]`);
                if(bases[idx]) target = bases[idx];
            } else if(p.home > 0) {
                target = document.querySelector(`[data-home="${color}"][data-home-idx="${p.home-1}"]`);
            } else if(p.pos >= 0 && p.pos < 52) {
                const coord = PATH[p.pos];
                target = document.querySelector(`.cell[data-path="${p.pos}"]`);
            }
            if(target) {
                const piece = document.createElement('div');
                piece.className = `piece piece-${color}`;
                piece.dataset.color = color;
                piece.dataset.idx = idx;
                piece.textContent = idx+1;
                piece.onclick = () => selectPiece(color, idx);
                target.appendChild(piece);
            }
        });
    });
}

function rollDice() {
    if(gameState.currentTurn !== gameState.myColor) {
        updateStatus('⏳ ليس دورك'); return;
    }
    
    const btn = document.getElementById('rollDiceBtn');
    const dice = document.getElementById('diceDisplay');
    btn.disabled = true;
    dice.classList.add('rolling');
    
    let count = 0;
    const int = setInterval(() => {
        dice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];
        if(++count >= 10) {
            clearInterval(int);
            const val = Math.floor(Math.random()*6)+1;
            gameState.lastDice = val;
            dice.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][val-1];
            dice.classList.remove('rolling');
            
            gameChannel.publish('dice', { player: currentUser, dice: val });
            
            if(!checkHasMove()) {
                updateStatus('😕 لا توجد حركة');
                gameState.currentTurn = gameState.opponentColor;
                gameState.lastDice = 0;
                btn.disabled = false;
                updateStatus();
                return;
            }
            
            highlightMovable();
            updateStatus(`🎲 رميت ${val}`);
            
            if(val !== 6) {
                setTimeout(() => {
                    if(document.querySelectorAll('.piece.can-move').length === 0) {
                        gameState.currentTurn = gameState.opponentColor;
                        updateStatus();
                    }
                    btn.disabled = false;
                }, 500);
            } else {
                btn.disabled = false;
            }
        }
    }, 80);
}

function checkHasMove() {
    const color = gameState.myColor;
    const dice = gameState.lastDice;
    if(dice === 6 && gameState.pieces[color].some(p=>p.pos===-1 && !p.done)) return true;
    return gameState.pieces[color].some(p => {
        if(p.done) return false;
        if(p.pos >= 0 && p.pos < 52 && p.home === 0) {
            const np = p.pos + dice;
            if(np < 52) return true;
            if(np === 52 + STARTS[color]) return true;
        }
        if(p.home > 0) return p.home + dice <= 5;
        return false;
    });
}

function highlightMovable() {
    document.querySelectorAll('.piece').forEach(el => {
        el.classList.remove('can-move');
        if(el.dataset.color !== gameState.myColor) return;
        const idx = parseInt(el.dataset.idx);
        const p = gameState.pieces[gameState.myColor][idx];
        if(p.done) return;
        if(p.pos === -1 && gameState.lastDice === 6) el.classList.add('can-move');
        else if(p.pos >= 0 && p.pos < 52 && p.home === 0) {
            const np = p.pos + gameState.lastDice;
            if(np < 52 || np === 52 + STARTS[gameState.myColor]) el.classList.add('can-move');
        } else if(p.home > 0) {
            if(p.home + gameState.lastDice <= 5) el.classList.add('can-move');
        }
    });
}

function selectPiece(color, idx) {
    if(color !== gameState.myColor || gameState.lastDice === 0) return;
    const p = gameState.pieces[color][idx];
    if(p.done) return;
    
    let moved = false;
    let moveData = null;
    
    if(p.pos === -1 && gameState.lastDice === 6) {
        p.pos = STARTS[color];
        moved = true;
        moveData = { type: 'exit', color, idx, pos: p.pos };
    } else if(p.pos >= 0 && p.pos < 52 && p.home === 0) {
        const np = p.pos + gameState.lastDice;
        if(np < 52) {
            const opp = gameState.opponentColor;
            gameState.pieces[opp].forEach(oppP => {
                if(oppP.pos === np && oppP.home === 0 && !oppP.done && !SAFE.includes(np)) {
                    oppP.pos = -1;
                    updateStatus('🍴 أكلت قطعة!');
                }
            });
            p.pos = np;
            moved = true;
            moveData = { type: 'move', color, idx, pos: np };
        } else if(np === 52 + STARTS[color]) {
            p.pos = -2; p.home = 1;
            moved = true;
            moveData = { type: 'home', color, idx, home: 1 };
        }
    } else if(p.home > 0) {
        const nh = p.home + gameState.lastDice;
        if(nh <= 5) {
            p.home = nh;
            moved = true;
            moveData = { type: 'homeMove', color, idx, home: nh };
            if(nh === 5) { p.done = true; updateStatus('🎉 قطعة وصلت!'); }
        }
    }
    
    if(moved) {
        gameChannel.publish('move', { player: currentUser, moveData });
        renderPieces();
        if(checkWin(color)) { endGame(true); return; }
        if(gameState.lastDice !== 6) gameState.currentTurn = gameState.opponentColor;
        gameState.lastDice = 0;
        document.querySelectorAll('.can-move').forEach(e=>e.classList.remove('can-move'));
        updateStatus();
    }
}

function handleOpponentDice(msg) {
    if(msg.data.player === currentUser) return;
    updateStatus(`🎲 الخصم رمى ${msg.data.dice}`);
}

function handleOpponentMove(msg) {
    if(msg.data.player === currentUser) return;
    const md = msg.data.moveData;
    const p = gameState.pieces[md.color][md.idx];
    
    if(md.type === 'exit') p.pos = md.pos;
    else if(md.type === 'move') {
        gameState.pieces[gameState.myColor].forEach(myP => {
            if(myP.pos === md.pos && myP.home === 0 && !myP.done && !SAFE.includes(md.pos)) {
                myP.pos = -1;
                updateStatus('😢 انأكلت قطعتك!');
            }
        });
        p.pos = md.pos;
    } else if(md.type === 'home') { p.pos = -2; p.home = 1; }
    else if(md.type === 'homeMove') { p.home = md.home; if(md.home===5) p.done=true; }
    
    renderPieces();
    if(checkWin(md.color)) { endGame(false); return; }
    gameState.currentTurn = gameState.myColor;
    updateStatus();
}

function checkWin(color) {
    return gameState.pieces[color].every(p => p.done);
}

function updateStatus(msg) {
    const el = document.getElementById('gameStatus');
    if(msg) { el.textContent = msg; return; }
    el.textContent = gameState.currentTurn === gameState.myColor ? '🎮 دورك! ارمِ النرد' : '⏳ دور الخصم...';
}

function endGame(won) {
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    if(won) {
        document.getElementById('resultIcon').textContent = '🏆';
        document.getElementById('resultTitle').textContent = 'فزت!';
        document.getElementById('resultCoins').textContent = `+${selectedBet} 💰`;
        userCoins += selectedBet;
        userStats[currentUser].wins = (userStats[currentUser].wins||0)+1;
    } else {
        document.getElementById('resultIcon').textContent = '😢';
        document.getElementById('resultTitle').textContent = 'خسرت';
        document.getElementById('resultCoins').textContent = `-${selectedBet} 💰`;
        userCoins -= selectedBet;
        userStats[currentUser].losses = (userStats[currentUser].losses||0)+1;
    }
    userStats[currentUser].coins = userCoins;
    localStorage.setItem('lu_stats', JSON.stringify(userStats));
    if(gameChannel) gameChannel.unsubscribe();
}

function backToMenu() {
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('userCoins').textContent = userCoins;
    document.getElementById('mainMenu').classList.remove('hidden');
    gameState = {
        myColor: null, opponentColor: null, currentTurn: 'green', lastDice: 0,
        pieces: {
            green: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
            yellow: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
            blue: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}],
            red: [{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0},{pos:-1,home:0,done:0}]
        }
    };
}

function cancelSearch() { location.reload(); }

// ==================== تهيئة ====================
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('showRegisterBtn').onclick = showRegisterForm;
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('showLoginBtn').onclick = showLoginForm;
    document.getElementById('playBtn').onclick = showBetSelection;
    document.getElementById('friendsBtn').onclick = ()=>alert('👥 قريباً');
    document.getElementById('chatBtn').onclick = ()=>alert('💬 قريباً');
    document.querySelectorAll('.bet-option').forEach(o => o.onclick = (e) => selectBet(parseInt(e.currentTarget.dataset.bet)));
    document.getElementById('cancelBetBtn').onclick = ()=>document.getElementById('betSelection').classList.add('hidden');
    document.getElementById('cancelSearchBtn').onclick = cancelSearch;
    document.getElementById('rollDiceBtn').onclick = rollDice;
    document.getElementById('backToMenuBtn').onclick = backToMenu;
    document.getElementById('micBtn').onclick = function() {
        this.classList.toggle('muted');
        this.textContent = this.classList.contains('muted') ? '🔇' : '🎤';
    };
});
